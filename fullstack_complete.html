<script>
const D=[{"id":"os","phase":"Phase 1 · 基础底座","title":"OS · 网络基础 · Linux 内核","color":"#0369a1","bg":"#EFF6FF","intro":"一切上层技术的物理基础。进程/线程/内存管理决定并发模型上限；TCP/IP 贯穿 HTTP 到 QUIC 全部协议演进；Linux 内核 I/O 子系统是 Netty/Redis/Kafka 高性能的根基。","notes":[{"h":"进程、线程、内存管理","pts":["进程是资源分配单位（独立虚拟地址空间），线程是调度单位（共享进程地址空间）。上下文切换需要保存/恢复寄存器、程序计数器、栈指针，代价约 1-10μs（含 TLB flush）。","虚拟内存通过 MMU + 多级页表（x86-64 四级，每级 9bit 索引）将虚拟地址映射到物理地址。TLB 缓存热点页表项，TLB miss 触发 Page Walk 需要 4 次内存访问，约 200-800ns。","Hugepages（2MB/1GB）大幅减少 TLB 条目数量：1GB 内存用 4KB 页需要 262144 条 TLB，用 2MB 大页只需 512 条。DPDK/数据库/JVM 堆外内存的标配优化。","写时复制（COW）：fork() 后父子进程共享物理页，只在写操作时才复制。是 Redis RDB 快照高效的根本原因——fork 瞬间完成，子进程在内存快照上序列化。","mmap 将文件映射到虚拟地址空间，通过缺页异常（Page Fault）惰性加载，避免 read/write 系统调用的用户态/内核态切换。Kafka 使用 mmap 读取索引文件，消费者顺序读走 Page Cache。"]},{"h":"I/O 模型演进（BIO → NIO → io_uring）","pts":["BIO（阻塞 I/O）：每个连接独占一个线程，read()/write() 阻塞直到数据就绪。C10K 问题：万级并发需要万级线程，线程切换和内存开销不可接受。","NIO（非阻塞 + 多路复用）：Linux epoll 的三个系统调用（epoll_create/epoll_ctl/epoll_wait）让单线程监控数十万 fd。epoll 用红黑树管理注册 fd，就绪链表返回事件，复杂度 O(1)。","Reactor 模式：基于 epoll 的事件驱动架构。单 Reactor 单线程（Redis 经典模式）→ 单 Reactor 多线程（处理和 I/O 分离）→ 多 Reactor 多线程（Netty Boss+Worker）。","io_uring（Linux 5.1+）：用户态和内核共享两个环形队列（SQ 提交/CQ 完成），通过共享内存通信，极端情况下实现零 syscall。SQPOLL 模式：内核线程持续轮询 SQ，应用连 io_uring_enter 也不用调。","零拷贝谱系：mmap+write（1次拷贝）→ sendfile（跨过用户态，2次DMA）→ sendfile+DMA gather（真正零CPU拷贝）→ io_uring registered buffers（固定内存，消除 DMA 映射开销）。"]},{"h":"Linux 网络栈：从 NIC 到应用","pts":["数据包入内核路径：NIC 收包 → DMA 写入 RX Ring Buffer → 硬中断触发 → NAPI 关中断转软中断轮询（批量收包）→ sk_buff 分配 → Netfilter hook → IP → TCP → Socket Buffer → 应用 read()。","sk_buff（socket buffer）是内核网络栈的核心数据结构，用指针而非拷贝表示数据包。head/data/tail/end 四个指针划定边界，各层通过 skb_push/skb_pull 调整指针添加/去除首部，从 HTTP 到以太帧始终只有一份数据副本。","NAPI（New API）解决高负载下的中断风暴：第一个包触发硬中断后关闭该网卡中断，进入 softirq 轮询模式批量处理（budget=64 包），处理完才重开中断。这是 DPDK 轮询思想的内核版。","DDIO（Intel Data Direct I/O）：NIC DMA 数据直接写入 CPU LLC（Last Level Cache）而非 DRAM，CPU 读取时直接 Cache 命中约 4ns，而非先从 DRAM 加载约 60ns。25Gbps 线速下每包节省 120ns 效果显著。","XDP（eXpress Data Path）：在 NIC 驱动的 NAPI poll 函数里注入 eBPF 程序，是内核最早的包处理 hook。XDP_DROP 可线速丢弃（DDoS 防护），XDP_REDIRECT 实现零拷贝转发，Cilium 的 kube-proxy 替代就基于此。"]},{"h":"TCP/IP 关键机制","pts":["TCP 三次握手本质是双方各确认对方的 ISN（初始序列号）。为什么不能两次握手：服务端无法确认客户端能收到自己的数据。SYN Cookie 解决 SYN Flood：服务端不分配连接状态，把连接信息编码进 ISN，合法 ACK 到达时再重建状态。","TCP 拥塞控制演进：CUBIC（默认，基于丢包检测，丢包即降速）→ BBR（Google 2016，基于带宽和 RTT 建模，不依赖丢包信号，跨洲际高延迟链路吞吐提升数倍）。","TLS 1.3 把握手从 2 RTT 压缩到 1 RTT，Session Resumption 支持 0-RTT。HTTP/3 基于 QUIC（UDP），把 TCP 握手和 TLS 握手合并，实现 0-RTT 连接，且流级别独立重传彻底解决 HoL Blocking。","TIME_WAIT 状态：主动关闭方需等待 2MSL（约 60-120s）才能释放端口。大量 TIME_WAIT 的原因通常是高频短连接（如 HTTP/1.0）。解决：开启 TCP keepalive 保持长连接，或使用 SO_REUSEADDR/SO_REUSEPORT。","Nagle 算法合并小包减少网络拥塞，但会引入数毫秒延迟。延迟敏感应用（交易系统、游戏、gRPC）必须设置 TCP_NODELAY 禁用。与 TCP Delayed ACK（延迟确认）共同作用会产生 40ms 的固定延迟陷阱。"]}],"res":[{"tp":"免费书","tc":"b-book","t":"OSTEP: Operating Systems Three Easy Pieces","d":"全球最好的 OS 入门，进程/内存/并发/文件系统，免费在线","s":"pages.cs.wisc.edu/~remzi","u":"https://pages.cs.wisc.edu/~remzi/OSTEP/","lv":"entry"},{"tp":"课程","tc":"b-course","t":"CS:APP — CMU 计算机系统","d":"汇编/Cache/虚拟内存/并发，理解硬件软件界面最系统的课程","s":"csapp.cs.cmu.edu","u":"http://csapp.cs.cmu.edu/","lv":"mid"},{"tp":"书籍","tc":"b-book","t":"TCP/IP Illustrated Vol.1 (Stevens)","d":"三次握手/拥塞控制/路由，配大量抓包图，协议栈权威经典","s":"W. Richard Stevens","u":"https://www.oreilly.com/library/view/tcpip-illustrated-volume/9780132808200/","lv":"mid"},{"tp":"权威站点","tc":"b-blog","t":"Brendan Gregg — Linux Performance","d":"火焰图/eBPF/perf 全集，性能分析工具地图，Netflix/OpenAI 出品","s":"brendangregg.com","u":"https://www.brendangregg.com/linuxperf.html","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Linux Kernel Networking Documentation","d":"sk_buff/Netfilter/net_device 官方文档，深入内核的第一手资料","s":"kernel.org","u":"https://www.kernel.org/doc/html/latest/networking/index.html","lv":"adv"},{"tp":"课程","tc":"b-course","t":"Computer Networking: A Top-Down Approach","d":"全球最广泛使用的计算机网络教材，应用到链路层完整覆盖","s":"Kurose & Ross","u":"https://gaia.cs.umass.edu/kurose_ross/","lv":"entry"},{"tp":"免费书","tc":"b-book","t":"Beej's Guide to Network Programming","d":"C 语言 socket/TCP/UDP 权威免费教程，工程导向","s":"beej.us","u":"https://beej.us/guide/bgnet/","lv":"entry"}]},{"id":"comm","phase":"Phase 1 · 基础底座","title":"通信体系 · 协议 · 高性能 IO","color":"#7c3aed","bg":"#EDE9FE","intro":"通信是最横切的技术维度。BIO→NIO→io_uring 决定框架性能上限；序列化协议影响带宽和延迟；WebRTC 解决 NAT 穿透终极难题；QUIC 重新定义可靠传输。","notes":[{"h":"Reactor 模式与 Netty 架构","pts":["Netty 的线程模型：1个 BossEventLoopGroup 负责 Accept 新连接，N个 WorkerEventLoopGroup 负责 I/O 读写和编解码。每个 EventLoop 绑定一个线程，对应一个 Selector，管理多个 Channel。","ChannelPipeline 是责任链模式：入站（Inbound）事件从 head 向 tail 传播，出站（Outbound）操作从 tail 向 head 传播。ChannelHandler 可以任意组合：解码器→业务处理器→编码器。","ByteBuf 是 Netty 自己的缓冲区抽象，解决了 Java NIO ByteBuffer 的两大痛点：读写分离（readerIndex/writerIndex）和堆外内存池化（PooledByteBufAllocator，减少 GC 压力）。","粘包/拆包问题的根本原因是 TCP 是字节流协议，没有消息边界。解决方案：定长分隔（FixedLengthFrameDecoder）、特殊分隔符（DelimiterBasedFrameDecoder）、长度字段（LengthFieldBasedFrameDecoder，最通用）。","Netty 的零拷贝：FileRegion 用 transferTo()（底层 sendfile）直接从文件 Channel 传到 socket Channel，不经过用户态；CompositeByteBuf 合并多个 ByteBuf 无需数据拷贝。"]},{"h":"序列化协议选型","pts":["JSON：文本格式，可读性好，无需 Schema，但冗余多（字段名重复），解析慢（字符串处理），是 REST API 的默认选择。","Protocol Buffers：Google 开源，二进制编码（varint/zigzag/wire type），Schema 强类型，向后兼容（字段用 field number 标识），比 JSON 体积小 3-10x，序列化快 5-10x。gRPC/Kafka 生产环境首选。","Avro：Schema 随数据传输（或注册到 Schema Registry），适合 Hadoop/Kafka 生态，支持 Schema Evolution（添加默认值字段向后兼容）。动态类型，无需 Code Generation。","FlatBuffers/Cap'n Proto：读取时无需解析（直接内存访问），适合游戏引擎、嵌入式场景，延迟极低但灵活性差。","Schema Evolution 是生产系统最重要的设计决策：Backward Compatible（新代码读旧数据）、Forward Compatible（旧代码读新数据）、Full Compatible。Protobuf 不删已有字段、新字段加 optional 可保持 Full Compatible。"]},{"h":"应用协议：REST / gRPC / GraphQL","pts":["REST 设计约束：无状态、统一接口（HTTP 动词语义）、资源导向 URI。优点：简单，HTTP 客户端通用；缺点：Over-fetching（返回多余字段）、Under-fetching（N+1 请求），语义模糊（PUT vs PATCH）。","gRPC 基于 HTTP/2（多路复用、Header 压缩、二进制帧）和 Protobuf，支持 Unary/Server Streaming/Client Streaming/Bidirectional Streaming 四种模式。IDL（.proto 文件）驱动 Code Generation，类型安全，适合服务内部通信。","GraphQL 让客户端精确指定所需字段，解决 Over/Under-fetching。核心问题：N+1 查询（用 DataLoader 批量化解决）、复杂查询的服务端性能控制（查询深度/复杂度限制）、缓存比 REST 难。","WebSocket：基于 HTTP Upgrade 握手，建立全双工长连接。适合需要服务端主动推送的场景（聊天、协作编辑、实时行情）。注意：WS 连接不能穿透 CDN 缓存，需要专用 WebSocket 负载均衡。","SSE（Server-Sent Events）：基于 HTTP 长连接的单向推送，text/event-stream 格式，自动重连，适合通知/日志流场景。比 WebSocket 简单，但只支持服务端到客户端单向推送。"]},{"h":"WebRTC 与 NAT 穿透","pts":["WebRTC 的核心挑战是 NAT 穿透：两端都在 NAT 后面，如何建立直接 P2P 连接。ICE（Interactive Connectivity Establishment）收集所有可能的连接候选（host/srflx/relay），按优先级尝试。","STUN（Session Traversal Utilities for NAT）：客户端向公网 STUN Server 发请求，获取自己的公网 IP:Port（server-reflexive 候选）。适合完全锥形 NAT，约 80% 情况可穿透。","TURN（Traversal Using Relays around NAT）：当直连失败（对称型 NAT），流量通过 TURN Server 中继。是兜底方案，代价是延迟增加和带宽消耗。生产环境 TURN Server 是 WebRTC 最大的成本来源。","SFU（Selective Forwarding Unit）架构：每个客户端只上传一路流，SFU 转发到其他参与者（不解码不混流）。N人会议的流量复杂度从 O(N²) 降到 O(N)，是 Zoom/Agora/LiveKit 的主流架构。","DTLS + SRTP：WebRTC 所有媒体流必须加密。DTLS 在 UDP 上实现 TLS 握手，协商出 SRTP 密钥，实际音视频走 SRTP（Secure RTP）传输。这是 WebRTC 的安全强制要求，无法关闭。"]},{"h":"QUIC / HTTP3 与 IoT 协议","pts":["QUIC 在 UDP 上实现了可靠传输，解决了 TCP 的两大问题：1）HoL Blocking（一个流丢包阻塞所有流，QUIC 每个流独立重传）；2）连接迁移（手机切 WiFi 到 4G，TCP 连接断开，QUIC 通过 Connection ID 保持连接）。","QUIC 的 0-RTT 连接：首次连接 1 RTT 完成 TLS 握手，之后用 Session Ticket 恢复，0-RTT 即可发送数据。HTTP/3 = QUIC + HTTP 语义，Google 全量切换，Cloudflare 默认开启。","MQTT（Message Queuing Telemetry Transport）：专为 IoT 设计的轻量 Pub/Sub 协议，最小 2 字节头部，TCP 之上运行。QoS 0（Fire and forget）/ QoS 1（至少一次，需确认）/ QoS 2（恰好一次，四次握手）。","MQTT v5 新特性：Shared Subscription（多消费者负载均衡）、Message Expiry（消息过期）、User Property（自定义头部）、Flow Control（流量控制）。比 v3.1.1 更适合大规模生产部署。","KCP 协议：可靠 UDP 实现，比 TCP 快 30-40%（牺牲带宽换延迟），内部用 ARQ（自动重传请求）和快速重传实现可靠性。游戏（王者荣耀）和实时视频通话的常用选择。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"Netty 4.x User Guide","d":"EventLoop/Pipeline/ByteBuf，Java 高性能网络框架权威参考","s":"netty.io","u":"https://netty.io/wiki/user-guide-for-4.x.html","lv":"mid"},{"tp":"免费书","tc":"b-book","t":"WebRTC for the Curious","d":"ICE/STUN/TURN/SDP/DTLS/SRTP，NAT 穿透完整原理","s":"webrtcforthecurious.com","u":"https://webrtcforthecurious.com/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"gRPC 官方文档","d":"Protocol Buffers + HTTP/2 双向流 RPC，服务间通信首选","s":"grpc.io","u":"https://grpc.io/docs/","lv":"mid"},{"tp":"免费书","tc":"b-book","t":"HTTP/3 Explained","d":"QUIC 协议：0-RTT/流级独立重传/连接迁移完整解析","s":"http3-explained.haxx.se","u":"https://http3-explained.haxx.se/","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"io_uring 原始设计论文 (Jens Axboe)","d":"共享环形队列设计，零 syscall 异步 I/O，Linux I/O 革命","s":"kernel.dk","u":"https://kernel.dk/io_uring.pdf","lv":"adv"},{"tp":"官方规范","tc":"b-docs","t":"MQTT v5 规范 (OASIS)","d":"QoS/Retain/Will/Session/Shared Subscription，IoT 通信标准","s":"oasis-open.org","u":"https://docs.oasis-open.org/mqtt/mqtt/v5.0/mqtt-v5.0.html","lv":"mid"},{"tp":"GitHub","tc":"b-github","t":"LMAX Disruptor","d":"Lock-free Ring Buffer，百万 TPS，Cache Line 对齐设计","s":"lmax-exchange/disruptor","u":"https://lmax-exchange.github.io/disruptor/","lv":"adv"}]},{"id":"jvm","phase":"Phase 2 · Java 生态","title":"Java Core · JVM · GC · 诊断","color":"#dc2626","bg":"#FEF2F2","intro":"JVM 是理解 Spring/Kafka/Netty 行为的底层视角。GC 暂停影响服务延迟；JIT 逃逸分析决定对象是否上堆；类加载双亲委派决定框架隔离边界。async-profiler 是生产诊断的核心工具。","notes":[{"h":"JVM 内存区域与对象生命周期","pts":["JVM 内存分区：堆（Heap，Young Generation + Old Generation + 对象分配）/ 方法区（Metaspace，类元信息/常量池/JIT 编译代码）/ 虚拟机栈（每个线程独立，栈帧含局部变量表/操作数栈/动态链接）/ 本地方法栈 / 程序计数器。","对象分配流程：先在 Eden 区 TLAB（Thread Local Allocation Buffer）分配（无锁），Eden 满触发 Minor GC，存活对象经 Survivor 区年龄计数，超过阈值（默认 15）晋升 Old Gen。大对象（超过 -XX:PretenureSizeThreshold）直接进老年代。","Metaspace（Java 8+ 替代 PermGen）使用本机内存，默认无上限，类加载过多（如 CGLib 动态代理大量生成类）会导致 Metaspace OOM。监控 Metaspace 使用量是排查内存泄漏的重要维度。","对象引用强度：强引用（GC 不回收）> 软引用（内存不足时回收，适合缓存）> 弱引用（下次 GC 即回收，WeakHashMap）> 虚引用（用于 off-heap 内存管理通知，如 NIO DirectByteBuffer）。"],"img_key":"jvm_memory","img_link":"JVM Memory Model","img_title":"https://en.wikipedia.org/wiki/Java_virtual_machine"},{"h":"GC 算法演进与调优","pts":["Serial GC：单线程 STW（Stop The World），适合单核小内存环境。Parallel GC（-XX:+UseParallelGC）：多线程并行 GC，吞吐优先，会产生较长 STW 暂停。","CMS（Concurrent Mark Sweep）：并发标记减少 STW，但有内存碎片（不做整理），Full GC 时 STW 时间长，Java 14 已废弃。G1（-XX:+UseG1GC）：Region 化堆，可预测停顿时间（-XX:MaxGCPauseMillis），Java 9+ 默认。","ZGC（Java 15+ 生产就绪）：使用 Colored Pointers + Load Barriers 实现全并发 GC，STW 暂停从 ms 级降到 1-10ms（无论堆大小），适合低延迟服务（交易系统/实时推荐）。Shenandoah 类似，OpenJDK 8+ 支持。","GC 调优三板斧：1）合理设置堆大小（-Xmx/-Xms 保持一致避免动态扩容）；2）观察 GC 日志（-Xlog:gc*）分析暂停频率和时长；3）根据对象生命周期调整 Young/Old 比例，减少晋升和 Full GC。","堆外内存（Direct Memory/Off-Heap）不受 GC 管理，需要手动或通过 Cleaner 机制释放。Netty 的 ByteBuf 池化、Kafka 的 Producer/Consumer Buffer 都使用堆外内存，避免大对象 GC 影响。"],"img_key":"gc_evolution","img_link":"Garbage Collection","img_title":"https://en.wikipedia.org/wiki/Garbage_collection_(computer_science)"},{"h":"JIT 编译与性能优化","pts":["JIT 分层编译（Tiered Compilation）：C1 编译器（快速编译，有限优化）负责热点方法的快速编译；C2 编译器（耗时优化，激进内联）对高频热点做深度优化。方法调用超过约 10000 次触发 C2。","逃逸分析（Escape Analysis）：JIT 分析对象是否逃出方法作用域。若不逃逸，可以栈上分配（避免 GC）或标量替换（把对象字段拆成局部变量，彻底消除对象分配）。这是 JVM 最重要的运行时优化。","锁消除（Lock Elimination）：JIT 发现锁对象不逃逸（不会被其他线程竞争）时，自动消除 synchronized 同步块的开销。StringBuffer 在单线程场景的 append 操作会被 JIT 消除锁。","内联（Inlining）是 JIT 最重要的优化：将被调用方法体直接嵌入调用处，消除方法调用开销，同时为更多优化（如常量折叠）提供可能。-XX:MaxInlineSize 控制内联方法的字节码大小阈值（默认 35 字节）。"],"img_key":"jit","img_link":"Just-in-time Compilation","img_title":"https://en.wikipedia.org/wiki/Just-in-time_compilation"},{"h":"类加载与双亲委派","pts":["类加载器层次：Bootstrap ClassLoader（加载 JDK 核心库 rt.jar，C++ 实现）→ Extension ClassLoader（加载 ext 目录）→ Application ClassLoader（加载 classpath）→ 自定义 ClassLoader。","双亲委派机制：加载类时先委派给父加载器，父加载器找不到才自己加载。目的：避免核心类被替换（用户写的 java.lang.String 永远不会被加载），保证类的全局唯一性。","破坏双亲委派的三种场景：1）SPI（ServiceLoader，JDBC Driver 需要子加载器加载实现类）；2）Tomcat（Web 应用隔离，每个 war 独立 ClassLoader）；3）OSGI（热部署，动态卸载 Bundle）；4）Spring Boot Fat Jar（LaunchedURLClassLoader）。","Class.forName() vs ClassLoader.loadClass()：前者会执行静态初始化块（适合 JDBC Driver 注册），后者只加载不初始化。理解这个区别是排查框架初始化问题的关键。"],"img_key":"classloader","img_link":"Java Class Loader","img_title":"https://en.wikipedia.org/wiki/Java_Classloader"},{"h":"生产诊断工具链","pts":["async-profiler：低开销（< 1% CPU）采样型性能分析器，基于 AsyncGetCallTrace API 避免 safepoint 偏差，生成 CPU/内存/锁 火焰图。生产环境安全使用，是排查 CPU 热点的首选工具。","JFR（Java Flight Recorder）：JVM 内置事件记录系统，记录 GC/类加载/线程/JIT/网络/文件 I/O 事件，开销约 1-2%，可在生产常态化开启。配合 JMC（Java Mission Control）分析。","jstack 分析线程转储（Thread Dump）：找 BLOCKED 线程（锁竞争）/WAITING 线程（等待通知），通过 waiting to lock 和 locked 找死锁。生产环境间隔 5s 连续抓 3 次 jstack 对比是标准做法。","MAT（Memory Analyzer Tool）分析 heap dump：找内存泄漏的主要工具，Dominator Tree 显示哪个对象持有最多内存，Leak Suspects 自动分析可疑泄漏点。配合 -XX:+HeapDumpOnOutOfMemoryError 自动触发。"]}],"res":[{"tp":"官方规范","tc":"b-docs","t":"JVM Specification (Java SE 21)","d":"字节码/类文件格式/运行时数据区，理解 JVM 的第一手资料","s":"Oracle","u":"https://docs.oracle.com/javase/specs/jvms/se21/html/","lv":"adv"},{"tp":"GitHub","tc":"b-github","t":"async-profiler","d":"生产级低开销性能分析器，CPU/内存/锁火焰图","s":"async-profiler/async-profiler","u":"https://github.com/async-profiler/async-profiler","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Aleksey Shipilev — JVM 深度博客","d":"JMM/GC/ZGC 权威分析，OpenJDK 贡献者","s":"shipilev.net","u":"https://shipilev.net/","lv":"adv"},{"tp":"官方文档","tc":"b-docs","t":"Java Flight Recorder 文档","d":"JVM 内置低开销事件记录，生产常态化开启","s":"Oracle","u":"https://docs.oracle.com/en/java/javase/21/troubleshoot/java-flight-recorder.html","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Virtual Threads (Project Loom) JEP 444","d":"Java 21 协程级虚拟线程，无需改代码支持百万并发","s":"openjdk.org","u":"https://openjdk.org/jeps/444","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Baeldung Java Core 系列","d":"集合/IO/反射/泛型实践教程，实例代码丰富","s":"baeldung.com","u":"https://www.baeldung.com/java-tutorial","lv":"entry"}]},{"id":"conc","phase":"Phase 2 · Java 生态","title":"Java 并发 · JMM · 线程池","color":"#b91c1c","bg":"#FFF1F2","intro":"JMM happens-before 是理解所有并发代码正确性的核心；AQS 是 JUC 全部锁和同步器的骨架；线程池七参数决定系统弹性边界。Spring 事务失效的 90% 原因都源自对并发和代理模型的误解。","notes":[{"h":"JMM 与 happens-before","pts":["Java 内存模型（JMM）定义了多线程读写共享变量的可见性规则。核心问题：编译器重排序 + CPU 乱序执行 + 多核 Cache 不一致，导致一个线程的写操作对另一个线程不可见。","happens-before 偏序关系：如果 A happens-before B，则 A 的内存操作对 B 完全可见。六大规则：程序顺序规则、监视器锁规则（unlock HB lock）、volatile 规则（写 HB 读）、线程启动/join 规则、中断规则、传递性。","volatile 的两个语义：1）可见性（写操作立即刷新到主内存，读操作从主内存读取，不走 CPU Cache）；2）禁止重排序（通过内存屏障 StoreStore/LoadLoad/StoreLoad 实现）。volatile 不保证原子性（i++ 仍是非原子操作）。","double-checked locking 的正确写法必须使用 volatile 修饰单例字段，否则 new 操作的三步（分配内存/初始化对象/赋值引用）可能被重排，导致其他线程看到未初始化的对象引用。","final 字段的特殊语义：构造函数完成后，final 字段的值对所有线程可见（即使没有 volatile/synchronized），前提是 this 引用不在构造函数中逃逸（不要在构造函数里把 this 发布到其他线程）。"],"img_key":"jmm","img_link":"Java Memory Model","img_title":"https://en.wikipedia.org/wiki/Java_memory_model"},{"h":"synchronized 锁升级与 AQS","pts":["synchronized 锁升级路径（单向，不可降级）：无锁 → 偏向锁（CAS 把线程ID写入对象头 Mark Word，同一线程重入无竞争开销）→ 轻量级锁（有竞争，CAS 自旋，栈帧锁记录）→ 重量级锁（OS Mutex，线程挂起/唤醒，代价最高）。","AQS（AbstractQueuedSynchronizer）是 JUC 锁和同步器的骨架：内部维护一个 volatile int state 和一个 FIFO 等待队列（CLH 变体）。ReentrantLock/Semaphore/CountDownLatch/CyclicBarrier/ReentrantReadWriteLock 都基于 AQS。","ReentrantLock vs synchronized：前者支持可中断等待（lockInterruptibly）、超时等待（tryLock(time)）、公平锁（FairSync）、条件变量（Condition，更细粒度的 wait/notify）。synchronized 是 JVM 关键字，JIT 可深度优化（锁消除/粗化）。","StampedLock（Java 8）：乐观读锁（不阻塞写，读后校验 stamp 决定是否重读）+ 悲观读锁 + 写锁。读多写少场景比 ReadWriteLock 高效约 2-3x。注意：不支持可重入，不支持条件变量。","LockSupport.park()/unpark() 是所有阻塞原语的底层：基于 per-thread 的 permit（非 0/1 信号量，只有 0/1 两个状态）。AQS 等待队列的节点挂起/唤醒都通过 LockSupport 实现，比 Object.wait/notify 更灵活（先 unpark 后 park 不会卡住）。"],"img_key":"lock_upgrade","img_link":"Java Synchronized","img_title":"https://en.wikipedia.org/wiki/Monitor_(synchronization)"},{"h":"原子类与无锁编程","pts":["CAS（Compare And Swap）是无锁编程的基础：原子比较 expected 和当前值，相等则更新为 new value，返回是否成功。底层是 CPU 原子指令（x86 CMPXCHG，带 LOCK 前缀保证多核原子性）。","ABA 问题：CAS 检测值未变，但实际经历了 A→B→A 的变化。解决：AtomicStampedReference（带版本号）或 AtomicMarkableReference（带布尔标记）。实际业务中用数据库版本号乐观锁更常见。","LongAdder（Java 8）：高并发计数器，内部用分段（cells 数组）减少竞争，每个线程优先操作 hash 到的 cell，最终 sum 累加所有 cell。高并发下比 AtomicLong 快 5-10 倍。Prometheus Counter 的 Java 实现就用了类似思路。","VarHandle（Java 9）：取代 Unsafe 的直接内存/字段操作，提供 getVolatile/setVolatile/compareAndSet 等原子操作，是标准化的低级并发工具。"]},{"h":"线程池与异步编程","pts":["ThreadPoolExecutor 七参数：corePoolSize（核心线程数，常驻）/ maximumPoolSize（最大线程数）/ keepAliveTime（非核心线程空闲存活时间）/ workQueue（任务队列类型）/ threadFactory / rejectedExecutionHandler。","线程池执行逻辑：提交任务 → 小于 corePoolSize 则新建线程 → 大于 core 则入队（workQueue）→ 队列满则新建线程到 maxPoolSize → 全满则执行拒绝策略（AbortPolicy/CallerRunsPolicy/DiscardPolicy/DiscardOldestPolicy）。","ForkJoinPool（Java 7）：work-stealing 算法，每个线程有自己的 deque，空闲时从其他线程 deque 末尾偷任务。适合 CPU 密集型的递归分治任务（Parallel Stream 底层使用 ForkJoinPool.commonPool()）。","CompletableFuture 异步编排：thenApply（同步转换结果）/ thenApplyAsync（异步执行）/ thenCompose（链式异步）/ thenCombine（合并两个 Future）/ allOf/anyOf（等待多个）。异常处理用 exceptionally/handle 而不是 try-catch。","Project Reactor（WebFlux 底层）：Mono（0或1个元素）/ Flux（0到N个元素），基于 Reactive Streams 规范。背压（Backpressure）是关键特性：消费者告知生产者自己的处理能力（request(n)），防止生产过快压垮消费者。"]}],"res":[{"tp":"书籍","tc":"b-book","t":"Java Concurrency in Practice (JCIP)","d":"Java 并发圣经，Brian Goetz 著，可见性/原子性/线程安全，必读","s":"Addison-Wesley","u":"https://jcpintoc.com/","lv":"adv"},{"tp":"论文","tc":"b-paper","t":"JSR-133: Java Memory Model Specification","d":"JMM 官方规范，happens-before/volatile/synchronized 语义权威定义","s":"cs.umd.edu","u":"https://www.cs.umd.edu/~pugh/java/memoryModel/jsr133.pdf","lv":"adv"},{"tp":"博客","tc":"b-blog","t":"JMM Pragmatics — Aleksey Shipilev","d":"JMM 实践深度解析，happens-before 真实含义，volatile/final 具体语义","s":"shipilev.net","u":"https://shipilev.net/blog/2014/jmm-pragmatics/","lv":"adv"},{"tp":"博客","tc":"b-blog","t":"Doug Lea 并发编程主页","d":"JUC 作者，AQS/ForkJoinPool 设计文档，并发原语第一手资料","s":"gee.cs.oswego.edu","u":"http://gee.cs.oswego.edu/","lv":"adv"},{"tp":"博客","tc":"b-blog","t":"CompletableFuture 完整指南 (Baeldung)","d":"异步编排 thenApply/allOf/异常处理，实践模式","s":"baeldung.com","u":"https://www.baeldung.com/java-completablefuture","lv":"mid"}]},{"id":"spring","phase":"Phase 2 · Java 生态","title":"Spring Boot · Cloud · Security","color":"#16a34a","bg":"#F0FDF4","intro":"Spring IoC 的本质是依赖注入控制反转；AOP 的本质是动态代理；自动装配的本质是 SPI + Conditional。理解这三点，所有 Spring 黑魔法都能解释。Spring Cloud 是微服务治理的全家桶。","notes":[{"h":"IoC 容器与 Bean 生命周期","pts":["IoC（控制反转）把对象的创建和依赖注入的控制权从代码中转移到框架（容器）。BeanFactory 是基础容器接口，ApplicationContext 扩展了国际化/事件/资源加载，是实际使用的容器。","Bean 生命周期关键节点：实例化（Constructor）→ 依赖注入（@Autowired）→ BeanNameAware/BeanFactoryAware 接口回调 → BeanPostProcessor.postProcessBeforeInitialization → @PostConstruct → InitializingBean.afterPropertiesSet → @Bean(initMethod) → BeanPostProcessor.postProcessAfterInitialization → 就绪。","BeanPostProcessor 是 Spring 最重要的扩展点：对所有 Bean 创建过程进行干预。AOP 代理（AbstractAutoProxyCreator）、@Autowired 注入（AutowiredAnnotationBeanPostProcessor）、@Valid 校验都是通过 BeanPostProcessor 实现的。","@Autowired 注入的歧义问题（多个实现类）：用 @Qualifier 指定名称，或 @Primary 标记首选实现，或注入 List<Interface> 获取所有实现。Spring 的注入是通过反射设置字段值，即使 private 字段也能注入（破坏封装性，推荐构造器注入）。"],"img_key":"ioc","img_link":"Inversion of Control","img_title":"https://en.wikipedia.org/wiki/Inversion_of_control"},{"h":"AOP 原理与事务失效","pts":["Spring AOP 的实现：若目标类实现了接口，默认用 JDK 动态代理（Proxy.newProxyInstance，生成接口的代理类）；若没有接口，用 CGLIB（继承目标类生成子类代理）。Spring Boot 2.x 默认对所有类用 CGLIB。","事务失效的根本原因是 AOP 代理：@Transactional 通过 AOP 在方法调用前后添加事务逻辑。如果在同一个 Bean 内部直接调用加了 @Transactional 的方法（this.method()），绕过了代理对象，事务不生效。","事务传播行为（Propagation）：REQUIRED（默认，有事务则加入，没有则新建）/ REQUIRES_NEW（总是新建，外层事务挂起）/ NESTED（嵌套事务，外层回滚则内层也回滚，内层回滚不影响外层）。理解传播行为是解决事务嵌套问题的关键。","事务隔离级别对应数据库隔离级别（DEFAULT 使用数据库默认，通常是 READ_COMMITTED 或 REPEATABLE_READ）。@Transactional(readOnly=true) 优化：提示数据库驱动只做查询优化，如 Hibernate 跳过脏检查（Dirty Checking）。"],"img_key":"aop","img_link":"Aspect-Oriented Programming","img_title":"https://en.wikipedia.org/wiki/Aspect-oriented_programming"},{"h":"Spring Boot 自动装配原理","pts":["自动装配核心：@SpringBootApplication 包含 @EnableAutoConfiguration，触发 AutoConfigurationImportSelector，读取 META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports 文件（Spring Boot 3.x）中的所有自动配置类。","@Conditional 系列注解控制 Bean 是否创建：@ConditionalOnClass（类路径有该类才装配）/ @ConditionalOnMissingBean（容器中没有该 Bean 才装配）/ @ConditionalOnProperty（配置文件属性满足才装配）。这是自动装配的核心机制。","Spring Boot 外部化配置优先级（由高到低）：命令行参数 > JNDI > 系统属性 > 环境变量 > application-{profile}.properties > application.properties > 默认值。12-Factor App 原则要求配置与代码分离。","Spring Boot Actuator：/actuator/health（健康检查）/ /actuator/metrics（Micrometer 指标）/ /actuator/env（环境变量）/ /actuator/loggers（动态调整日志级别）。生产环境应通过 Security 保护 Actuator 端点。"],"img_key":"springboot_auto","img_link":"Spring Boot","img_title":"https://en.wikipedia.org/wiki/Spring_Framework"},{"h":"Spring Cloud 微服务治理","pts":["Nacos（阿里，推荐）集成了服务发现 + 配置中心，支持动态配置推送（长轮询机制），健康检查分临时实例（心跳 TTL）和永久实例（主动探测）。Eureka（Netflix，已进入维护模式）只做服务发现，AP 模型。","Spring Cloud Gateway：基于 WebFlux（非阻塞），RoutePredicateHandlerMapping + GatewayFilterChain 责任链处理请求。内置过滤器：断路器（Resilience4j 集成）/ 限流（Redis + Lua 滑动窗口）/ 重试 / 请求修改。","OpenFeign 声明式 HTTP 客户端：接口 + 注解定义远程调用，底层用 JDK 动态代理 + OkHttp/HttpClient 发请求。整合 Nacos 服务发现和 Sentinel 熔断限流后，是微服务间调用的标准方案。","Sentinel（阿里）vs Hystrix（Netflix，已停止维护）：Sentinel 基于滑动时间窗口计数 + 令牌桶限流，支持 QPS/并发线程数/响应时间三维度规则，Dashboard 实时监控和动态规则推送。熔断策略：慢调用比例/异常比例/异常数三种。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"Spring Framework 官方参考文档","d":"IoC/AOP/事务/Web MVC/WebFlux 完整参考","s":"spring.io","u":"https://docs.spring.io/spring-framework/reference/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Spring Boot Reference Documentation","d":"自动装配原理/Actuator/外部化配置/测试","s":"spring.io","u":"https://docs.spring.io/spring-boot/docs/current/reference/html/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Spring Security 官方文档","d":"SecurityFilterChain/OAuth2/JWT/SAML 完整实现","s":"spring.io","u":"https://docs.spring.io/spring-security/reference/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Spring Cloud 文档","d":"服务发现/Gateway/Config/OpenFeign/Sentinel 全家桶","s":"spring.io","u":"https://spring.io/projects/spring-cloud","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Baeldung Spring 全系列教程","d":"Spring Boot/Security/Data/Cloud 数百篇实践教程","s":"baeldung.com","u":"https://www.baeldung.com/spring-tutorial","lv":"entry"}]},{"id":"db","phase":"Phase 3 · 单机存储","title":"MySQL 深度 · Redis · 索引优化","color":"#d97706","bg":"#FEF3C7","intro":"B-Tree 索引的本质是减少磁盘 IO；MVCC 让读写不互锁；WAL 保证崩溃恢复。Redis 高性能根源是单线程事件循环 + 内存操作 + IO 多路复用三合一，而不只是因为用了内存。","notes":[{"h":"InnoDB 存储引擎核心","pts":["Buffer Pool 是 InnoDB 最核心的内存结构（建议设为可用内存的 70-80%）：缓存数据页和索引页，LRU 变体（young/old 区避免全表扫描污染热数据），脏页由后台 Checkpoint 机制异步刷盘。","Redo Log（重做日志）：WAL（Write-Ahead Logging）的实现，先写 Redo Log Buffer，再写数据页。崩溃恢复时重放 Redo Log 保证已提交事务不丢失。Undo Log：记录行数据的旧版本，用于事务回滚和 MVCC 读历史版本。","MVCC（多版本并发控制）：每行数据有两个隐藏字段（trx_id/roll_pointer），事务根据 ReadView（快照）决定可见哪个版本。REPEATABLE READ 隔离级别的 ReadView 在第一次快照读时创建，同一事务内看到一致的快照，实现不加锁的一致性读。","聚簇索引（Clustered Index）：InnoDB 表的主键索引，叶子节点存储完整行数据。辅助索引（Secondary Index）叶子节点存主键值，查询需要回表（二次查询主键索引）。覆盖索引（Covering Index）：查询字段都在索引中，避免回表。"],"img_key":"innodb","img_link":"InnoDB","img_title":"https://en.wikipedia.org/wiki/InnoDB"},{"h":"索引设计与查询优化","pts":["B+ Tree 索引特性：非叶子节点只存键值（高度低，通常 3-4 层支撑千万级数据）；叶子节点双向链表（范围查询高效）；所有数据在叶子节点（查询稳定 O(log n)）。InnoDB 页大小默认 16KB，对应 SSD 页大小优化 IO。","最左前缀原则：复合索引（a, b, c）支持 a、a+b、a+b+c 的查询，但不支持跳过前缀（b 或 b+c 单独查询）。索引下推（ICP，Index Condition Pushdown）：在引擎层过滤不满足条件的行，减少回表次数。","慢查询排查步骤：EXPLAIN 分析执行计划（关注 type 字段：ref > range > index > ALL），观察 key（使用了哪个索引）、rows（估算扫描行数）、Extra（Using filesort/Using temporary 是警告信号）。","分库分表的核心问题：跨分片聚合查询、分页（需要每个分片查再合并归并排序）、分布式 ID（雪花算法/UUID）、跨分片事务（用 Saga 最终一致性替代 2PC）。分库分表是最后手段，先考虑读写分离、索引优化、Redis 缓存。"],"img_key":"btree_index","img_link":"B+ Tree","img_title":"https://en.wikipedia.org/wiki/B%2B_tree"},{"h":"Redis 内部实现","pts":["Redis 主要数据结构内部实现：String（SDS，Simple Dynamic String，记录长度避免 strlen 扫描）/ List（quicklist = 双向链表 + 压缩列表）/ Hash（ziplist 小时 → hashtable 大时，渐进式 rehash）/ Set（intset 纯整数 → hashtable）/ ZSet（ziplist 小时 → skiplist+hashtable 大时）。","跳跃表（Skip List）是 Sorted Set 的核心数据结构：多层链表，最底层包含所有元素，上层是快速跳过层。查找/插入/删除平均 O(log n)，实现简单（比红黑树），支持范围查询（ZRANGEBYSCORE），Redis 作者 antirez 偏爱其简洁性。","Redis 持久化：RDB（fork + COW 快照，定期生成紧凑二进制文件，重启快）vs AOF（记录每条写命令，fsync 策略：always/everysec/no，数据更完整但重启慢）。推荐生产环境同时开启两者（RDB 快速恢复 + AOF 减少数据丢失）。","Redis 集群（Redis Cluster）：16384 个 hash slot 分配到各节点，key 通过 CRC16 哈希决定 slot，相同 {hash tag} 的 key 落同一 slot（保证 MSET/Pipeline 跨 key 操作）。节点间通过 gossip 协议（PING/PONG/MEET）同步集群状态。"],"img_key":"redis_ds","img_link":"Redis","img_title":"https://en.wikipedia.org/wiki/Redis"}],"res":[{"tp":"官方文档","tc":"b-docs","t":"MySQL 8.0 Reference Manual","d":"InnoDB 架构/事务隔离/索引/主从复制，权威官方参考","s":"dev.mysql.com","u":"https://dev.mysql.com/doc/refman/8.0/en/","lv":"mid"},{"tp":"免费指南","tc":"b-book","t":"Use The Index, Luke!","d":"B-Tree 原理/复合索引/覆盖索引/排序，SQL 索引优化权威","s":"use-the-index-luke.com","u":"https://use-the-index-luke.com/","lv":"mid"},{"tp":"免费书","tc":"b-book","t":"Redis 设计与实现","d":"跳跃表/ziplist/dict rehash/AOF/RDB 内部实现","s":"redisbook.com","u":"https://redisbook.com/","lv":"mid"},{"tp":"课程","tc":"b-course","t":"Redis University 免费课程","d":"官方免费：数据结构/流处理/安全，附认证","s":"university.redis.com","u":"https://university.redis.com/","lv":"entry"},{"tp":"书籍","tc":"b-book","t":"High Performance MySQL (4th Ed.)","d":"查询优化/Schema 设计/复制/分区/监控","s":"O'Reilly","u":"https://www.oreilly.com/library/view/high-performance-mysql/9781492080503/","lv":"adv"}]},{"id":"storage","phase":"Phase 3 · 单机存储","title":"存储引擎 · LSM-Tree · 分布式 DB","color":"#92400e","bg":"#FEF3E2","intro":"B-Tree 和 LSM-Tree 的根本权衡是随机写 vs 读放大。理解这个权衡，就理解了 InnoDB vs RocksDB vs HBase vs Cassandra 的差异。Spanner 的 TrueTime 是分布式事务的工程极限。","notes":[{"h":"B-Tree vs LSM-Tree 核心权衡","pts":["B-Tree（InnoDB/PostgreSQL）：读性能优秀（O(log n) 定位到叶子节点），原地更新（in-place update），随机写需要多次磁盘寻道（写放大约 5-20x）。适合读多写少、随机读场景。","LSM-Tree（RocksDB/HBase/Cassandra/ClickHouse MergeTree）：所有写入先写 WAL + MemTable（内存），MemTable 满时 flush 成 SSTable（有序文件）。写入顺序 IO，吞吐极高，但读需要查多个 SSTable（读放大）。","Compaction 是 LSM-Tree 的核心后台任务：合并多个 SSTable，删除过期/删除标记（tombstone）的数据，减少读放大。Size-tiered Compaction（写放大小，读放大大）vs Leveled Compaction（读放大小，写放大大）。","RocksDB 的优化：Column Family（多个 MemTable/SSTable 组，独立 Compaction）/ Block Cache（读缓存，类似 Buffer Pool）/ Bloom Filter（每个 SSTable 有 Bloom Filter，快速判断 key 是否存在，大幅减少无效 I/O）。","Write Amplification（写放大）是 SSD 选型的关键：SSD 的写入寿命（P/E Cycles）有限，LSM-Tree 的 Compaction 会大量重写数据。高写入工作负载要选 MLC/SLC SSD 或 Optane PMEM，并监控 WAF（Write Amplification Factor）。"],"img_key":"btree_vs_lsm","img_link":"LSM Tree","img_title":"https://en.wikipedia.org/wiki/Log-structured_merge-tree"},{"h":"分布式数据库设计","pts":["一致性哈希（Consistent Hashing）：节点增减时只有 1/N 的数据需要重新分配（vs 取模哈希的全量重分配）。虚拟节点（Virtual Nodes）解决数据倾斜：每个物理节点映射到多个虚拟节点，分布更均匀。Cassandra/DynamoDB/Redis Cluster 都使用一致性哈希。","Quorum 读写（W + R > N 保证强一致性）：N 是副本数，W 是写入需要确认的副本数，R 是读取需要的副本数。典型配置：N=3, W=2, R=2（CAP 中的 CP）或 W=1, R=1（AP，低延迟高可用但可能读到旧值）。","Google Spanner 的 TrueTime API：每个数据中心有原子钟 + GPS 接收机，TrueTime 提供带误差区间的时间戳 [earliest, latest]。事务提交时等待不确定区间（约 7ms）过去，确保全球时间顺序。这是分布式事务实现外部一致性的工程极限方案。","HTAP（Hybrid Transactional/Analytical Processing）：TiDB 的 TiKV（Raft 强一致 TP 引擎）+ TiFlash（列存 AP 副本，通过 Raft 从 TiKV 同步）。同一份数据同时服务实时写入和分析查询，无需 ETL。"]}],"res":[{"tp":"书籍","tc":"b-book","t":"Designing Data-Intensive Applications (DDIA)","d":"存储引擎/复制/分片/事务/一致性，分布式系统圣经","s":"O'Reilly — Martin Kleppmann","u":"https://dataintensive.net/","lv":"mid"},{"tp":"书籍","tc":"b-book","t":"Database Internals (Alex Petrov)","d":"B-Tree/LSM-Tree/Compaction/WAL/事务协议深度工程视角","s":"O'Reilly","u":"https://www.databass.dev/","lv":"adv"},{"tp":"论文","tc":"b-paper","t":"Amazon Dynamo: Highly Available Key-Value Store","d":"一致性哈希/向量时钟/最终一致性，NoSQL 奠基论文","s":"SOSP 2007","u":"https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf","lv":"adv"},{"tp":"视频","tc":"b-video","t":"CMU Database Group — Andy Pavlo Lectures","d":"Storage/Indexing/Concurrency/Query Optimization 完整视频","s":"YouTube — CMU Database Group","u":"https://www.youtube.com/c/CMUDatabaseGroup","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"Spanner: Google's Globally Distributed Database","d":"TrueTime/全局强一致事务/CAP 定理工程极限","s":"OSDI 2012","u":"https://static.googleusercontent.com/media/research.google.com/en//archive/spanner-osdi2012.pdf","lv":"adv"}]},{"id":"virt","phase":"Phase 4 · 基础设施","title":"虚拟化 · 容器 · K8s 基础","color":"#0891b2","bg":"#ECFEFF","intro":"容器不是新技术，是 Linux namespaces + cgroups 的组合。理解六种 namespace 隔离和 cgroups v2 资源控制，才能真正理解容器安全边界在哪里，K8s 又在容器之上解决了什么问题。","notes":[{"h":"虚拟化原理","pts":["Type 1 Hypervisor（裸金属，KVM/Xen/Hyper-V）直接运行在硬件上，性能损耗约 5-10%。Type 2 Hypervisor（宿主型，VirtualBox）运行在 OS 之上，性能损耗约 20-30%。AWS/GCP/Azure 都使用 KVM 变体。","Intel VT-x / AMD-V 硬件虚拟化：CPU 增加 VMX root mode（Hypervisor 运行）和 VMX non-root mode（Guest OS 运行）。特权指令在 non-root mode 触发 VM-exit 陷入 Hypervisor 处理，VMCS（Virtual Machine Control Structure）保存/恢复上下文。","内存虚拟化：EPT/NPT（扩展页表/嵌套页表）增加一级页表映射（GPA→HPA），Guest OS 的内存访问由 CPU 硬件自动完成二级翻译，无需 Hypervisor 干预。早期影子页表方案需要 Hypervisor 维护，开销大。","AWS Nitro 系统（2017+）：把网络/存储/安全监控功能从主机 CPU 卸载到专用 Nitro 芯片（基于 FPGA/ASIC），主机 CPU 100% 归客户实例使用。传统 Hypervisor 会占用 5-30% 的 CPU，Nitro 把这个开销降到约 0%。"]},{"h":"容器核心：Namespace + cgroups","pts":["Linux namespaces 提供六种资源隔离：PID（进程 ID，容器内看不到宿主进程）/ NET（独立网络栈，每个容器有自己的网卡/IP/路由）/ MNT（独立文件系统挂载点）/ UTS（独立 hostname）/ IPC（独立 System V IPC）/ USER（UID/GID 映射，容器内 root 对应宿主非 root）。","cgroups v2（Unified Hierarchy）统一了 CPU/Memory/Block I/O/Network 的资源限制和优先级控制。PSI（Pressure Stall Information）新增了实时压力感知：cpu.pressure/memory.pressure/io.pressure，K8s 的 QoS/HPA/OOM Killer 都依赖 PSI。","OCI 镜像规范：镜像由多个只读层（Layer）叠加，每层是文件系统变更的 tar 包。Union FS（overlay2 驱动）把多个层合并成一个虚拟文件系统视图。容器启动时在顶部加一个可写层（Container Layer），写时复制（Copy-on-Write）修改下层文件。","Distroless 镜像：只包含应用运行时，没有 shell/包管理器，攻击面极小，镜像体积小（几 MB vs 几百 MB）。Google 内部大量使用，适合 Java/Go/Node 应用的生产镜像。"],"img_key":"container","img_link":"Linux Containers","img_title":"https://en.wikipedia.org/wiki/Linux_namespaces"},{"h":"K8s 核心概念与架构","pts":["K8s 控制面：etcd（状态存储，Raft 强一致）/ API Server（所有操作的唯一入口，无状态可横向扩展）/ Scheduler（为 Pod 选节点，Filter + Score 两阶段）/ Controller Manager（Deployment/StatefulSet/HPA 等控制器运行的进程）。","Pod 是调度和生命周期的最小单位，是一组紧密协作的容器（共享网络命名空间和 PID 命名空间）。Sidecar 容器（如 Envoy/日志收集器）与主容器在同一 Pod，共享 localhost 网络。Init Container 在主容器启动前按顺序运行完成。","Service 是稳定的虚拟 IP + 端口（ClusterIP），通过 kube-proxy 实现负载均衡（iptables 规则 或 IPVS 或 eBPF）。Ingress 是 L7 HTTP 路由，Ingress Controller（Nginx/Traefik/Envoy Gateway）是实际实现者，K8s 只定义了 Ingress 资源规范。","CNI（Container Network Interface）是 K8s 网络插件规范：Flannel（VXLAN overlay，简单但性能有损耗）/ Calico（BGP L3 路由，无 overlay，高性能）/ Cilium（eBPF 数据面，替代 kube-proxy，零 iptables，网络策略性能最高）。"],"img_key":"k8s_arch","img_link":"Kubernetes Architecture","img_title":"https://kubernetes.io/docs/concepts/architecture/"}],"res":[{"tp":"官方文档","tc":"b-docs","t":"Kubernetes 官方文档","d":"Pod/Service/Deployment/RBAC/CNI 完整参考","s":"kubernetes.io","u":"https://kubernetes.io/docs/home/","lv":"mid"},{"tp":"GitHub","tc":"b-github","t":"Kubernetes the Hard Way (Kelsey Hightower)","d":"从零手动搭建 K8s 集群，理解每个组件的作用","s":"kelseyhightower","u":"https://github.com/kelseyhightower/kubernetes-the-hard-way","lv":"adv"},{"tp":"书籍","tc":"b-book","t":"Container Security (Liz Rice, 免费)","d":"namespace 隔离边界/seccomp/capabilities/Distroless","s":"containersecurity.tech","u":"https://containersecurity.tech/","lv":"mid"},{"tp":"可视化","tc":"b-visual","t":"CNCF Cloud Native Landscape","d":"云原生技术全景图，1000+ 项目分类索引","s":"landscape.cncf.io","u":"https://landscape.cncf.io/","lv":"entry"},{"tp":"官方文档","tc":"b-docs","t":"Docker 官方文档","d":"容器基础/Dockerfile/多阶段构建/Compose/网络","s":"docs.docker.com","u":"https://docs.docker.com/","lv":"entry"}]},{"id":"micro","phase":"Phase 5 · 分布式架构","title":"微服务 · DDD · 分布式模式","color":"#7e22ce","bg":"#F5F3FF","intro":"微服务解决独立部署和团队自治，但引入了分布式事务和网络失败。Saga/CQRS/Event Sourcing 是分布式系统设计的三大利器，理解它们的适用边界是架构师的核心能力。","notes":[{"h":"DDD 与服务拆分","pts":["领域驱动设计（DDD）的核心工具：Bounded Context（限界上下文）—— 一个子域内模型的明确边界，不同 Context 内同一词（如 Customer）可以有不同含义。Context Map 描述 Context 间的关系（Upstream/Downstream/Partnership/ACL）。","聚合根（Aggregate Root）是一组强关联对象的入口，外部只能通过聚合根访问内部对象。聚合边界决定了事务边界（一个事务只能修改一个聚合），也决定了微服务的边界（一个聚合通常对应一个微服务）。","服务拆分反模式——分布式单体（Distributed Monolith）：服务虽然分开部署，但高度耦合（强依赖对方数据库/同步调用链过长），无法独立部署，享受了分布式的所有缺点但没有收益。避免方法：每个服务自己管理数据，通过事件异步通信。","康威定律的实践意义：系统架构倾向于反映设计它的组织的沟通结构。逆向康威定律（Inverse Conway Maneuver）：先确定目标架构，再调整团队组织结构以匹配。微服务边界本质上是团队边界。"],"img_key":"ddd","img_link":"Domain-Driven Design","img_title":"https://en.wikipedia.org/wiki/Domain-driven_design"},{"h":"分布式关键模式","pts":["Saga 模式解决跨服务的分布式事务：把一个长事务分解为多个本地事务，每步成功后向下进行，失败时执行补偿事务（Compensating Transaction）回滚。Choreography（事件编排，松耦合，追踪困难）vs Orchestration（中心协调器，可追踪，单点）。","CQRS（命令查询责任分离）：写操作（Command）和读操作（Query）分别走不同模型，可以分开优化。写模型关注聚合一致性，读模型关注查询效率（可以是专门的查询数据库）。配合 Event Sourcing 使用效果最佳。","Event Sourcing（事件溯源）：不保存当前状态，只保存事件序列（不可变 Append-only Log）。任何时间点的状态都可以通过重放事件重建。优点：完整审计日志/时间旅行/事件重播；缺点：查询复杂，需要物化视图（CQRS）。","Outbox Pattern（发件箱模式）：保证消息发布和数据库写入的原子性。做法：在同一个本地事务内，往 outbox 表写入消息记录。后台进程（Debezium CDC 或 Polling Publisher）读取 outbox 表发布到消息队列。不依赖分布式事务。","Circuit Breaker 熔断器三态：Closed（正常）→ Open（熔断，快速失败，不调用下游）→ Half-Open（探测恢复，允许少量请求通过）。关键参数：失败率阈值（50%）/ 窗口大小（10s）/ Open 持续时间（30s）/ 探测请求数（3）。Resilience4j 是 Java 推荐实现。"]},{"h":"Service Mesh：Istio / Envoy","pts":["Service Mesh 把服务间通信的横切关注点（mTLS/熔断/限流/追踪）从应用代码中剥离，注入到每个 Pod 旁边的 Sidecar 代理（Envoy）。业务代码完全感知不到这些逻辑的存在。","Envoy 的 xDS 协议（x Discovery Service）：控制面（Istiod）通过 ADS（Aggregated Discovery Service）动态下发路由规则（RDS）/集群配置（CDS）/监听器（LDS）/端点（EDS）。无需重启 Envoy 即可生效。","Istio Ambient Mesh（2022+）：把 L4 代理（ztunnel）从 Sidecar 移到节点级 DaemonSet，彻底消除 Sidecar 的内存开销（每个 Pod 节省约 50MB）。L7 功能（熔断/重试/Tracing）只在需要的时候用 Waypoint Proxy 按需注入。","Cilium Service Mesh：用 eBPF 替代 iptables 做 L4 网络策略和负载均衡，延迟降低约 30%，规则数增加时复杂度 O(1)（iptables 是 O(n)）。可以完全替代 kube-proxy，在有些场景替代 Sidecar。"]}],"res":[{"tp":"书籍","tc":"b-book","t":"Building Microservices 2nd Ed. (Sam Newman)","d":"服务拆分/通信/部署/测试/迁移，微服务权威指南","s":"O'Reilly","u":"https://samnewman.io/books/building_microservices/","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Microservices.io — Chris Richardson 模式库","d":"Saga/CQRS/API Gateway/Outbox 完整模式库，附代码","s":"microservices.io","u":"https://microservices.io/","lv":"entry"},{"tp":"博客","tc":"b-blog","t":"Patterns of Distributed Systems (Fowler)","d":"分布式系统模式：Saga/CQRS/Outbox/Circuit Breaker","s":"martinfowler.com","u":"https://martinfowler.com/articles/patterns-of-distributed-systems/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Istio 官方文档","d":"流量管理/mTLS/Observability/Fault Injection","s":"istio.io","u":"https://istio.io/latest/docs/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Temporal 工作流引擎","d":"有状态长时间工作流，解决 Saga 编排复杂性","s":"temporal.io","u":"https://temporal.io/docs","lv":"mid"}]},{"id":"kafka","phase":"Phase 5 · 分布式架构","title":"Kafka · 消息中间件 · EDA","color":"#0f766e","bg":"#F0FDFA","intro":"Kafka 的 Log-as-Database 思想是最重要的认知：Partition 的不可变追加日志是高吞吐的根本。ISR/HW/LEO 是 Exactly-once 的基础；KRaft 移除 ZooKeeper 是重大架构演进。","notes":[{"h":"Kafka 核心架构","pts":["Topic 分为多个 Partition，每个 Partition 是有序的不可变追加日志（Segment 文件，默认 1GB）。Consumer 通过 Offset 记录消费位置，可以任意回放（只要数据未超过 retention 时间）。日志存储在本地磁盘，顺序 IO + OS Page Cache 是高吞吐的根本。","Consumer Group：同一 Group 内，每个 Partition 只被一个 Consumer 消费（水平扩展消费能力）；不同 Group 互不影响（广播语义）。Partition 数量是并行度上限，Consumer 数超过 Partition 数则有 Consumer 空转。","ISR（In-Sync Replicas）：与 Leader 保持同步的副本集合。HW（High Watermark）：所有 ISR 副本都已确认的最大 Offset，Consumer 只能消费到 HW。LEO（Log End Offset）：每个副本自己写入的最大 Offset。Leader Epoch 防止 Leader 切换后的数据截断不一致（替代旧的 HW 机制）。","KRaft 模式（Kafka 3.3+ 正式可用）：用 Kafka 内置的 Raft 共识算法替代 ZooKeeper 存储元数据，简化运维（不再需要维护独立 ZooKeeper 集群），元数据事件驱动传播更快（配置变更生效时间从秒级降到毫秒级）。"],"img_key":"kafka_arch","img_link":"Apache Kafka","img_title":"https://en.wikipedia.org/wiki/Apache_Kafka"},{"h":"生产者、消费者高级配置","pts":["生产者 acks 配置：acks=0（不等确认，最低延迟，可能丢数据）/ acks=1（Leader 确认即返回，Leader 崩溃可能丢数据）/ acks=all（所有 ISR 确认，最安全）。配合 min.insync.replicas=2 确保至少 2 个副本写入。","幂等生产者（Idempotent Producer）：Kafka 为每个 Producer 分配 PID，每条消息带 Sequence Number，Broker 去重防止重试导致的重复写入，在单 Partition 单 Producer 内实现 Exactly-once。","事务性生产者（Transactional Producer）：跨多个 Partition 的原子写入。配合 read_committed 隔离级别的 Consumer，实现端到端 Exactly-once（EOS）语义。适用场景：流处理中消费-转换-生产的原子操作（Kafka Streams 默认使用）。","Consumer Rebalance 协议演进：Eager Rebalance（旧版，所有 Consumer 停止消费，全量重新分配，有暂停窗口）→ Cooperative Incremental Rebalance（新版，只移动需要重新分配的 Partition，大多数 Consumer 不中断消费）。生产环境建议配置 max.poll.interval.ms > 业务处理时间，避免误触发 Rebalance。"]},{"h":"Kafka Streams 与事件驱动","pts":["Kafka Streams 是客户端流处理库（不是单独的集群），直接运行在应用进程内。KStream（无界事件流）vs KTable（流的最新快照，类似数据库表，同一 key 后值覆盖前值）。join 操作要求相同 topic 分区数和相同的分区策略（co-partitioning）。","Windowing 操作：Tumbling Window（固定大小不重叠）/ Hopping Window（固定大小有重叠）/ Session Window（事件间隔超时则关闭）。基于 Event Time 处理乱序数据，配合 grace period 允许迟到消息。","事件驱动架构的三种模式：1）Event Notification（通知，接收方自己查数据库获取详情）；2）Event-Carried State Transfer（事件携带完整状态，接收方无需查数据库，但消息体大）；3）Event Sourcing（事件是唯一的状态来源，不存当前状态）。","Schema Registry 解决 Schema 演进问题：每个 topic 注册 Avro/Protobuf/JSON Schema，Producer 序列化时嵌入 schema_id，Consumer 通过 schema_id 获取 Schema 反序列化。兼容性策略：BACKWARD（新 schema 能读旧数据）/ FORWARD / FULL。"]}],"res":[{"tp":"免费书","tc":"b-book","t":"Kafka: The Definitive Guide (Confluent 免费)","d":"生产者/消费者/集群管理/监控/安全，O'Reilly 完整版","s":"Confluent","u":"https://www.confluent.io/resources/kafka-the-definitive-guide/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Apache Kafka 官方文档","d":"Broker/Partition/Consumer Group/Streams/Connect","s":"kafka.apache.org","u":"https://kafka.apache.org/documentation/","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Confluent 技术博客","d":"Kafka 最新特性/Schema Registry/KRaft/Tiered Storage","s":"confluent.io/blog","u":"https://www.confluent.io/blog/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Kafka Streams 文档","d":"KTable/KStream/Windowing/Join/Interactive Query","s":"kafka.apache.org","u":"https://kafka.apache.org/documentation/streams/","lv":"mid"}]},{"id":"cache","phase":"Phase 5 · 分布式架构","title":"缓存体系 · 多级缓存 · 一致性","color":"#1d4ed8","bg":"#EFF6FF","intro":"缓存四大问题（穿透/击穿/雪崩/污染）和四种一致性模式（Cache-aside/Write-through/Write-behind/Read-through）是每个后端工程师必须烂熟的设计决策矩阵。","notes":[{"h":"缓存四大问题与解决方案","pts":["缓存穿透（Cache Penetration）：查询不存在的数据，每次都打到数据库。解决：布隆过滤器（Bloom Filter）在缓存前拦截不存在的 key（hash 函数族判断），或缓存空值（null，短 TTL 5min，避免长期占用）。","缓存击穿（Cache Breakdown）：某个热点 key 过期瞬间，大量请求并发打到数据库。解决：热点 key 不设过期时间 + 逻辑过期（数据里存过期时间，后台异步更新）；或加分布式互斥锁（只允许一个请求重建缓存，其他等待或返回旧值）。","缓存雪崩（Cache Avalanche）：大量 key 同时过期（如系统初始化时设相同 TTL）。解决：TTL 加随机抖动（base + random(0, base/2)），避免同时过期；多级缓存（L1 进程内缓存 + L2 Redis），L2 故障时 L1 兜底；预热（系统启动前提前加载热点数据）。","缓存污染（Cache Pollution）：不常访问的大量数据占满缓存，驱逐了热点数据。Redis 8 种淘汰策略中，volatile-lfu 或 allkeys-lfu（最近最少频繁使用）最适合对访问频率敏感的场景；allkeys-lru 适合均匀访问场景。"],"img_key":"cache_problems","img_link":"Cache Computing","img_title":"https://en.wikipedia.org/wiki/Cache_(computing)"},{"h":"缓存一致性模式","pts":["Cache-aside（旁路缓存，最常用）：读：先查缓存，未命中则查数据库并写入缓存。写：先更新数据库，再删除缓存（而非更新缓存，避免并发写的竞争条件）。延迟双删策略（先删缓存→更新DB→延迟再删缓存）解决读写并发导致缓存脏数据。","Write-through（写穿）：写操作同时更新缓存和数据库，保证强一致性，但写延迟高（串行写两个存储）。适合读多写少且对一致性要求高的场景。","Write-behind（异步回写/Write-back）：写操作只更新缓存，后台异步批量写入数据库，写吞吐极高，但有数据丢失风险（缓存挂掉则数据丢失）。适合对丢失不敏感的场景（访问计数、点赞数）。","多级缓存一致性同步：L1 进程内缓存（Caffeine）+ L2 Redis Cluster。失效广播：DB 变更时发 MQ 消息，各节点的 L1 缓存订阅消息后失效本地 key。也可以设置 L1 缓存 TTL 短于 L2（如 L1 5s，L2 5min），容忍短暂不一致。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"Redis 官方文档","d":"数据类型/持久化/集群/Streams 完整参考","s":"redis.io","u":"https://redis.io/docs/","lv":"entry"},{"tp":"博客","tc":"b-blog","t":"Cache-aside Pattern — Microsoft Azure","d":"Cache-aside 与 Read-through/Write-through 对比","s":"Azure Architecture Center","u":"https://learn.microsoft.com/azure/architecture/patterns/cache-aside","lv":"entry"},{"tp":"GitHub","tc":"b-github","t":"Caffeine — Java 最高性能本地缓存","d":"W-TinyLFU 淘汰，Spring Cache 官方默认实现","s":"ben-manes/caffeine","u":"https://github.com/ben-manes/caffeine","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Redis Cluster Specification","d":"Hash Slot/gossip/故障转移/数据迁移完整规范","s":"redis.io","u":"https://redis.io/docs/reference/cluster-spec/","lv":"adv"}]},{"id":"security","phase":"Phase 5 · 分布式架构","title":"安全体系 · Zero Trust · DevSecOps","color":"#dc2626","bg":"#FEF2F2","intro":"安全的本质是信任模型。Zero Trust 把永不信任、始终验证从网络边界推广到每一个请求。OAuth2/OIDC 是现代认证的标准，JWT 的常见漏洞（alg:none）是安全工程师的必考题。","notes":[{"h":"认证与授权：OAuth2 / OIDC / JWT","pts":["OAuth2 四种授权流程：Authorization Code + PKCE（Web/Native App，最安全，PKCE 防授权码拦截）/ Client Credentials（服务间，无用户介入）/ Device Code（TV/CLI，无浏览器设备）/ 已废弃 Implicit（浏览器直接获取 token，有安全漏洞）。","OIDC（OpenID Connect）是 OAuth2 之上的身份层：在 OAuth2 授权流程中增加 id_token（JWT 格式，包含用户身份信息）和 UserInfo Endpoint。SSO（单点登录）的标准实现基础。","JWT 结构：Header（算法声明）.Payload（Claims）.Signature，Base64URL 编码，用密钥签名保证完整性。常见漏洞：1）alg:none 攻击（攻击者把 alg 改为 none，服务端不验证签名）；2）密钥混淆攻击（RS256 服务端用公钥验证，攻击者改为 HS256 用公钥作为 HMAC 密钥）。验证时务必指定期望的算法。","RBAC vs ABAC vs ReBAC：RBAC（角色-权限，简单，适合组织层级）/ ABAC（基于属性如时间/地点/资源类型，灵活但复杂）/ ReBAC（关系权限，Google Zanzibar 模型，\"用户A是文档B的所有者→可以编辑\"，适合 Google Drive 类产品）。","JWK（JSON Web Key Set）：公开的 JWT 验签公钥端点（/.well-known/jwks.json），下游服务从这里获取公钥，不需要共享密钥。是微服务中无状态 JWT 验证的标准做法。"],"img_key":"oauth2","img_link":"OAuth 2.0","img_title":"https://en.wikipedia.org/wiki/OAuth"},{"h":"网络安全与应用安全","pts":["OWASP Top 10 (2021) 最重要的几项：A01 Broken Access Control（IDOR，不校验资源归属权，如 /api/orders/123 可以访问别人的订单）/ A03 Injection（SQL/命令/LDAP 注入，参数化查询/输入验证是根本防御）/ A10 SSRF（服务端请求伪造，强制校验允许访问的 IP/域名白名单）。","零信任（Zero Trust）核心思想：不信任任何网络位置（内网也不行），每个请求都需要验证身份+设备状态+上下文。BeyondCorp（Google 内部实践，2014 论文）是最早的大规模 Zero Trust 实现，没有 VPN，所有服务都通过 IAP（Identity-Aware Proxy）访问。","供应链安全（Software Supply Chain）：SBOM（软件物料清单，列出所有依赖）/ Sigstore（无密钥签名，用 OIDC 身份签名镜像和制品）/ SLSA 等级（Supply chain Levels for Software Artifacts，构建可信度分级）。Log4Shell（2021）漏洞揭示了依赖链攻击的破坏力。","容器安全最佳实践：以非 root 用户运行（USER 1000）/ 使用 seccomp Profile 限制系统调用（默认阻断约 44 个危险 syscall）/ AppArmor/SELinux 强制访问控制 / 使用 Distroless 镜像减少攻击面 / 镜像签名（cosign）和漏洞扫描（Trivy）集成到 CI/CD。"]},{"h":"DevSecOps 与密钥管理","pts":["Shift-left 安全：把安全检查前移到开发阶段。IDE 插件（Semgrep）检测写代码时的漏洞；Pre-commit Hook（Gitleaks 扫描硬编码密钥）；CI 阶段 SAST（代码静态分析）+ SCA（依赖漏洞扫描 Dependabot/Snyk）+ IaC 安全（Checkov 扫描 Terraform）。","Secrets 管理的错误实践：把密钥存在代码仓库/环境变量/配置文件（明文）。正确实践：HashiCorp Vault（动态密钥，自动轮转，审计日志）或云 KMS（AWS Secrets Manager/GCP Secret Manager）。Vault 的动态密钥：按需生成短期有效的数据库密码，用完即废，不存在密钥泄漏窗口。","威胁建模 STRIDE 方法：Spoofing（欺骗身份）/ Tampering（数据篡改）/ Repudiation（抵赖，需要审计日志）/ Information Disclosure（信息泄露）/ Denial of Service（拒绝服务）/ Elevation of Privilege（权限提升）。在设计阶段用 STRIDE 逐个检查，比上线后修漏洞代价小 100 倍。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"OWASP Top 10 (2021)","d":"Web 安全十大风险，安全工程师基础","s":"owasp.org","u":"https://owasp.org/www-project-top-ten/","lv":"entry"},{"tp":"官方规范","tc":"b-docs","t":"OAuth 2.0 RFC 6749 + PKCE RFC 7636","d":"授权框架完整规范，四种 Flow，PKCE 防止拦截","s":"IETF","u":"https://www.rfc-editor.org/rfc/rfc6749","lv":"mid"},{"tp":"工具","tc":"b-tool","t":"JWT.io — JWT 调试与学习","d":"JWT 结构可视化，在线解码，常见漏洞学习","s":"jwt.io","u":"https://jwt.io/","lv":"entry"},{"tp":"官方文档","tc":"b-docs","t":"HashiCorp Vault 文档","d":"动态密钥/自动轮转/PKI/AWS IAM 集成","s":"developer.hashicorp.com","u":"https://developer.hashicorp.com/vault/docs","lv":"mid"},{"tp":"官方规范","tc":"b-docs","t":"NIST Zero Trust Architecture SP 800-207","d":"Zero Trust 官方标准，七大原则/部署模型/迁移路径","s":"NIST","u":"https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-207.pdf","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Cloudflare Learning — 安全基础","d":"TLS/DDoS/WAF/Bot Detection 通俗解释，定期更新","s":"cloudflare.com/learning","u":"https://www.cloudflare.com/learning/security/","lv":"entry"}]},{"id":"cloud","phase":"Phase 6 · 云原生","title":"云计算 · K8s 生产 · FinOps","color":"#0369a1","bg":"#EFF6FF","intro":"云不只是租服务器——VPC 是软件定义网络，IAM 是细粒度授权，S3 是分布式对象存储的工程标杆。K8s 调度器、CNI、CSI 三者共同构成了云原生应用的完整运行环境。","notes":[{"h":"云网络：VPC / SDN","pts":["VPC（Virtual Private Cloud）是完全软件定义的私有网络：子网（Subnet）在可用区内，路由表控制流量走向，Internet Gateway 连接公网，NAT Gateway 允许私有子网出站。VPC Peering 连接两个 VPC（不经过公网），Transit Gateway 连接多个 VPC（Hub-and-spoke 拓扑）。","安全组（Security Group）是有状态的防火墙（记录连接状态，返回流量自动放行）；NACL（Network ACL）是无状态的子网级防火墙（入站和出站规则分别配置）。生产安全原则：最小权限，安全组只允许明确需要的端口，拒绝所有其他流量。","AWS PrivateLink / Google Private Service Connect：服务提供方在 VPC 内暴露端点，消费方通过 Interface Endpoint 访问，流量不经过公网，也不需要 VPC Peering（不暴露整个 VPC）。适合 SaaS 服务的安全私有访问。","Direct Connect（AWS）/ Cloud Interconnect（GCP）/ ExpressRoute（Azure）：通过专线（物理光纤）连接企业数据中心和云，绕过公网，延迟更低更稳定，带宽有保障。混合云架构的核心基础设施。"]},{"h":"K8s 生产深度","pts":["K8s 调度器两阶段：Filter（过滤不满足条件的节点：资源不足/节点亲和性/污点容忍）→ Score（对满足条件的节点打分：资源均衡/Pod 拓扑扩散/亲和性偏好）。自定义调度器（Scheduling Framework Plugin）可以扩展任意阶段的逻辑。","K8s QoS 三等级：Guaranteed（requests == limits，最高优先级，OOM 时最后被杀）/ Burstable（requests < limits 或只设其一）/ BestEffort（不设 requests 和 limits，最低优先级，内存压力时最先被杀）。生产关键服务必须设置 Guaranteed QoS。","HPA（Horizontal Pod Autoscaler）基于 metrics.k8s.io 指标（CPU/内存）或 custom.metrics（Prometheus 指标）自动扩缩容。KEDA（Kubernetes Event-Driven Autoscaling）支持基于 Kafka Lag/队列深度/外部指标的弹性，更灵活。","Helm 是 K8s 的包管理器：Chart（带模板的资源包）/ Values（参数化配置）/ Release（部署实例）。Helm 3 移除了 Tiller（服务端组件），直接通过 kubectl 权限操作。生产建议：GitOps（ArgoCD/Flux）管理 Helm Release 版本，Git 变更驱动部署，所有变更有审计记录。"]},{"h":"Serverless 与 FinOps","pts":["AWS Lambda 使用 Firecracker MicroVM：基于 KVM 的极轻量虚拟机，启动时间约 125ms，内存开销约 5MB（vs Docker 容器约 100MB）。每个 Lambda 实例运行在独立 MicroVM 内，强隔离，多租户安全。SnapStart（Java Lambda）：预先初始化，快照并恢复，冷启动降到约 200ms。","Serverless 的隐性成本：API Gateway 每百万请求约 $3.5（不只是 Lambda 费用）/ 冷启动影响 SLA（特别是 Java/JVM 语言）/ 调试困难（本地无法完全模拟云环境）/ 状态管理复杂（需要外部存储）/ Vendor Lock-in（换平台代价大）。","FinOps 核心实践：Reserved Instances / Savings Plans 预留折扣（1-3年，省 40-70%）/ Spot Instances 抢占实例（省 60-90%，但可能被回收，适合容错工作负载）/ Rightsizing（根据实际使用率调整实例规格，避免过度配置）/ 标签策略（每个资源打 team/env/project 标签，按维度分析成本）。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"AWS Well-Architected Framework","d":"五大支柱：运营/安全/可靠性/性能/成本优化","s":"AWS","u":"https://aws.amazon.com/architecture/well-architected/","lv":"mid"},{"tp":"免费书","tc":"b-book","t":"Google SRE Book","d":"SLI/SLO/Error Budget/Postmortem，可靠性工程圣经","s":"sre.google","u":"https://sre.google/sre-book/table-of-contents/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Terraform 官方文档","d":"Provider/Resource/Module/State，IaC 事实标准","s":"HashiCorp","u":"https://developer.hashicorp.com/terraform/docs","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Kubernetes 生产最佳实践","d":"资源限制/健康检查/RBAC/网络策略","s":"kubernetes.io","u":"https://kubernetes.io/docs/concepts/configuration/overview/","lv":"mid"},{"tp":"可视化","tc":"b-visual","t":"CNCF Cloud Native Landscape","d":"云原生技术全景图，了解生态的最佳索引","s":"landscape.cncf.io","u":"https://landscape.cncf.io/","lv":"entry"}]},{"id":"obs","phase":"Phase 6 · 云原生","title":"可观测性 · OpenTelemetry · SRE","color":"#059669","bg":"#ECFDF5","intro":"可观测性的三大支柱（Metrics/Logs/Traces）解决了分布式系统的调试难题。OpenTelemetry 统一了数据模型，eBPF 实现了无侵入追踪。Exemplars 是连接 Metrics 和 Traces 的关键桥梁。","notes":[{"h":"三大支柱与 OpenTelemetry","pts":["Metrics（指标）：时间序列的聚合数值（Counter/Gauge/Histogram/Summary），低存储成本，适合告警和 Dashboard。Prometheus 是 K8s 生态标准，PromQL 强大但学习曲线陡峭。VictoriaMetrics 是高性能替代，存储效率更高。","Logs（日志）：带时间戳的离散事件，高信息密度但高存储成本。结构化日志（JSON 格式）比非结构化文本（printf 风格）可查询性强得多。生产建议：日志级别动态调整（Actuator /actuator/loggers），成本敏感场景用采样（Reservoir Sampling）。","Traces（追踪）：分布式请求的完整链路，Span（单个服务的操作）组成 Trace（跨服务的请求树）。Trace 对排查微服务调用链延迟问题不可或缺，但存储成本高，生产环境通常采样 1-10%（重要错误 100% 采样）。","OpenTelemetry（OTel）是 CNCF 的统一可观测性标准：定义了 Traces/Metrics/Logs 的数据模型和 API，OTLP 协议统一传输，Collector 做采集/处理/导出。厂商提供 OTel 接入，应用代码不再绑定特定厂商 SDK。Auto-instrumentation（Java Agent/Python）无需改代码注入追踪。","Exemplars：在 Metrics 数据点上附加一个 Trace ID，实现从 Dashboard 某个异常数据点直接跳转到对应的 Trace，把指标和追踪关联起来。Prometheus + Grafana Tempo 的 Exemplars 集成是三大支柱联动的最佳实践。"]},{"h":"SRE 实践：SLO / Error Budget","pts":["SLI（Service Level Indicator）是衡量服务水平的具体指标，如请求成功率、P99 延迟、吞吐量。SLO（Service Level Objective）是 SLI 的目标值，如 99.9% 的请求在 200ms 内成功。SLA（Service Level Agreement）是对外承诺的 SLO，违约有经济赔偿。","Error Budget = 1 - SLO。如果 SLO = 99.9%，月 Error Budget = 0.1% × 30天 × 24h × 60min = 43.2 分钟。Error Budget 用完则停止发布新功能（稳定性优先），Budget 充足则鼓励创新（速度优先）。这是 SRE 协调开发和运维诉求的核心机制。","四大黄金信号（Google SRE）：Latency（延迟，区分成功和失败）/ Traffic（吞吐，RPS/TPS）/ Error Rate（错误率，HTTP 5xx 率）/ Saturation（饱和度，CPU/内存/队列深度）。告警应该基于这四个维度，而不是直接告警 CPU > 80%。","混沌工程（Chaos Engineering）：主动在生产或 Staging 环境注入故障（Kill Pod/Network Latency/CPU Stress），验证系统的弹性。Chaos Monkey（Netflix，随机 Kill EC2 实例）是先驱，LitmusChaos（K8s 原生混沌）是现代实践。Gameday（定期组织的故障演练）是混沌工程的组织实践。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"OpenTelemetry 官方文档","d":"Traces/Metrics/Logs 统一标准，OTLP，Auto-instrumentation","s":"opentelemetry.io","u":"https://opentelemetry.io/docs/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Prometheus 文档","d":"PromQL/告警规则/Federation，K8s 监控标准","s":"prometheus.io","u":"https://prometheus.io/docs/","lv":"mid"},{"tp":"免费书","tc":"b-book","t":"Google SRE Workbook","d":"SLO 制定/Error Budget/Alerting/混沌工程，配案例","s":"sre.google","u":"https://sre.google/workbook/table-of-contents/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Grafana 文档","d":"Dashboard/Loki/Tempo/Alerting，可观测性统一平台","s":"grafana.com","u":"https://grafana.com/docs/","lv":"entry"}]},{"id":"bigdata","phase":"Phase 7 · 数据工程","title":"大数据 · Spark · Flink · OLAP","color":"#d97706","bg":"#FEF3C7","intro":"Spark 的 Catalyst 优化器和 Tungsten 执行引擎让 SQL 接近手写代码效率；Flink 的 Watermark 机制是处理乱序流数据的唯一正确答案；ClickHouse 的向量化执行让亿级数据秒级查询成为现实。","notes":[{"h":"Spark 核心架构","pts":["RDD（Resilient Distributed Dataset）是 Spark 的基础抽象：不可变、分区、可容错（通过血缘 Lineage 重算丢失分区）。Transformation（惰性，如 map/filter/join）不触发计算；Action（如 count/collect/save）触发执行计划的生成和调度。","Catalyst 优化器（DataFrame/Dataset API）：将 SQL/DSL 转换为 Logical Plan → Analyzed Plan → Optimized Plan（谓词下推/列裁剪/常量折叠）→ Physical Plan → Code Generation。比手写 RDD 代码快是因为 Catalyst 能做人力难以实现的系统性优化。","Tungsten 项目三大优化：1）堆外内存（Off-Heap）用 sun.misc.Unsafe 直接操作内存，避免 GC，使用紧凑的二进制格式 UnsafeRow；2）Cache-aware 计算（Sort/Hash Join 针对 CPU Cache 友好的数据布局）；3）Whole-Stage Code Generation（将算子链融合成单个 Java 函数，消除虚函数调用开销）。","Shuffle 是 Spark 性能杀手：Hash Shuffle（旧，产生大量小文件）→ Sort Shuffle（排序后合并，文件数 = 2 × partition，更高效）→ Tungsten Sort Shuffle（堆外内存，避免序列化）。AQS（Adaptive Query Execution，Spark 3.0+）运行时动态调整 Join 策略和 Shuffle partition 数。"],"img_key":"spark_arch","img_link":"Apache Spark","img_title":"https://en.wikipedia.org/wiki/Apache_Spark"},{"h":"Flink 流处理核心","pts":["时间语义的选择决定了流处理语义的正确性：Event Time（事件产生时间，需要 Watermark 处理乱序，结果最准确）/ Processing Time（处理机器时间，无 Watermark 需要，但结果不确定性高）/ Ingestion Time（进入 Flink 的时间，折中）。","Watermark 机制：特殊的流中事件，表示时间戳 T 之前的所有数据已经到达。Watermark(t) 触发所有结束时间 ≤ t 的窗口计算。Watermark 生成策略：BoundedOutOfOrderness（允许最大 delay，如 5s）/ Monotonous（严格单调，适合有序数据）。迟到数据（晚于 Watermark 到达）：丢弃/侧输出流/更新结果（allowedLateness）。","Checkpoint 机制（Chandy-Lamport 分布式快照算法）：周期性地在数据流中插入 Barrier，Barrier 到达每个算子时算子保存本地状态快照。所有算子完成快照后，整体形成一个全局一致性快照，用于故障恢复实现 Exactly-once 语义。","State Backend 选型：HashMapStateBackend（纯内存，低延迟，状态大时会 OOM，适合小状态）/ RocksDBStateBackend（持久化到 RocksDB，状态可以超过内存大小，适合大状态/生产环境，但读写比内存慢约 10x）。Incremental Checkpoint（增量快照）只保存自上次 checkpoint 以来变化的状态，减少快照开销。"],"img_key":"flink_arch","img_link":"Apache Flink","img_title":"https://en.wikipedia.org/wiki/Apache_Flink"},{"h":"OLAP 引擎选型","pts":["ClickHouse 核心优势：MergeTree 系列存储引擎（支持 ReplicatedMergeTree 高可用），列式存储 + 向量化执行（SIMD 指令同时处理多个数据点），LZ4/ZSTD 列压缩，AggregatingMergeTree 预聚合，可处理百亿行数据的秒级聚合查询。适合日志分析/用户行为分析。","Apache Druid：实时摄入（minutes 级可查）+ 预聚合 Roll-up（按时间粒度压缩减少数据量）+ Bitmap 索引（高基数列的快速过滤）+ Broker/Historical/Ingestion 分层架构。适合实时 Dashboard、Ad-hoc 探索性查询。","Trino/Presto：联邦查询引擎，自身不存储数据，通过 Connector（Iceberg/Hive/S3/PostgreSQL/Kafka）跨源查询。MPP（大规模并行处理）架构，适合数据湖上的交互式查询，是 Athena（AWS）的底层引擎。","StarRocks（Doris 分支）：CBO（基于代价的优化器）+ 向量化引擎 + 物化视图自动刷新。同时支持实时摄入（Primary Key 表，支持 Upsert）和历史分析（Aggregate/Duplicate 表），被称为 HTAP。与 Flink CDC 集成实现数据库变更实时入仓。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"Apache Spark 官方文档","d":"RDD/DataFrame/SQL/Streaming/MLlib 完整参考","s":"spark.apache.org","u":"https://spark.apache.org/docs/latest/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Apache Flink 官方文档","d":"Event Time/Watermark/Checkpoint/State/SQL","s":"nightlies.apache.org","u":"https://nightlies.apache.org/flink/flink-docs-stable/","lv":"mid"},{"tp":"免费书","tc":"b-book","t":"Learning Spark 2.0 (Databricks 免费 PDF)","d":"Spark 3.0 新特性/AQS/Delta Lake，O'Reilly 完整版","s":"Databricks","u":"https://pages.databricks.com/rs/094-YMS-629/images/LearningSpark2.0.pdf","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"ClickHouse 官方文档","d":"MergeTree/向量化执行/列压缩/物化视图","s":"clickhouse.com/docs","u":"https://clickhouse.com/docs","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"Dremel: Interactive Analysis of Web-Scale Datasets","d":"Parquet 格式来源，嵌套数据列式存储原理","s":"Google VLDB 2010","u":"https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/36632.pdf","lv":"adv"}]},{"id":"lakehouse","phase":"Phase 7 · 数据工程","title":"数据湖 · 湖仓一体 · Modern Data Stack","color":"#7c3aed","bg":"#EDE9FE","intro":"开放表格式（Iceberg/Delta/Hudi）是湖仓架构的核心——在廉价对象存储之上提供 ACID 事务、Schema 演进和时间旅行，终结了数据湖缺乏治理的历史问题。","notes":[{"h":"开放表格式：Iceberg / Delta / Hudi","pts":["Apache Iceberg 的核心设计：元数据分层（Catalog → Table Metadata → Snapshot → Manifest List → Manifest File → Data File），每次写入生成新的 Snapshot，旧 Snapshot 保留实现时间旅行。Partition Evolution（修改分区策略不影响历史数据）和 Schema Evolution（添加/删除/重命名列）是 Iceberg 比 Hive 分区表优越的关键。","Delta Lake（Databricks）：Transaction Log（_delta_log 目录下的 JSON/Parquet 文件记录所有操作）是核心。ACID 通过乐观并发控制（OCC）实现，冲突检测基于 read-snapshot 和 write-set 的交集。Change Data Feed（CDF）记录行级别变更，支持 CDC 场景。","Apache Hudi 的差异化：专门优化 Upsert（更新+插入）操作。两种表类型：Copy-on-Write（每次 Upsert 重写受影响的 Parquet 文件，读快写慢）/ Merge-on-Read（写入 Delta Log 文件，读时合并，写快读慢，用 Compaction 定期合并）。Timeline 机制记录所有写操作历史。","三者选型：Iceberg（多引擎互操作性最佳，Spark/Trino/Flink/Presto 全支持，推荐新项目）/ Delta（Databricks 生态深度集成，Photon 引擎加速，已有 Databricks 投入则选 Delta）/ Hudi（CDC/Upsert 密集场景，与 Spark/Flink 集成成熟）。"]},{"h":"存储格式与 Modern Data Stack","pts":["Parquet 列式存储：Row Group（横向切分，默认 128MB）→ Column Chunk（每列）→ Page（编码/压缩单元）。Predicate Pushdown（谓词下推）基于 Row Group 级统计信息（min/max/null count）跳过不相关的 Row Group，大幅减少 IO。嵌套数据用 Dremel 的 Repetition/Definition Level 编码。","Apache Arrow：内存列式格式，定义了跨语言的标准内存布局（不需要序列化/反序列化），支持 SIMD 向量化计算，零拷贝 IPC（进程间通信）。Pandas 2.0/DuckDB/Polars 都使用 Arrow 作为内部格式，查询性能比传统 Python 快 10-100x。","dbt（data build tool）：数据工程的 CI/CD，用 SQL + Jinja 模板定义数据转换逻辑，自动管理依赖关系（DAG），内置测试（not_null/unique/accepted_values）和文档生成。Core 是 Modern Data Stack T（Transform）层的标准工具，与 Snowflake/BigQuery/Redshift 深度集成。","Data Mesh 的核心原则：Domain Ownership（各业务域自己负责数据产品）/ Data as a Product（数据有 SLA/文档/版本）/ Self-serve Infrastructure（统一的数据平台让各域低成本发布数据）/ Federated Governance（统一的数据治理策略由平台强制执行）。注意：Data Mesh 是组织架构模式，不是单一技术产品。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"Apache Iceberg 官方文档","d":"ACID/时间旅行/Schema 演进/多引擎支持","s":"iceberg.apache.org","u":"https://iceberg.apache.org/docs/latest/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Delta Lake 官方文档","d":"Transaction Log/CDF/DML，Databricks 生态集成","s":"docs.delta.io","u":"https://docs.delta.io/latest/index.html","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"Lakehouse: A New Generation of Open Platforms","d":"湖仓概念奠基论文，对比 DW vs Lake vs Lakehouse","s":"CIDR 2021","u":"https://www.cidrdb.org/cidr2021/papers/cidr2021_paper17.pdf","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"dbt 官方文档","d":"数据建模+测试+文档一体化，SQL+Jinja 模板","s":"docs.getdbt.com","u":"https://docs.getdbt.com/","lv":"entry"}]},{"id":"frontend","phase":"Phase 8 · 前端/边缘","title":"前端架构 · PWA · 跨端 · 端侧 AI","color":"#db2777","bg":"#FDF2F8","intro":"渲染模式决定首屏性能，Service Worker 是离线能力核心，Module Federation 实现微前端——这些是 Web 视角。扩展到移动端和桌面端，跨端架构选型、BFF 多端 API 设计、端侧 AI 推理是同等重要的架构决策。","notes":[{"h":"渲染模式演进","pts":["CSR（客户端渲染，SPA）：浏览器下载空 HTML + JS Bundle，在客户端渲染 DOM。首屏白屏问题严重（等 JS 下载+执行），SEO 困难（爬虫看到空页面）。适合不需要 SEO 的内部系统/Dashboard。","SSR（服务端渲染）：每次请求在服务器端渲染完整 HTML 返回。TTFB 受服务器性能影响，Hydration（水合）成本：浏览器收到 HTML 后需要下载 JS 并重新绑定事件（客户端接管），这个过程会阻塞用户交互（Time to Interactive 高）。","ISR（Incremental Static Regeneration，Next.js）：静态页面在请求时后台异步重新生成（stale-while-revalidate 策略）。用户总是得到快速的静态响应，同时页面定期刷新。适合内容更新频率中等（分钟级）的页面（新闻/博客/商品详情）。","RSC（React Server Components，React 18+）：组件在服务端运行（可以直接访问数据库），返回序列化的 React 树（不是 HTML），客户端组件只接管需要交互的部分。Server Component 和 Client Component 的边界由开发者明确声明（'use client' 指令）。消除了传统 SSR 的全量 Hydration 问题。"],"img_key":"rendering_modes","img_link":"Server-Side Rendering","img_title":"https://en.wikipedia.org/wiki/Server-side_scripting"},{"h":"PWA：Service Worker 与离线能力","pts":["Service Worker 是独立于页面的后台 Worker，运行在单独线程，可以拦截所有网络请求（fetch event）。生命周期：Installing → Waiting → Activating → Activated。新版 SW 安装后会等待旧 SW 控制的所有标签页关闭才激活（避免缓存不一致）。","缓存策略（Workbox 实现）：Cache First（先查缓存，命中直接返回，适合静态资源）/ Network First（先发网络请求，失败再用缓存，适合 API）/ Stale While Revalidate（立即返回缓存，后台异步更新缓存，适合非关键数据）/ Network Only / Cache Only。","Background Sync：SW 拦截失败的请求（网络离线时），注册一个 sync 事件，等网络恢复后浏览器自动触发重试。适合表单提交/点赞/评论等写操作的离线排队。","Web Push Notifications：基于 Web Push Protocol 标准（RFC 8030）。VAPID（Voluntary Application Server Identification）密钥对：应用服务器签名推送请求，推送服务（FCM/APNs）验证来源合法性，避免滥用。用户同意订阅后，浏览器返回 PushSubscription（包含 endpoint 和加密密钥），服务器存储后用于推送。"]},{"h":"微前端 / Module Federation","pts":["微前端解决大型前端应用的团队协作问题：不同团队独立开发/部署各自负责的模块，主应用动态加载。Module Federation（Webpack 5）是目前最主流的实现：Remote 暴露模块，Host 在运行时动态加载，共享依赖（React 等）避免重复加载。","Module Federation 关键配置：exposes（暴露的模块）/ remotes（依赖的远程模块，格式：remoteName@http://cdn/remoteEntry.js）/ shared（共享依赖，配置 singleton:true 防止同一库多实例）。构建时生成 remoteEntry.js（模块清单），部署后远程模块可以独立更新，Host 不需要重新构建。","Core Web Vitals（Google 排名因素）：LCP（Largest Contentful Paint < 2.5s，最大内容块渲染时间）/ INP（Interaction to Next Paint < 200ms，替代 FID，测量所有交互的响应延迟）/ CLS（Cumulative Layout Shift < 0.1，累积布局偏移，图片无尺寸/动态注入内容是主因）。"]},{"h":"跨端架构选型：原生 vs 跨平台","pts":["跨端开发的三种哲学代表了「共享什么」的不同判断：React Native 共享业务逻辑和 UI 组件描述，通过 JS Bridge 调用原生组件渲染（新架构 JSI 消除了 Bridge 的序列化开销）；Flutter 完全自绘 UI，绕过原生组件层，像游戏引擎一样直接操控像素，UI 一致性最好但与原生生态集成最难；Kotlin Multiplatform 只共享业务逻辑（网络/数据库/业务规则），UI 保持原生实现，是「侵入性最小」的共享策略。","选原生开发（Swift/Kotlin）的场景：深度使用平台专属能力（ARKit/Core ML/Camera Pipeline/NFC），高性能图形（游戏引擎/实时渲染），或者团队已经是原生专家且产品体验差异是核心竞争力。原生开发的工程成本是两套代码库，但调试体验、性能极限、平台集成深度是跨平台框架无法完全匹敌的。","选跨平台框架的决策点：团队规模有限（一套代码服务多端），业务逻辑占主导（UI 交互简单），产品需要快速迭代（发布频率 > 体验极致化），或者 Web 技术栈是主要技能储备（React Native 对 Web 工程师友好）。Flutter 在 UI 密集、动画丰富的消费端应用表现最好；KMP 在企业内部应用（需要深度平台集成但又想共享逻辑）越来越受青睐。"]},{"h":"BFF 模式与多端 API 设计","pts":["BFF（Backend for Frontend）的核心洞察是：不同客户端有根本不同的数据需求——移动端带宽有限需要精简字段、桌面端需要丰富数据支持复杂交互、第三方 API 需要稳定的版本化接口。用一个通用 API 服务所有客户端，必然导致「为最复杂的客户端设计，其他客户端过度获取」（Over-fetching）的问题。","移动端 API 版本管理是后端工程师容易忽视的挑战：Web 应用可以强制刷新到最新版本，但 App Store 里的旧版本可能运行数月甚至数年。API 的任何 Breaking Change 都需要支持旧版本客户端，这意味着字段永远只能增加不能删除，接口要保持向后兼容，或者维护多个版本并存（v1/v2）。版本策略要在 API 设计阶段就考虑，而不是出现兼容问题后再补救。","GraphQL 在多端场景的核心价值是让客户端精确声明需要哪些字段，解决 Over/Under-fetching 问题。移动端可以只请求少量字段（节省带宽），桌面端可以一次请求丰富的关联数据（减少往返次数）。代价是服务端 N+1 查询问题（用 DataLoader 解决）和复杂查询的性能控制（查询深度/复杂度限制）。"]},{"h":"端侧 AI 与端云协同","pts":["端侧 AI 推理的核心驱动力是三个场景：隐私敏感（用户数据不离设备，GDPR 合规更简单）、低延迟（不依赖网络，实时响应，你的 Moments+ 用 Vision 框架做时空聚类就是典型案例）、离线可用（飞行模式或弱网环境下仍然工作）。代价是模型能力受限于设备算力和内存（端侧通常只能运行量化后的小模型）。","主流端侧 AI 框架各有定位：Apple Core ML（深度优化 Neural Engine，iOS/macOS 首选）/ TensorFlow Lite（跨平台，Android 生态深，支持 GPU Delegate）/ ONNX Runtime（模型格式标准化，跨框架互操作）/ ExecuTorch（Meta 出品，专为移动端设计 PyTorch 模型部署，支持 Llama 系列端侧推理）。INT4 量化后的 7B 模型可以在高端手机上以约 10 tokens/s 运行，端侧 LLM 正在从实验走向实用。","端云协同的设计模式需要明确三个决策：哪些推理在端侧（隐私数据/低延迟需求/离线场景），哪些在云端（算力密集/需要大模型/多用户共享结果），以及两者如何协作（端侧做初步过滤/分类，云端做深度推理；或者端侧缓存云端的推理结果，网络恢复时同步）。Apple 的 Private Cloud Compute 是端云协同在隐私和能力之间取得平衡的最新探索。"]},{"h":"离线优先与多端数据同步","pts":["离线优先（Offline-First）是移动端应用架构的核心设计原则：默认假设网络不可用，所有用户操作先写入本地存储，后台异步同步到云端。与「在线优先」（先调 API，失败再降级）相比，离线优先让应用在弱网/断网环境下仍然完全可用，用户操作永远即时响应。代价是数据同步逻辑变得更复杂，特别是冲突解决。","CRDT（Conflict-free Replicated Data Types，无冲突复制数据类型）是解决多端并发编辑冲突的数学方案：设计数据结构使得任何顺序的合并操作都能得到相同结果，从根本上消除冲突而不是「检测后解决」。Figma 的实时协作、Notion 的离线编辑、Linear 的实时同步都基于 CRDT。对比 Last-Write-Wins（后写覆盖前写，简单但会丢数据）和 Operational Transformation（Google Docs 早期方案，正确但实现复杂），CRDT 是目前工程上最可靠的选择。","SQLite 在移动端是默认的本地数据库，但它的角色正在扩展：不只是缓存层，而是应用状态的 Source of Truth，云端数据库只是同步目标。SQLite 的 WAL 模式支持并发读，JSON 支持使其可以存储半结构化数据。更有趣的是 SQLite 正在服务端重新流行——Cloudflare D1/Turso/Litestream 把 SQLite 的嵌入式特性带到了边缘计算，形成了「端侧-边缘-云端」三层都用 SQLite 的统一数据模型。"]}],"res":[{"tp":"官方文档","tc":"b-docs","t":"MDN Web Docs","d":"HTML/CSS/JS/Web API 完整参考，前端每天必看","s":"developer.mozilla.org","u":"https://developer.mozilla.org/","lv":"entry"},{"tp":"官方文档","tc":"b-docs","t":"web.dev (Google)","d":"Core Web Vitals/性能/PWA/安全，Chrome 团队维护","s":"web.dev","u":"https://web.dev/","lv":"entry"},{"tp":"官方文档","tc":"b-docs","t":"Next.js 官方文档","d":"App Router/RSC/Streaming SSR/ISR，全栈 React 框架","s":"nextjs.org/docs","u":"https://nextjs.org/docs","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Workbox — Google PWA 工具库","d":"Cache Strategies/Background Sync/Push Notifications","s":"developer.chrome.com","u":"https://developer.chrome.com/docs/workbox","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Module Federation (Webpack 5)","d":"运行时动态加载远程模块，微前端实现标准","s":"webpack.js.org","u":"https://webpack.js.org/concepts/module-federation/","lv":"mid"},{"tp":"文档","tc":"b-docs","t":"Flutter 官方文档","d":"跨平台 UI 框架，自绘引擎，Dart 语言，iOS/Android/Web/Desktop 统一","u":"https://flutter.dev/docs","lv":"entry"},{"tp":"文档","tc":"b-docs","t":"Kotlin Multiplatform 文档","d":"只共享业务逻辑，保留原生 UI，JetBrains 出品，企业应用首选","u":"https://kotlinlang.org/docs/multiplatform.html","lv":"mid"},{"tp":"文档","tc":"b-docs","t":"ExecuTorch — 端侧 PyTorch 推理","d":"Meta 的移动端 AI 推理框架，支持 Llama 端侧运行","u":"https://pytorch.org/executorch/","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Apple Private Cloud Compute — 安全性白皮书","d":"端云协同的隐私架构，可验证的云端 AI 推理","u":"https://security.apple.com/documentation/private-cloud-compute/","lv":"adv"},{"tp":"论文","tc":"b-paper","t":"A comprehensive study of CRDTs","d":"CRDT 完整综述，多端同步的数学基础","u":"https://hal.inria.fr/inria-00555588/document","lv":"adv"}]},{"id":"cdn","phase":"Phase 8 · 前端/边缘","title":"CDN · 边缘计算 · Edge Functions","color":"#0891b2","bg":"#ECFEFF","intro":"Anycast 让同一个 IP 路由到最近节点；Edge Functions 把计算推到离用户最近的地方；HTTP/3 QUIC 解决了弱网 HoL Blocking 问题。边缘 AI 推理是未来 18 个月最重要的应用趋势。","notes":[{"h":"CDN 核心机制","pts":["Anycast 路由：多个地理位置不同的服务器宣告同一个 IP 地址，BGP 协议根据网络拓扑（AS 跳数）把流量路由到网络距离最近的 PoP（Point of Presence）。这是 CDN 全球加速和 DDoS 清洗（流量分散到多个清洗中心）的基础机制。","TLS 在边缘终止：CDN 节点与用户之间做 TLS 握手，节点到源站走内部专线（或再次 TLS）。边缘 TLS 好处：节省源站 CPU（TLS 握手计算密集）；减少 RTT（用户到最近 PoP 握手，而非到远端源站）；Session Resumption（0-RTT/1-RTT）在 PoP 节点本地完成，无需回源。","HTTP 缓存策略：Cache-Control: max-age（浏览器缓存时长）/ s-maxage（CDN 缓存时长）/ stale-while-revalidate（返回旧内容同时后台刷新）/ no-cache（每次向服务器验证）/ immutable（内容不变，适合 hash 文件名的静态资源）。CDN 缓存命中率（Hit Rate）是 CDN 效果的核心指标，通常目标 > 90%。","动态内容加速（DAA）：CDN 节点到源站的路由优化（选最快路径，而非默认 BGP 路由）/ TCP 连接复用（节点维护与源站的长连接，避免每次新建 TCP）/ 协议优化（节点到源站用 HTTP/2，即使源站只支持 HTTP/1.1）。Cloudflare Argo Smart Routing 是典型实现。"]},{"h":"Edge Functions：Cloudflare Workers","pts":["Cloudflare Workers 使用 V8 Isolate 隔离（而非容器）：每个 Worker 运行在一个 V8 Isolate 内，启动时间约 0ms（预先初始化的 V8 实例，按需激活），内存开销约 3MB（vs Docker 容器约 100MB），可以在 200+ 全球 PoP 同时运行。","V8 Isolate vs 容器的权衡：V8 Isolate 不支持任意 Native 代码（只能运行 JS/WASM），隔离性比容器弱（同一 V8 进程内的 Isolate 理论上可以侧信道攻击）；容器隔离性强但冷启动慢（100ms-1s）。边缘场景偏重请求密度和冷启动，选 V8 Isolate；通用计算偏重安全隔离，选容器。","Durable Objects（Cloudflare 独特功能）：每个 Durable Object 是有唯一 ID 的持久化状态对象，全球唯一，强一致（所有对同一 Object 的请求被路由到同一个节点），可以存储状态（类似分布式 Actor）。适合实时协作（WebSocket + Durable Object 管理房间状态）、分布式锁、实时计数器。","WebAssembly（WASM）在边缘：允许 C/C++/Rust 等语言编译成 WASM 在 Edge Runtime 运行，解锁了 JS 无法完成的计算密集型任务（图像处理/加密/ML 推理）。Cloudflare Workers 原生支持 WASM，Fastly Compute@Edge 完全基于 WASM（比 V8 隔离性更强）。"]}],"res":[{"tp":"博客","tc":"b-blog","t":"Cloudflare Blog","d":"DDoS/XDP/QUIC/Workers/AI 推理，边缘技术前沿","s":"blog.cloudflare.com","u":"https://blog.cloudflare.com/","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"Cloudflare Workers 文档","d":"V8 Isolate/KV/Durable Objects/AI 绑定","s":"developers.cloudflare.com","u":"https://developers.cloudflare.com/workers/","lv":"mid"},{"tp":"免费书","tc":"b-book","t":"HTTP/3 Explained","d":"QUIC 协议：0-RTT/流多路复用/连接迁移","s":"http3-explained.haxx.se","u":"https://http3-explained.haxx.se/","lv":"entry"}]},{"id":"ai_app","phase":"Phase 9 · AI/LLM","title":"AI/LLM 应用层 · Agent · RAG · 多模态","color":"#7e22ce","bg":"#F5F3FF","intro":"LLM 应用工程的本质是管理不确定性——幻觉/格式错误/Prompt 注入都必须工程性解决。RAG 不只是向量检索，Agent 不只是工具调用，生产系统需要完整的 Evals 体系保证质量。","notes":[{"h":"CoT 与 Inference-time Compute","pts":["Chain-of-Thought（CoT）的本质：让模型在给出答案之前生成中间推理步骤，把隐含在参数里的知识通过显式文字展开，避免 one-shot 直接生成的压缩失真。'Let's think step by step' 这一句话就能激活未经 CoT 微调的模型的推理能力。","Inference-time Compute Scaling：同等推理预算下，小模型多步思考有时比大模型单步回答更好（DeepSeek R1、OpenAI o1 验证了这个结论）。三种形式：串行 thinking（生成 reasoning tokens）/ 并行采样+验证（Best-of-N+PRM）/ 树搜索（MCTS+LLM）。","Process Reward Model（PRM）：对每一步推理打分，而非只对最终答案打分（Outcome Reward）。PRM 能区分'对的推理路径到对的答案'和'错的推理路径碰巧到对的答案'，是 OpenAI o1 的核心组件。","Speculative Decoding：用小 draft model 快速生成 K 个 token，大 target model 并行验证，接受正确 token，拒绝后从大模型重新采样。理论加速 2-4x（取决于 draft model 和 target model 分布的重叠度），适合批量生成场景。"]},{"h":"RAG 系统架构","pts":["Naive RAG 的三大问题：1）查询-文档语义空间不对齐（查询短，文档段长）→ HyDE（生成假设答案文档再检索）/ Multi-Query（从多角度改写 query）；2）Chunk 缺乏上下文（段落切断后失去前后文）→ Contextual Retrieval（Anthropic，每个 chunk 前加 LLM 生成的上下文描述）；3）多跳推理无法完成→ Agentic RAG（多步检索）。","Hybrid Search（混合检索）是生产 RAG 的标配：Dense（语义向量检索，处理同义词/语义理解）+ Sparse（BM25 关键词检索，处理专有名词/代码/型号）→ RRF（Reciprocal Rank Fusion）融合排名。纯向量检索在专有名词和精确匹配场景召回率不足。","Re-ranking 是检索质量的关键提升：初步检索 Top-50（快速 Bi-Encoder）→ Cross-Encoder 精排 Top-5（同时看 query 和 document，精度高但无法做 ANN，只用于精排）。Cohere Rerank / BGE-Reranker 是常用选择，精排后 precision 提升约 30-50%。","GraphRAG（Microsoft 2024）：文档→知识图谱（命名实体+关系抽取）→ Community Detection（图聚类）→ Community Summary（每个社区生成摘要）。Local Search（具体实体问题）/ Global Search（需要全局理解的问题，如摘要/主题分析）。适合分析长文档/跨文档关联问题。"],"img_key":"rag_arch","img_link":"Retrieval-Augmented Generation","img_title":"https://en.wikipedia.org/wiki/Retrieval-augmented_generation"},{"h":"Agent 架构模式","pts":["ReAct（Reasoning + Acting）是最主流的 Agent 框架：Thought（推理下一步需要做什么）→ Action（调用工具）→ Observation（工具返回结果）→ Thought...循环直到任务完成。核心优势：推理和行动交织，中间步骤可解释，失败容易定位。","LangGraph 状态图范式：把 Agent 工作流显式建模为有向图，节点是 LLM 调用或工具调用，边是条件转移（基于状态决定下一步），State 在节点间传递。支持循环、分支、并行执行、Checkpoint（断点续跑）、human-in-the-loop（在关键节点等待人工确认）。","MCP（Model Context Protocol）：Anthropic 2024 年提出的开放协议，标准化 LLM 应用与工具/数据源的连接方式。MCP Server 暴露 Tools/Resources/Prompts，任何支持 MCP 的 AI 应用都可以直接使用。解决了工具生态碎片化的问题，类似 USB 标准化了设备接口。","生产 Agent 的可靠性工程：Prompt Injection 防御（用户输入永远在 user role，system prompt 用 XML tag 隔离）/ Tool Schema 设计（description 文字质量决定调用准确率）/ 幂等操作设计（重试安全）/ Circuit Breaker（工具频繁失败时熔断）/ 最大步骤限制（防止无限循环）。"]},{"h":"多模态：视觉/语音/视频","pts":["VLM（Vision Language Model）架构：视觉 Encoder（CLIP/ViT 提取图像特征）→ Projection Layer（把 visual tokens 映射到文本 embedding 空间）→ 与文本 tokens 拼接 → LLM 统一解码。高清图一页可能产生 1000+ visual tokens，是 context window 的主要消耗方向。","文档智能（Document Intelligence）路径选择：OCR + LLM（传统管道，会丢失布局/颜色信息，OCR 对手写/复杂表格错误率高）vs 端到端 VLM 直接理解（保留视觉语义，但 token 成本高）vs ColPali（整页图像直接 visual embedding，绕过 OCR，复杂布局处理最好）。","实时语音 Agent 延迟分解（目标总延迟 < 800ms）：VAD（语音活动检测，判断用户说完）< 200ms / ASR（Whisper 流式）< 300ms / LLM 首 token < 200ms / TTS 首音频块（ElevenLabs/Cartesia）< 100ms。Barge-in（用户打断 AI 说话）需要双工通信（WebRTC）和立即中止 LLM 生成/TTS 播放。","视频理解实践：帧采样策略决定质量和成本（均匀采样 vs 场景变化检测 vs 关键帧）。Frame-by-frame + LLM 聚合（简单可靠，token 成本高）vs 原生视频模型（Gemini 1.5 Pro 支持最长 1 小时视频）。长视频（>10 分钟）用分层摘要（Map-Reduce 模式）。"]}],"res":[{"tp":"博客","tc":"b-blog","t":"Building Effective Agents — Anthropic","d":"Agent 设计哲学：简单可靠模式，覆盖所有核心 Agent 模式","s":"Anthropic Research","u":"https://www.anthropic.com/research/building-effective-agents","lv":"entry"},{"tp":"官方文档","tc":"b-docs","t":"LangGraph 文档","d":"StateGraph/Checkpoint/human-in-the-loop/Streaming","s":"langchain-ai.github.io","u":"https://langchain-ai.github.io/langgraph/","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Contextual Retrieval (Anthropic 2024)","d":"chunk 前加上下文描述，召回率提升 49%","s":"Anthropic","u":"https://www.anthropic.com/news/contextual-retrieval","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"GraphRAG: From Local to Global (Microsoft)","d":"知识图谱+社区摘要，解决跨文档关联问题","s":"arXiv 2404.16130","u":"https://arxiv.org/abs/2404.16130","lv":"adv"},{"tp":"博客","tc":"b-blog","t":"MCP: Model Context Protocol — Anthropic","d":"标准化 LLM 与工具连接，工具生态互操作基础设施","s":"Anthropic","u":"https://www.anthropic.com/news/model-context-protocol","lv":"entry"},{"tp":"论文","tc":"b-paper","t":"ReAct: Reasoning + Acting in LLMs","d":"Thought→Action→Observation 循环，最主流 Agent 框架","s":"arXiv 2210.03629","u":"https://arxiv.org/abs/2210.03629","lv":"mid"}]},{"id":"ai_sys","phase":"Phase 9 · AI/LLM","title":"AI/LLM 系统层 · GPU · 训练与推理","color":"#6d28d9","bg":"#EDE9FE","intro":"LLM 推理的瓶颈不是算力而是内存带宽——理解 Roofline Model 是优化的前提。PagedAttention 解决 KV Cache 碎片，FlashAttention 解决 IO 瓶颈，Continuous Batching 消除 GPU 空转。","notes":[{"h":"GPU 内存体系与 Roofline Model","pts":["Roofline Model 分析 LLM 工作负载：纵轴是算力（TFLOPS），横轴是算术强度（FLOPs/Byte，即计算量/访存量）。工作负载落在 Roofline 左侧（低算术强度）是 Memory-bound（受 HBM 带宽限制），右侧是 Compute-bound（受 FLOPS 限制）。","LLM 推理的两个阶段性质截然不同：Prefill 阶段（处理输入 Prompt，所有 token 并行计算 Attention，算术强度高）是 Compute-bound；Decode 阶段（自回归逐 token 生成，每步只处理 1 个 token，需要把全部模型权重从 HBM 读一遍）是 Memory-bound。这决定了 Prefill/Decode 分离部署的架构价值。","H100 GPU 关键参数：80GB HBM3（带宽 3.35 TB/s）/ 132 SM / 每 SM 4 个 Tensor Core / FP16 峰值 989 TFLOPS / FP8 峰值 1979 TFLOPS / 700W TDP。Tensor Core 专门加速 GEMM（矩阵乘法），LLM 训练和推理 90%+ 计算是 GEMM，Tensor Core 是核心加速单元。","NVLink 4.0 提供 900 GB/s GPU 间带宽（PCIe 5.0 x16 约 64 GB/s 的 14 倍），8 块 H100 通过 NVSwitch 3.0 全互联（all-to-all），AllReduce 梯度同步完全在 GPU 间直接传输，绕过 CPU 内存和 PCIe 瓶颈。这是 DGX H100 训练大模型的核心设计。"]},{"h":"分布式训练：并行策略","pts":["数据并行（DP）：每块 GPU 有完整模型，不同 GPU 处理不同数据，梯度通过 AllReduce 聚合。通信量 = 模型参数量 × 2。FSDP（Fully Sharded Data Parallel）= ZeRO Stage 3：参数/梯度/optimizer state 全部切分，显存降低 N_gpu 倍，通信用 AllGather + ReduceScatter 替代 AllReduce。","张量并行（TP）：把单个矩阵乘法切分到多块 GPU，每块算矩阵的一部分，通过 AllReduce 合并中间结果。通信发生在每个 Attention/FFN 层内，延迟极敏感（需要 NVLink 直连），只在同一节点内使用。","流水线并行（PP）：把模型不同层分配到不同 GPU，形成流水线。1F1B（One Forward One Backward）调度：相比 GPipe 大幅减少流水线气泡（Bubble），激活内存与 micro-batch 数量线性增长而非和 stage 数量相关。","ZeRO-Infinity：把 optimizer state 卸载到 CPU 内存（+400GB CPU RAM）甚至 NVMe SSD（利用 NVMe 的顺序 IO 速度），允许在有限 GPU 显存内训练万亿参数模型。代价是 CPU↔GPU 传输开销，适合参数量远超显存的训练场景。"]},{"h":"LLM 推理优化","pts":["KV Cache：自回归解码时，每个 token 生成需要计算对所有历史 token 的 Attention，重复计算代价极大，因此缓存每层的 K/V 矩阵。KV Cache 大小 = batch_size × seq_len × layers × 2 × heads × head_dim × dtype_bytes。128K tokens 长上下文的 KV Cache 可能达到数十 GB。","PagedAttention（vLLM 核心）：传统 KV Cache 按最大序列长度预分配连续内存，大量内存碎片（利用率约 60%）。PagedAttention 把 KV Cache 切成固定大小的 Block（类似 OS 内存分页），逻辑连续但物理不连续，内存利用率提升到 90%+，显著提升并发 batch size。","Continuous Batching（迭代级调度）：传统 Static Batching 等整个 batch 所有序列生成完才换新 batch，GPU 大量空转（先完成的序列在等后完成的）。Continuous Batching 让序列生成完即刻换入新序列，GPU 永远满负荷，吞吐提升 23-36x（ORCA 论文数据）。","FlashAttention 的本质：标准 Attention 要把 QK^T 大矩阵写入 HBM 再读回做 Softmax，对于长序列这是 IO 瓶颈。FlashAttention 把 Attention 计算分成 tile，在 SRAM（约 20MB）内完成整个 tile 的 Softmax+matmul，只有最终结果写 HBM，HBM IO 减少 5-20 倍。在长上下文（32K+）场景下是 enabling technology。"]}],"res":[{"tp":"博客","tc":"b-blog","t":"Making Deep Learning Go Brrrr From First Principles","d":"Roofline Model，FLOPS vs Memory Bandwidth 权衡","s":"horace.io","u":"https://horace.io/brrr_intro.html","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"FlashAttention-2: Faster Attention","d":"IO-aware Attention，SRAM 内 tile 计算，HBM IO 减少 5-20x","s":"arXiv 2307.08691","u":"https://arxiv.org/abs/2307.08691","lv":"adv"},{"tp":"论文","tc":"b-paper","t":"Efficient Memory Management with PagedAttention (vLLM)","d":"KV Cache 虚拟内存分页，内存利用率 90%+","s":"arXiv 2309.06180","u":"https://arxiv.org/abs/2309.06180","lv":"adv"},{"tp":"视频","tc":"b-video","t":"Let's Build GPT from Scratch — Andrej Karpathy","d":"3小时从零实现 Transformer，LLM 工作原理最好视频","s":"YouTube — Andrej Karpathy","u":"https://www.youtube.com/watch?v=kCc8FmEb1nY","lv":"entry"},{"tp":"论文","tc":"b-paper","t":"ZeRO: Memory Optimizations (Microsoft DeepSpeed)","d":"切分 optimizer state/梯度/参数，万亿参数训练基础","s":"arXiv 1910.02054","u":"https://arxiv.org/abs/1910.02054","lv":"adv"}]},{"id":"hpc","phase":"Phase 10 · 高性能","title":"高性能低延迟 · DPDK · RDMA · eBPF","color":"#b45309","bg":"#FEF3C7","intro":"高性能系统的核心是消除每层不确定性：DPDK 消除内核开销，RDMA 消除 CPU 开销，FPGA 消除 jitter，eBPF 在内核最早的 hook 点拦截。HFT 的纳秒哲学——每一纳秒都要有来处。","notes":[{"h":"Linux 内核网络栈深度回顾","pts":["数据包完整旅程（接收）：NIC 收包 → DMA 写入 RX Ring Buffer（物理内存，NIC 自取，CPU 不参与）→ NIC 触发硬中断（HW IRQ）→ NAPI 关中断转 softirq 轮询（批量收包，budget=64）→ sk_buff 分配 → Netfilter hook 链 → TCP/IP 协议栈 → Socket Receive Buffer → 应用 read()。","DDIO（Intel Data Direct I/O）：NIC DMA 直接写入 CPU LLC（L3 Cache）而非 DRAM，CPU 读时命中 Cache 约 4ns 而非 DRAM 约 60ns。每包节省约 120ns，在 25Gbps 线速（约每秒 2000 万包）下效果极其显著。通过 PCIe 设备的 MMIO 配置开启。","RSS（Receive Side Scaling）：多队列 NIC 根据五元组哈希把不同的流分发到不同的 RX 队列（对应不同 CPU core），实现并行处理，消除单核瓶颈。配合 RPS（软件层面的 RSS，无 RSS 硬件时）和 RFS（Receive Flow Steering，确保包和应用在同一 CPU core 处理，提升 Cache 命中率）。","conntrack 性能陷阱：Linux Netfilter 连接跟踪默认表大小 nf_conntrack_max=131072，高并发场景下（百万并发连接）conntrack 表满导致新连接被丢弃（silent drop），是生产最常见的网络故障根源之一。监控：nf_conntrack_count 接近 nf_conntrack_max 时需要预警。"]},{"h":"内核旁路：DPDK / RDMA","pts":["DPDK（Data Plane Development Kit）完全绕过 Linux 内核：PMD（Poll Mode Driver）在用户态持续轮询 NIC BAR 空间（mmap NIC 寄存器），无硬中断、无 softirq、无 syscall、无 sk_buff 分配、无内核锁。每包处理路径完全确定，无 jitter，延迟约 1μs。代价：独占 CPU core（busy polling），CPU 利用率 100%。","RDMA（Remote Direct Memory Access）：NIC 直接 DMA 读写远端应用程序的内存，绕过 CPU 和 OS。应用调用 Verbs API 把 Work Request 投入 Queue Pair（QP），NIC 自主完成 RDMA 操作并更新 Completion Queue（CQ）。CPU 全程不参与数据搬运，延迟约 1-2μs，是 AI 训练集群（InfiniBand HDR 400G）的标准互联。","AF_XDP（Address Family XDP）：半内核旁路，比 DPDK 轻量。XDP 程序在驱动层把包通过 XSK（XDP Socket）映射到用户态共享内存（UMEM），应用直接从共享内存读包，避免内核拷贝。适合不需要完全绕过内核但需要高性能的场景（如 Cilium 的高性能负载均衡）。","HFT 的纳秒哲学：Tick-to-Trade 延迟 = NIC 收包时间戳 + 内核/用户态栈 + 策略运算 + 发单 + NIC 发包时间戳。真正到纳秒级竞争的系统，策略运算在 FPGA 里完成——不是因为 FPGA 算得最快，而是因为它每次都是固定纳秒数（无 jitter）。微波链路取代光纤：纽约→芝加哥微波约 8ms RTT vs 光纤约 14ms RTT，差 6ms 在统计套利策略里是生死线。"]},{"h":"eBPF：内核的安全可编程层","pts":["eBPF Verifier 保证安全性：对字节码做静态分析，验证无越界内存访问、无无限循环（有界执行时间）、所有路径有界、无未初始化内存读取。通过验证后 JIT 编译成原生机器码，执行效率接近内核代码（约 10ns/指令）。","eBPF 三大组成：Hook 点（200+ 类型：kprobe/uprobe/tracepoint/XDP/TC/socket/syscall/lsm）+ Map（内核用户态共享数据结构：HashMap/Array/LRU/RingBuf/Perf Event）+ Helper 函数（内核安全 API：约 200 个，如 bpf_map_lookup_elem/bpf_trace_printk）。","eBPF 在可观测性的核心价值：生产环境无侵入追踪（kprobe 动态插桩任意内核函数）/ 零代码修改的应用层追踪（uprobe 动态插桩用户态函数）/ 高效性能分析（perf_event：CPU 采样，Stack Trace 聚合在内核完成，只上报摘要，overhead < 1%）。bpftrace -e 'kprobe:tcp_retransmit_skb { @[comm] = count(); }' 实时统计 TCP 重传。","Cilium 基于 eBPF 的网络架构：用 eBPF 程序在 XDP 和 TC 层实现 Service IP 的负载均衡（DNAT），完全替代 kube-proxy 的 iptables 规则。iptables 规则数增加时查找复杂度 O(n)，eBPF HashMap 是 O(1)。测试数据：10000 个 Service 时，eBPF 方案的首包延迟比 iptables 低约 10 倍。"]}],"res":[{"tp":"权威站点","tc":"b-blog","t":"Brendan Gregg — Linux Performance 全集","d":"火焰图/eBPF/perf/NAPI，性能工程师完整工具箱","s":"brendangregg.com","u":"https://www.brendangregg.com/linuxperf.html","lv":"mid"},{"tp":"官方文档","tc":"b-docs","t":"DPDK Programmer's Guide","d":"PMD 轮询/内存池/多队列/Hugepage，内核旁路完整文档","s":"doc.dpdk.org","u":"https://doc.dpdk.org/guides/","lv":"adv"},{"tp":"官方文档","tc":"b-docs","t":"eBPF.io 官方入门","d":"Verifier/JIT/Map 原理，现代 Linux 基础设施横切技术","s":"ebpf.io","u":"https://ebpf.io/what-is-ebpf/","lv":"entry"},{"tp":"书籍","tc":"b-book","t":"BPF Performance Tools (Brendan Gregg)","d":"150+ eBPF 工具，CPU/内存/网络/安全，Netflix 生产案例","s":"brendangregg.com","u":"https://www.brendangregg.com/bpf-performance-tools-book.html","lv":"mid"},{"tp":"可视化","tc":"b-visual","t":"Latency Numbers Every Programmer Should Know","d":"L1 Cache 到跨洲 RTT 交互式延迟参考，面试必背","s":"colin-scott.github.io","u":"https://colin-scott.github.io/personal_website/research/interactive_latency.html","lv":"entry"},{"tp":"论文","tc":"b-paper","t":"What Every Programmer Should Know About Memory","d":"DRAM/Cache/TLB/NUMA 权威 114 页论文","s":"Ulrich Drepper","u":"https://people.freebsd.org/~lstewart/articles/cpumemory.pdf","lv":"adv"}]}];

function render(){
  const cont=document.getElementById('cont'),nav=document.getElementById('nav');
  let tot=0,curP='';
  D.forEach((s,si)=>{
    tot+=s.res.length;
    // sidebar
    if(s.phase!==curP){
      curP=s.phase;
      const lbl=document.createElement('div');lbl.className='nlbl';lbl.textContent=s.phase;nav.appendChild(lbl);
    }
    const a=document.createElement('a');
    a.className='nl';a.dataset.sec=s.id;a.onclick=()=>goto(s.id);
    a.innerHTML=`<span class="ndot" style="background:${s.color}"></span>${s.title.split('·')[0].trim()}<span class="nc">${s.res.length}</span>`;
    nav.appendChild(a);

    // section
    const div=document.createElement('div');
    div.className='sec';div.id=s.id;
    div.dataset.search=[s.title,s.intro,...s.notes.map(n=>n.h+' '+n.pts.join(' ')),...s.res.map(r=>r.t+' '+r.d+' '+r.s)].join(' ').toLowerCase();

    const hdr=`<div class="sch"><span class="sdot" style="background:${s.color}"></span><span class="stit">${s.title}</span></div>
<div class="intro-txt">${s.intro}${renderIntroLines(s.intro_lines)}</div>`;
    const tabId=`tab-${s.id}`;
    // notes pane
    let notesHTML='<div class="notes-block">';
    s.notes.forEach((n,ni)=>{
      const _diag=n.img_key?document.getElementById('diag_'+n.img_key):null;
      const _svg=_diag?_diag.innerHTML:'';
      const _link=n.img_key&&n.img_link?`<a class="diag-link" href="${n.img_link}" target="_blank" rel="noopener">↗ ${n.img_title||'参考资料'}</a>`:'';
      const _img=_svg?`<figure class="note-fig">${_svg}${_link}</figure>`:(_link?`<p>${_link}</p>`:'')
      
      const accId=`acc-${s.id}-${ni}`;
      notesHTML+=`<div class="acc" id="nh-${s.id}-${ni}"><div class="acc-hdr" onclick="toggleAcc('${accId}',this)"><span class="acc-arrow">▶</span><span class="acc-htxt">${n.h}</span></div><div class="acc-body" id="${accId}">${_img}<ul class="acc-pts">${n.pts.map(p=>`<li>${p}</li>`).join('')}</ul></div></div>`;
    });
    notesHTML+='</div>';

    // resources pane
    let resHTML='<div class="res-block"><div class="res-section-label">🔗 学习资源</div><div class="grid">';
    s.res.forEach(r=>{
      resHTML+=`<div class="card"><div class="ctop"><span class="badge ${r.tc}">${r.tp}</span><div class="ctit"><a href="${r.u}" target="_blank" rel="noopener">${r.t}</a></div></div><div class="cdesc">${r.d}</div><div class="cmeta"><span class="csrc">${r.s}</span><span class="cdiff ${dc(r.lv)}">${dl(r.lv)}</span></div><a class="curl" href="${r.u}" target="_blank" rel="noopener">${r.u.replace(/https?:\/\//,'').split('/')[0]}</a></div>`;
    });
    resHTML+='</div></div></div>';

    div.innerHTML=hdr+notesHTML+resHTML;
    cont.appendChild(div);
  });
  document.getElementById('stag').textContent=`${D.length} 个版块 · ${tot} 个资源`;
  renderLeg();
}

function renderLeg(){
  const items=[['b-paper','论文'],['b-blog','博客/文章'],['b-video','视频'],['b-docs','官方文档'],['b-book','书籍'],['b-course','课程'],['b-github','GitHub'],['b-tool','工具'],['b-visual','可视化']];
  const lg=document.getElementById('leg');
  items.forEach(([cls,lbl])=>{
    const s=document.createElement('span');s.className=`badge ${cls}`;s.style.cssText='font-size:11px;padding:3px 7px;';s.textContent=lbl;lg.appendChild(s);
  });
}

function switchTab(tabId,which,btn){
  document.querySelectorAll(`#${tabId}-notes,#${tabId}-res`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`${tabId}-${which}`).classList.add('active');
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleAcc(id,hdr){
  const body=document.getElementById(id);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  hdr.classList.toggle('open',!isOpen);
}

function goto(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'})}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  let matched=0;
  document.querySelectorAll('.sec').forEach(sec=>{
    if(!q){sec.classList.remove('hidden-sec');matched++;return;}
    const txt=sec.dataset.search||'';
    const hit=txt.includes(q);
    sec.classList.toggle('hidden-sec',!hit);
    if(hit)matched++;
  });
  document.getElementById('nr').style.display=matched===0&&q?'block':'none';
  document.getElementById('stag').textContent=q?`找到 ${matched} 个版块`:`${D.length} 个版块 · ${D.reduce((a,s)=>a+s.res.length,0)} 个资源`;
});

const obs={observe:()=>{}};
function detectSection(){
  const secs=[...document.querySelectorAll('.sec[id]')];
  if(!secs.length)return;
  const threshold=100;
  let current=secs[0];
  for(const s of secs){
    const top=s.getBoundingClientRect().top;
    if(top<=threshold)current=s;
    else break;
  }
  const id=current.id;
  document.querySelectorAll('.nl[data-sec]').forEach(l=>l.classList.toggle('active',l.dataset.sec===id));
  updateGuide(id);
}
window.addEventListener('scroll',detectSection,{passive:true});

window.addEventListener('scroll',()=>document.getElementById('btt').classList.toggle('show',scrollY>400));

buildToc();

function renderIntroLines(lines){if(!lines||!lines.length)return'';return'<div class="intro-lines">'+lines.map(function(l){return'<div class="intro-line">'+l+'</div>';}).join('')+'</div>';}
function buildToc(){
  const rail=document.getElementById('toc-rail');
  if(rail&&!document.getElementById('resize-handle')){
    rail.innerHTML='<div class="resize-handle" id="resize-handle"></div><div class="guide-content" id="guide-content"></div>';
    initResize();
  }
  updateGuide(D[0].id);
}
function updateGuide(id){
  const rail=document.getElementById('guide-content')||document.getElementById('toc-rail');
  if(!rail)return;
  const s=D.find(x=>x.id===id);
  if(!s)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const items=s.intro_lines&&s.intro_lines.length?s.intro_lines
    :s.notes?s.notes.map(n=>n.h):[];
  if(!items.length){rail.innerHTML='';return;}
  let h='<span class="guide-head">本节要点</span>';
  items.forEach((line,ni)=>{
    const key='kb_'+fk+'_'+id+'_'+ni;
    const done=localStorage.getItem(key)==='1';
    h+=`<div class="guide-item${done?' done':''}" id="gi-${id}-${ni}">`;
    h+=`<div class="guide-check" onclick="toggleDone('${fk}','${id}',${ni})">✓</div>`;
    h+=`<div class="guide-text" onclick="gotoEl('nh-${id}-${ni}')">${line}</div>`;
    h+='</div>';
  });
  rail.innerHTML=h;
}
function toggleDone(fk,sid,ni){
  const key='kb_'+fk+'_'+sid+'_'+ni;
  const done=localStorage.getItem(key)==='1';
  done?localStorage.removeItem(key):localStorage.setItem(key,'1');
  const el=document.getElementById('gi-'+sid+'-'+ni);
  if(el)el.classList.toggle('done',!done);
}
function gotoEl(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function initResize(){
  const handle=document.getElementById('resize-handle');
  if(!handle)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const stored=localStorage.getItem('toc-w-'+fk);
  if(stored)setTocWidth(parseInt(stored));
  let sx,sw;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    sx=e.clientX;
    sw=document.getElementById('toc-rail').getBoundingClientRect().width;
    document.addEventListener('mousemove',onDrag);
    document.addEventListener('mouseup',endDrag);
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    handle.classList.add('dragging');
  });
  function onDrag(e){
    setTocWidth(Math.max(160,Math.min(640,sw+(sx-e.clientX))));
  }
  function endDrag(){
    document.removeEventListener('mousemove',onDrag);
    document.removeEventListener('mouseup',endDrag);
    document.body.style.cursor='';
    document.body.style.userSelect='';
    handle.classList.remove('dragging');
    localStorage.setItem('toc-w-'+fk,
      Math.round(document.getElementById('toc-rail').getBoundingClientRect().width));
  }
}
function setTocWidth(w){
  const lay=document.querySelector('.lay');
  if(!lay)return;
  const cols=window.getComputedStyle(lay).gridTemplateColumns.split(' ');
  lay.style.setProperty('grid-template-columns',cols[0]+' 1fr '+w+'px','important');
}
</script>
