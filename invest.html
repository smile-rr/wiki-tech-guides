<text style="font:600 14px monospace;fill:#1e40af" x="125" y="70" text-anchor="middle">f* = (bp - q) / b</text>

<text class="sm" x="125" y="104" text-anchor="middle" fill="#3b82f6">b = 盈亏比  p = 胜率</text>
<text class="sm" x="125" y="118" text-anchor="middle" fill="#3b82f6">q = 1-p（失败概率）</text>
<text class="sm" x="125" y="132" text-anchor="middle" fill="#6b7280">实践：用半凯利减少波动</text>

const D=[{"id":"market_basics","phase":"市场认知","title":"三市基础认知 · A股 · 港股 · 美股特征","color":"#1e40af","bg":"#EFF6FF","intro":"A 股、港股、美股是三个运行逻辑完全不同的市场——投资者结构不同、定价机制不同、信息流动方式不同。在同一套框架里分析三个市场是最常见的错误，理解差异才是多市场投资的起点。","intro_lines":["▸ <strong>A股特征</strong> — 散户主导、政策市权重高、T+1限制、涨跌停制度的实际影响","▸ <strong>港股特征</strong> — 机构主导、流动性分化极大、AH溢价含义、南向资金的定价影响","▸ <strong>美股特征</strong> — T+0、无涨跌停、机构与散户信息不对称、指数化大趋势","▸ <strong>三市联动</strong> — 北向/南向资金、中概股与港股科技的关系、汇率传导","▸ <strong>开户现实</strong> — 大陆投资港股/美股的合规路径和实际操作"],"notes":[{"h":"A股：政策市的真实运行逻辑","pts":["A股有约 2.2 亿个人投资者账户，散户持股市值占比约 30-40%（交易量占比超过 70%）——这和美国市场（机构持股超过 80%）是完全相反的结构。散户主导的市场特征：短期交易行为主导价格波动、情绪驱动的板块轮动比基本面快、「消息面」和「政策面」对短期价格的影响常常大于公司基本面。这是 A 股独特的 Alpha 来源，也是机构在 A 股的超额收益来源之一。","政策市的理解：A 股有「政策底」的传统说法——当监管层或重要官员发出积极信号时，往往形成阶段性底部。国家队（汇金/社保基金/主权基金）的存在使得极端下跌有一定缓冲。这不是 A 股的弱点，而是投资框架的一部分——读懂政策信号是 A 股投资者必须掌握的技能，这在美股是不需要的。T+1（当天买入第二天才能卖出）和 ±10% 的涨跌停制度限制了做空效率，也使得某些非理性价格无法被快速纠正。","A 股的主要指数：上证综指（代表性不好，因为包含了大量低质量股票）；沪深 300（市值前 300，是机构的主要参考基准）；中证 500（中小市值，成长性更强但波动更大）；创业板指（成长型公司集中，和纳斯达克有相似的行业结构）；科创 50（科技硬件/半导体/医疗器械）。A 股的北向资金（沪深港通北向）是外资机构对 A 股的配置情绪指标，持续净流入对应外资看好。"],"img_key":"a_share","img_link":"A-share Market","img_title":"https://en.wikipedia.org/wiki/Shanghai_Stock_Exchange"},{"h":"港股：最被低估也最难理解的市场","pts":["港股的本质是「中国资产的离岸定价市场」——在港上市的大多数公司是中国内地公司，但投资者以国际机构为主。这创造了一种独特的张力：基本面由中国经济决定，但定价逻辑受国际资本流动、美元周期、地缘政治情绪的影响极大。当国际资本因为某些原因撤离新兴市场时，即使中国经济基本面不错，港股也会大幅下跌。","AH 溢价（或折价）：同一家公司在 A 股和 H 股的价格差异。通常 A 股溢价于 H 股（AH 溢价率 > 100%），因为 A 股的散户情绪推高了价格，而 H 股以机构定价为主。AH 溢价率极高时（比如 > 140%），H 股通常更「划算」；溢价率收窄时说明南向资金大量买入 H 股（认为 H 股被低估）。AH 溢价是港股投资里一个实用的参考信号。","港股流动性分化是最重要的风险之一：恒生指数的大市值权重股（腾讯/阿里/美团/友邦）流动性很好，交易成本低；但港股小市值股票（市值 < 5 亿港币）流动性极差，买卖价差极大，甚至可能出现「无人接盘」的情况。个人投资者应该严格限制在流动性足够的标的——成交额每日至少 1000 万港币是一个基本门槛。"]},{"h":"美股：最成熟也最「卷」的市场","pts":["美股的信息效率是三个市场里最高的：SEC 严格的信息披露要求、高频量化交易对价格异常的快速修正、全球最多的专业机构投研覆盖，使得「公开信息的挖掘价值」相对最低。个人投资者在美股的相对优势：① 长期持有优质公司（时间维度，机构需要短期绩效，你不需要）；② 特定行业的深度专业知识（你懂的，市场不一定定价对了）；③ 通过低成本指数 ETF 参与市场（个人投资者最确定的策略）。","美股的T+0和无涨跌停意味着价格发现更快，大事件（财报/美联储决议/宏观数据）的反应往往在几分钟内完成。这使得「追消息」的散户更难赚钱，但也使得长期持有的策略更容易执行——你永远可以在合理价格卖出，不需要等到「明天才能卖」。美股做空机制完善，这意味着高估值的「炒作」泡沫更难维持，但也使得估值回归可能比 A 股更快。","三市联动的实际逻辑：美联储加息→美元升值→资金从新兴市场流出→港股/A 股估值承压；中国政策利好→A 股上涨→南向资金（港股通）买入港股→港股同步上涨；美股科技板块大跌→中概股（在美上市的中国公司）同步下跌→情绪传导到港股科技板块。理解这三条传导路径，能解释 80% 以上的跨市场联动现象。"]}],"res":[{"tp":"工具","tc":"b-tool","t":"富途牛牛 / 老虎证券","d":"港美股交易平台，行情/研报/资讯一体，大陆用户最常用","u":"https://www.futunn.com/","lv":"entry","s":"futunn.com"},{"tp":"工具","tc":"b-tool","t":"东方财富 — A股行情与研报","d":"A股最全的免费数据平台，研报中心/资金流向/北向资金","u":"https://www.eastmoney.com/","lv":"entry","s":"eastmoney.com"},{"tp":"工具","tc":"b-tool","t":"Koyfin — 类 Bloomberg 免费平台","d":"覆盖美股/港股/宏观数据，Dashboard 可定制，比 Yahoo Finance 强","u":"https://app.koyfin.com/","lv":"mid","s":"koyfin.com"},{"tp":"博客","tc":"b-blog","t":"AH 溢价指数 — 同花顺","d":"实时 AH 溢价数据，港股 vs A 股价差的参考工具","u":"https://data.10jqka.com.cn/hkmarket/ah_stock/","lv":"entry","s":"10jqka.com.cn"},{"tp":"视频","tc":"b-video","t":"Bloomberg Markets — 港股/中概股日常行情","d":"Bloomberg 官方 YouTube，每日市场评论，港股/宏观新闻最快的英文来源","u":"https://www.youtube.com/@BloombergTelevision","lv":"entry","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"CNBC — 美股/全球市场实时播报","d":"CNBC 官方频道，财报季/美联储会议/宏观数据发布时的第一手报道","u":"https://www.youtube.com/@CNBC","lv":"entry","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"南华早报 SCMP — 中国/香港财经分析","d":"香港最权威英文媒体，中国政策解读 + 港股视频评论，YouTube 免费","u":"https://www.youtube.com/@SouthChinaMorningPost","lv":"entry","s":"youtube.com"}]},{"id":"investment_framework","phase":"投资框架","title":"投资框架 · 价值 vs 成长 vs 量化 · 个人边界","color":"#0f766e","bg":"#F0FDFA","intro":"先确认自己是哪类投资者，再选择匹配的框架——用错了框架比没有框架更危险。每种投资框架都有它成立的前提条件和它无法处理的场景。","intro_lines":["▸ <strong>四种框架的本质</strong> — 价值/成长/量化/宏观各自在做什么，需要什么信息优势","▸ <strong>个人投资者的真实优势</strong> — 你能做到机构做不到的事情有哪些","▸ <strong>中长期 vs 短中期的框架差异</strong> — 两种视野用的分析工具完全不同","▸ <strong>为什么大多数主动投资者跑不赢指数</strong> — 以及什么情况下可以"],"notes":[{"h":"四种投资框架的本质","pts":["价值投资（Value Investing）的核心是「以低于内在价值的价格买入资产，等待价值回归」。需要的能力：准确估算公司内在价值（财务分析能力 + 行业判断力）、长期持有的心理承受力（等待可能需要 3-5 年）、忽略短期市场情绪的能力。适合：有深度行业知识、有足够流动性不需要频繁变现、投资期限超过 3 年。巴菲特的方法在中国市场的应用需要调整：A 股的市场效率不如美股，估值扭曲持续时间可能更长，但政策因素可以快速让低估的资产重新定价。","成长投资（Growth Investing）的核心是「以合理价格买入未来增速高于市场预期的公司」。需要的能力：对行业趋势的前瞻判断（什么行业在 5 年后会显著更大）、对公司竞争优势可持续性的判断、对「合理价格」的定义（成长投资不是不看估值，而是愿意为增长付溢价）。成长投资失败的最常见原因：买在行业爆发已经被市场充分定价之后（PE 已经 100 倍+），或者行业趋势判断正确但选错了受益公司。","量化投资（Quantitative Investing）的核心是「用系统性的规则替代主观判断，从历史数据中提取统计优势」。个人投资者的量化不需要高频交易，而是：①因子选股（用多个财务/市场因子的组合系统性筛选股票）；②趋势跟踪（动量策略）；③统计套利（AH 溢价套利/配对交易）。量化的优势是消除情绪，劣势是历史规律在未来可能失效（尤其是结构性变化时期）。","宏观策略（Macro Investing）的核心是「基于宏观经济判断在资产类别之间配置」——利率上行时减持长债和高估值成长股、持有美元；经济复苏初期加配周期股；政策刺激预期时加配国内消费和基建。宏观策略对个人投资者最有价值的应用：大方向的仓位管理（市场整体是高估还是低估？现在适合重仓还是轻仓？），而不是精确的资产轮动时机预测（这连机构都做不好）。"],"img_key":"inv_frameworks","img_link":"Investment Strategy","img_title":"https://en.wikipedia.org/wiki/Investment_strategy"},{"h":"个人投资者的真实优势","pts":["时间（最重要）：公募基金经理受季度考核压力，不能长期持有「短期表现差但长期正确」的仓位；私募受业绩报酬约束，极端亏损时需要强制减仓。个人投资者没有这些约束，可以在别人被迫卖出时持有，等待价值回归。巴菲特的名言「股市是把钱从不耐心的人转移到耐心的人」在机构主导的市场里对个人投资者格外有利。","规模限制的反面：大型基金管理百亿规模时，一个小市值公司即使上涨 100% 对整体组合影响也不到 1%，他们根本不会研究。但个人投资者规模小，可以在小市值公司里找到机构没有覆盖、定价低效的机会——这是机构无法复制的个人优势，但需要付出更多研究功夫。","专业领域的深度知识：如果你在银行/金融科技工作 16 年，你对金融科技行业的理解深度远超大多数股票分析师。你知道哪类风险系统真正有竞争力，哪类客户真正愿意付费，哪家公司的技术路线更可持续。这种「内行人的判断」在你熟悉的行业里比财务分析更有价值。"]},{"h":"为什么主动投资者长期跑不赢指数","pts":["统计事实：标普 500 的数据显示，超过 90% 的主动管理基金在 20 年维度上跑输同类指数基金。中国市场（A 股）主动基金的历史表现好于美股，但超额收益也在收窄（市场越来越有效）。这不是说主动投资不可能跑赢，而是说：对大多数不具备系统性优势的投资者，指数 ETF 是更正确的选择。","主动投资者跑输的主要原因：交易成本（频繁交易的摩擦成本在复利下很显著）；情绪决策（追涨杀跌是最普遍的亏损原因）；信息劣势（你的「消息」通常是最后知道的）；过度分散（持有 30 只股票的「组合」在预期收益上接近指数，但管理成本高得多）。","什么情况下可以跑赢：深度专业知识（了解的行业）+ 足够长的持有周期（3 年以上）+ 足够低的换手率（每年换手率 < 30%）+ 足够低的杠杆（不用融资融券）。这四个条件同时满足时，个人投资者是有真实优势的。不满足这四个条件时，与其主动选股，不如把主要仓位放在宽基指数 ETF，用少量仓位做自己熟悉领域的主动选择。"],"img_key":"active_vs_passive","img_link":"Passive Management","img_title":"https://en.wikipedia.org/wiki/Passive_management"}],"res":[{"tp":"书籍","tc":"b-book","t":"聪明的投资者 — Benjamin Graham","d":"价值投资圣经，巴菲特的启蒙读物，安全边际概念的来源","u":"https://www.amazon.com/Intelligent-Investor-Definitive-Investing-Essentials/dp/0060555661","lv":"mid","s":"amazon.com"},{"tp":"书籍","tc":"b-book","t":"价值 — 张磊（高瓴资本）","d":"中国长期价值投资的最佳本土视角，覆盖 A 股和中国企业","u":"https://book.douban.com/subject/35259327/","lv":"entry","s":"douban.com"},{"tp":"博客","tc":"b-blog","t":"Howard Marks 备忘录（橡树资本）","d":"全球顶级宏观投资者的思考记录，免费，每篇都值得细读","u":"https://www.oaktreecapital.com/insights","lv":"mid","s":"oaktreecapital.com"},{"tp":"博客","tc":"b-blog","t":"SPIVA Report — S&P 主动 vs 被动对比","d":"权威数据：主动管理基金 vs 指数基金的长期表现对比","u":"https://www.spglobal.com/spdji/en/research-insights/spiva/","lv":"mid","s":"spglobal.com"},{"tp":"视频","tc":"b-video","t":"Warren Buffett — 历年股东大会（精华剪辑）","d":"伯克希尔年会问答，价值投资哲学的最佳一手来源，YouTube 有大量剪辑","u":"https://www.youtube.com/results?search_query=Warren+Buffett+shareholder+meeting+2024","lv":"entry","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"Ben Felix — 循证投资（CSI）","d":"CFA，基于学术研究的投资分析，每期视频附参考文献，驳斥大量投资迷思","u":"https://www.youtube.com/@BenFelixCSI","lv":"mid","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"The Plain Bagel — 投资基础概念","d":"清晰讲解价值投资/成长投资/指数基金/行为金融，适合建立框架认知","u":"https://www.youtube.com/@ThePlainBagel","lv":"entry","s":"youtube.com"}]},{"id":"macro_policy","phase":"宏观与政策","title":"宏观分析 · 政策解读 · 美联储 · 2025动态","color":"#7c3aed","bg":"#F5F3FF","intro":"宏观分析在 A/H 股的权重远大于纯基本面分析。不读懂宏观周期和政策信号，在中国市场就是用了一半的地图在导航。这个版块提供实用的宏观框架，不是经济学理论，而是「如何把宏观数据用在投资决策里」。","intro_lines":["▸ <strong>中国宏观框架</strong> — GDP/通胀/信贷/汇率的传导链，哪些数据最值得跟踪","▸ <strong>政策信号解读</strong> — 如何读政府工作报告/重要会议/产业政策，识别真实信号","▸ <strong>美联储周期</strong> — 加息/降息对港股/中概股/汇率的传导机制","▸ <strong>2025-2026 关键背景</strong> — DeepSeek 引发的科技资产重估，贸易格局变化","▸ <strong>汇率与资产配置</strong> — 人民币汇率对不同资产类别的影响路径"],"notes":[{"h":"中国宏观：最值得跟踪的指标","pts":["不是所有宏观数据都值得花时间。最值得跟踪的五个指标：①社会融资规模（社融）——信用扩张的前置指标，社融同比增速加速通常领先于股市底部 1-2 个季度；② PMI（制造业/服务业采购经理指数）——经济活动的月度体温计，超过 50 代表扩张；③CPI/PPI——通胀/通缩的信号，PPI 深度负值时往往对应企业盈利压力；④外储/汇率——资本流动的信号；⑤房地产新开工数据——对上游产业链（钢铁/建材/家居）的传导先行指标。","政策工具箱：中国的主要政策工具是货币政策（央行降准/降息）、财政政策（专项债发行/减税降费）、产业政策（补贴/国产替代要求/监管收紧或放松）。和美联储的区别：中国不完全靠利率调控，行政手段（窗口指导/行业监管）有时比货币政策更直接。对投资的含义：关注政策方向的改变，而不只是看绝对政策力度——政策从收紧转向放松的拐点，往往是市场见底的信号。","跟踪政策信号的实用方法：① 每年 3 月两会，重点读政府工作报告里的「重点支持行业」和「GDP 增速目标」；② 每年 12 月中央经济工作会议，定调明年经济政策基调；③ 国务院/各部委的专项政策文件，特别关注「鼓励」和「限制」名单的调整；④ 主要媒体（新华社/人民日报）的措辞变化——从「防范」到「促进」的用词转变，通常早于正式政策发布。"]},{"h":"美联储周期对中国资产的影响","pts":["美联储加息周期的传导链：加息→美元升值→新兴市场资本外流→港股/中概股估值承压（用美元计价的资产面临折价）→人民币贬值压力→A 股外资持仓减少。这个链条在 2022-2023 年美联储快速加息期间非常清晰——港股恒生指数从 2021 年高点跌了超过 50%，核心原因之一正是美元流动性收紧导致的全球风险资产重定价。","美联储降息周期（2024 年开始）对中国资产通常是正面的：美元走弱→新兴市场吸引力上升→港股/中概股估值修复空间打开→南向资金加速流入港股（锁定高股息低估值资产）。但降息周期并不直接等于中国股市上涨——还需要国内经济数据的配合（内需恢复、企业盈利改善）。降息打开了「天花板」，国内基本面决定实际涨幅。","2025-2026 年最重要的背景变量：①DeepSeek R1（2025 年 1 月）引发了全球对中国 AI 能力的重新评估，港股 AI 受益标的在 DeepSeek 发布后 5 周内上涨 45%（J.P. Morgan 数据），超过所有其他中国股票类别。②贸易格局的结构性变化（中美科技脱钩、东南亚供应链重组）对不同行业的影响分化——有的公司受益（国产替代、海外产能布局），有的公司受损（依赖美国技术/市场）。③房地产长周期调整对消费的持续影响，这是宏观 Alpha 最难把握的部分。"],"img_key":"fed_cycle","img_link":"Federal Reserve","img_title":"https://en.wikipedia.org/wiki/Federal_Reserve"},{"h":"汇率：被低估的资产配置工具","pts":["人民币汇率对不同资产的影响路径各不相同：A 股——人民币贬值对出口型企业正面（营收换算成人民币更多），对进口型企业和持有大量美元债的公司负面；港股——港股以港元计价，港元与美元挂钩，人民币贬值意味着内地投资者买港股的成本上升，南向资金往往在人民币贬值期间减少；美股/美元资产——人民币贬值使美元资产的人民币收益率上升，利好持有美股/美债的投资者。","外汇管制下的个人操作现实：大陆居民每年外汇额度是 5 万美元。直接购汇投资美股需要占用额度；通过港股通（沪深港通南向）投资港股不需要外汇额度，是目前最便利的「离岸配置」路径；通过合格境内机构投资者（QDII）基金间接配置美股/港股/全球 ETF，不受个人外汇额度限制，是中长期全球配置的主要渠道。","汇率的简单判断框架：①中美利差（美债收益率 - 中债收益率）扩大时，人民币有贬值压力（资金倾向流向高息的美元资产）；②出口数据超预期时，外贸企业结汇的美元增加，对人民币形成支撑；③央行中间价的设置，是官方态度的直接信号——中间价持续比市场预期强时，说明央行在稳汇率；④CFETS 指数（人民币兑一篮子货币）比单看美元/人民币更全面，因为中国贸易伙伴不只是美国。"]}],"res":[{"tp":"工具","tc":"b-tool","t":"中国人民银行官网 — 货币政策数据","d":"利率/准备金率/社融/M2 等官方数据，一手来源","u":"http://www.pbc.gov.cn/","lv":"entry","s":"pbc.gov.cn"},{"tp":"工具","tc":"b-tool","t":"Macrotrends — 美国宏观历史数据","d":"美联储利率/通胀/GDP 等长期历史数据，可视化强","u":"https://www.macrotrends.net/","lv":"entry","s":"macrotrends.net"},{"tp":"博客","tc":"b-blog","t":"J.P. Morgan 私人银行亚洲市场洞察","d":"机构级别的中国/港股/宏观分析，部分报告公开","u":"https://privatebank.jpmorgan.com/apac/en/insights","lv":"mid","s":"jpmorgan.com"},{"tp":"博客","tc":"b-blog","t":"Wind 资讯 — 中国宏观数据库","d":"最全的中国宏观/金融数据，专业版收费但免费内容也够用","u":"https://www.wind.com.cn/","lv":"mid","s":"wind.com.cn"},{"tp":"视频","tc":"b-video","t":"Patrick Boyle — 宏观/衍生品/对冲基金","d":"量化对冲基金创始人 + 伦敦国王学院教授，深度宏观分析 + 幽默英式口吻","u":"https://www.youtube.com/@PBoyle","lv":"mid","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"Economics Explained — 各国经济体分析","d":"深度讲解各国宏观经济，包含中国/美国/新兴市场经济结构分析","u":"https://www.youtube.com/@EconomicsExplained","lv":"entry","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"George Gammon — 美联储与宏观机制","d":"用白板解释美联储政策/美元体系/货币机制，是理解美联储操作的最好入门","u":"https://www.youtube.com/@GeorgeGammon","lv":"mid","s":"youtube.com"}]},{"id":"fundamental","phase":"基本面分析","title":"基本面分析 · 财务三表 · 估值 · 行业框架","color":"#dc2626","bg":"#FEF2F2","intro":"基本面分析是「判断一家公司值多少钱」的系统性方法。不需要成为会计师——需要的是建立「哪些指标真正重要」的判断力，以及「这家公司的竞争优势能持续多久」的行业洞察。","intro_lines":["▸ <strong>财务三表联动</strong> — 利润表/资产负债表/现金流量表各自说明什么，最重要的红旗信号","▸ <strong>核心估值指标</strong> — PE/PB/PS/EV-EBITDA 的适用场景，以及为什么高 PE 不一定贵","▸ <strong>DCF 直觉</strong> — 什么是折现，利率对估值的杠杆效应为什么这么大","▸ <strong>行业分析框架</strong> — Porter 五力和护城河，如何判断竞争优势的持续性","▸ <strong>港股特有分析维度</strong> — H 股 vs 红筹 vs 本地股，持股结构分析"],"notes":[{"h":"财务三表：最重要的信号","pts":["利润表告诉你「公司在这个周期里赚了多少」，但最重要的是看「收入增长的质量」——是靠价格提升还是靠量的增长？是靠一次性收益还是持续经营？毛利率是否在改善？最常见的红旗信号：收入增速很高但应收账款增速更高（收入可能是「赊出去」的）；净利润很高但经营现金流为负（利润可能是「纸面上的」）；非经常性损益占净利润超过 20%（可持续性存疑）。","资产负债表告诉你「公司现在的财务健康程度」。关键比率：资产负债率（负债/总资产，制造业 < 60% 相对安全；金融行业因为杠杆模型不同，不能用同一标准）；流动比率（流动资产/流动负债 > 1.5 说明短期偿债能力足够）；商誉（Goodwill，历史并购累积的溢价，需要关注是否有减值风险，商誉超过净资产 30% 是需要关注的信号）。","现金流量表是三表里「最难造假」的——利润可以通过会计处理调整，但现金进出是实际发生的。自由现金流（Free Cash Flow）= 经营现金流 - 资本支出，是企业「真正赚到的现金」的最好衡量。长期投资最应该关注的公司特征：净利润 ≈ 经营现金流（利润质量高），自由现金流持续为正（可以自我扩张不依赖外部融资）。"],"img_key":"financial_3","img_link":"Financial Statements","img_title":"https://en.wikipedia.org/wiki/Financial_statement"},{"h":"估值指标：用对场景才有意义","pts":["PE（市盈率）= 股价/每股收益，直觉是「买这家公司需要多少年赚回投资」。适用于：盈利稳定的成熟公司（消费/医药/金融）。不适用于：亏损公司（PE 无意义）、周期性极强的公司（周期顶部 PE 低是假象）、高增长公司（用历史 PE 低估了增长价值）。相同行业内的 PE 横向比较有意义，跨行业比较需要非常谨慎。","PB（市净率）= 股价/每股净资产，衡量「为账面资产支付了多少溢价」。最适合银行/保险/地产等资产驱动型行业（资产值可以可靠计量）。对轻资产科技公司（资产主要是人才和品牌）PB 极高但没有参考意义。银行 PB < 1 是历史罕见的低估信号，但需要确认资产质量（不良贷款率）。PS（市销率）= 股价/每股收入，适用于亏损但有收入增长的早期公司（Saas/互联网）。","DCF 的核心直觉：一家公司的价值等于它未来所有现金流折现到今天的总和。折现率（通常用无风险利率 + 风险溢价，约 8-12%）代表「你要求的最低回报率」。当美联储加息时，折现率上升，未来现金流折现后更「不值钱」，所以高估值（估值全靠远期增长）的成长股在加息周期里会大幅下跌。这是 2022 年纳斯达克和港股科技股暴跌的数学原因——不是基本面变了，是折现率变了。"],"img_key":"valuation","img_link":"Valuation","img_title":"https://en.wikipedia.org/wiki/Valuation_(finance)"},{"h":"护城河：竞争优势能持续多久","pts":["Morningstar 的护城河分类是最实用的框架：无形资产（品牌/专利/监管许可，如贵州茅台的品牌溢价）；转换成本（用户切换竞争对手的代价，如企业 ERP 系统的高切换成本）；网络效应（用户越多产品越有价值，如微信/Visa）；成本优势（规模经济/独特低成本来源，如宁德时代的电池成本）；高效规模（市场容量有限，新进入者利润空间不够，如特定地区的垃圾处理厂）。","护城河判断的实践方法：① 这家公司能维持超过行业平均水平的利润率多少年了？（历史 ROE/ROIC 数据）；② 如果我有 10 亿美元想在这个领域竞争，能打败它吗？如果答案是「很难」，护城河可能是真实的；③ 这家公司的市场份额是在扩大还是在缩小？（趋势比绝对值更重要）；④ 它的增长是靠价格提升还是靠量的扩张？靠价格提升说明有定价权（护城河信号）。","港股特有分析：H股（在港上市、在内地注册的公司，大多是国企）vs 红筹股（在港注册、资产主要在内地）vs 本地港股（业务主要在香港，如长和/银行/地产）vs 中概股二次上市（阿里/京东/百度等在港上市的互联网公司）。持股结构分析特别重要：主要股东持股比例高的小市值港股流动性通常很差；外资机构持股比例高的公司受美联储周期影响更大；南向资金连续净买入是港股版的「北向资金」，是内地机构看好的信号。"],"img_key":"moat","img_link":"Economic Moat","img_title":"https://en.wikipedia.org/wiki/Economic_moat"}],"res":[{"tp":"工具","tc":"b-tool","t":"Seeking Alpha — 美港股研究","d":"机构级别的财务数据/估值比较/研究文章，部分免费","u":"https://seekingalpha.com/","lv":"mid","s":"seekingalpha.com"},{"tp":"工具","tc":"b-tool","t":"Choice 东方财富数据 — A股财务","d":"A股最全的财务数据，三表/指标历史/行业对比","u":"https://data.eastmoney.com/","lv":"entry","s":"eastmoney.com"},{"tp":"书籍","tc":"b-book","t":"财务报表分析与股票估值 — 徐子桐","d":"中国市场背景的财务分析教材，案例都是A/H股","u":"https://book.douban.com/subject/35121419/","lv":"mid","s":"douban.com"},{"tp":"工具","tc":"b-tool","t":"Morningstar 护城河分析","d":"全球股票的护城河评级，宽护城河/窄护城河/无护城河分类","u":"https://www.morningstar.com/","lv":"mid","s":"morningstar.com"},{"tp":"视频","tc":"b-video","t":"Aswath Damodaran — 估值课程全集（NYU 免费）","d":"「估值之神」，NYU Stern 教授，每年更新完整估值课程，DCF/相对估值/财务分析","u":"https://www.youtube.com/@AswathDamodaran","lv":"mid","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"Damodaran：2025 年估值课程播放列表","d":"Spring 2025 最新一期完整估值课，26 节，每节 60-90 分钟，含幻灯片","u":"https://www.youtube.com/playlist?list=PLUkh9m2BorqnDpCBt6bnekXpz3K4JKBU9","lv":"mid","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"Invest with Sven Carlin — 长期价值投资","d":"欧洲价值投资者，深度分析个股和行业，有大量护城河/财务分析实例视频","u":"https://www.youtube.com/@SvenCarlin","lv":"mid","s":"youtube.com"}]},{"id":"ai_investing","phase":"AI 辅助投资","title":"AI 辅助投资 · 工具实践 · 量化入门 · 2025最新","color":"#7c3aed","bg":"#F5F3FF","intro":"AI 在投资里正在从「效率工具」转向「真正的 Alpha 协作者」——这是 CFA Institute 2025 年《AI in Asset Management》报告的核心判断。摩根士丹利/高盛/JP Morgan 都在大规模部署 AI 投资工具。个人投资者可以用相似的思路，成本只是他们的千分之一。","intro_lines":["▸ <strong>AI 能做什么</strong> — 财报分析/研报摘要/情绪监控/异常信号检测，每项的真实效果","▸ <strong>机构实践参考</strong> — 摩根士丹利 AskResearchGPT / 高盛 GS AI Assistant 的实际应用","▸ <strong>个人 AI 工作流</strong> — 从信息摄入到分析到决策的完整流程搭建","▸ <strong>量化入门</strong> — Python + AkShare + Backtrader，个人量化的最低成本路径","▸ <strong>AI 投资工具对比</strong> — AInvest / Kavout / QuantConnect / stockinsights.ai 的定位"],"notes":[{"h":"AI 在投资里的真实价值边界","pts":["AI 能做好的事情：① 财报分析摘要——把 100 页的年报压缩为关键风险点和亮点，10 分钟内完成（Claude/GPT-4 的质量已经足够用）；② 电话会议记录分析——提取管理层言论的情绪变化和关键指引（「我们对下季度非常有信心」vs「市场环境充满挑战」）；③ 跨文档对比——同行业 5 家公司的毛利率/资本支出/增速同时对比；④ 新闻情绪监控——设定关键词，自动汇总和评估新闻情绪变化；⑤ 数据清洗和可视化——快速整理 AkShare/Tushare 拉来的原始数据。","AI 不能做的事情：预测价格（没有任何 AI 能可靠地预测未来股价）；替代判断（AI 给出的分析结论需要你理解背后的假设是否成立）；消除不确定性（市场的本质是不确定性，AI 只是减少了信息处理的时间，不能消除判断的本质难度）。2025 年的 AI 投资工具对宏观/地缘政治等「非结构化风险」的分析质量仍然有限，这类风险需要人的判断。","CFA Institute 2025 年报告的核心发现：机构投资者已经把 AI 从「效率工具」升级为「生成 Alpha 的协作者」——不只是快速处理信息，而是在寻找人力无法扫描的模式（比如几百家公司的供应链关系图谱）。个人投资者的机会：用免费/低成本的 AI 工具做「研究深度」的杠杆，弥补信息处理能力的差距。重点不是「AI 给我买什么」，而是「AI 帮我看更多，判断还是我来」。"]},{"h":"搭建个人 AI 投资分析工作流","pts":["信息摄入层（每天 15-20 分钟）：用 Perplexity 做实时研究（「过去 24 小时 [公司名] 有什么重要新闻？」）；用 Claude/ChatGPT 把关注公司的关键新闻做每日摘要；设置 Google Alert 或 Feedly 对关键词的监控。目标是：用 AI 过滤噪音，只把真正值得深入研究的信息留下来。","深度分析层（每个投资标的研究时）：① 用 Claude 分析财报——「这是 [公司] 最新一期年报的关键段落，请提取：收入增长驱动因素、主要风险因素、管理层对未来的判断、与上期相比的重要变化」；② 用 stockinsights.ai 分析电话会议记录（支持自动提取关键 Quote）；③ 用 Koyfin 的 AI 功能快速对比同行业估值。","量化验证层（验证投资假设）：Python + AkShare（A股免费数据）是个人量化的起点。基础工作流：① AkShare 拉取历史价格和财务数据；② pandas 做数据清洗和因子计算；③ Backtrader 或 VectorBT 做策略回测；④ 用回测结果验证你的投资假设（「ROE > 15% 且 PE < 行业均值的公司，持有 1 年的平均收益是多少？」）。注意回测的过拟合风险：样本内效果好不代表样本外（未来）有效，需要用 Walk-Forward 测试减少过拟合。"]},{"h":"主流 AI 投资工具对比","pts":["AInvest（ainvest.com）：AI 驱动的股票分析平台，覆盖美股/港股，实时新闻分析 + AI 生成研究报告 + 情绪分析。免费版功能已经相当实用。适合：每天快速浏览关注标的的 AI 摘要，不需要自己爬数据和分析。","QuantConnect（quantconnect.com）：开源 LEAN 引擎，支持美股/港股/加密货币的策略回测和实盘交易。专业量化工具，学习曲线较陡但功能最全面——覆盖数据获取、因子模型、蒙特卡洛模拟、Walk-Forward 优化。适合：想认真做量化投资的个人投资者，免费使用，社区活跃。","stockinsights.ai：专门分析公司 SEC 文件和电话会议记录的 AI 工具，支持自动提取关键引述和趋势变化。2024 年 IFTA 最佳 WealthTech 创新奖。适合：主要投资美股，需要深度财报分析的投资者。Kavout：机器学习因子分析，K-Score 排名系统，覆盖美股 9000+ 标的，整合基本面/技术/情绪多因子。适合：量化为主的美股选股。"]}],"res":[{"tp":"文档","tc":"b-docs","t":"CFA Institute：AI in Asset Management（2025，免费）","d":"机构 AI 投资工具的权威框架，CFA 出品，免费 PDF","u":"https://rpc.cfainstitute.org/research/foundation/2025/ai-in-asset-management-book","lv":"mid","s":"cfainstitute.org"},{"tp":"工具","tc":"b-tool","t":"AkShare — A股免费数据 Python 库","d":"覆盖 A股/港股/期货/宏观的完整免费数据接口，Python","u":"https://akshare.akfamily.xyz/","lv":"mid","s":"akshare.akfamily.xyz"},{"tp":"工具","tc":"b-tool","t":"QuantConnect — 量化策略平台","d":"LEAN 开源引擎，专业级回测+实盘，免费使用","u":"https://www.quantconnect.com/","lv":"adv","s":"quantconnect.com"},{"tp":"工具","tc":"b-tool","t":"AInvest — AI 股票分析","d":"AI 驱动的美港股研究，实时情绪分析，免费版可用","u":"https://www.ainvest.com/","lv":"entry","s":"ainvest.com"},{"tp":"工具","tc":"b-tool","t":"stockinsights.ai — 财报 AI 分析","d":"公司文件和电话会议 AI 深度分析，IFTA 2024 最佳 WealthTech","u":"https://www.stockinsights.ai/","lv":"mid","s":"stockinsights.ai"},{"tp":"视频","tc":"b-video","t":"Corey Hoffstein（Newfound Research）— 量化投资","d":"系统性量化投资策略，因子模型/动量/趋势，学术严谨但平易近人","u":"https://www.youtube.com/@NewfoundResearch","lv":"adv","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"QuantPy — Python 量化投资实战","d":"用 Python 实现量化策略：AkShare 数据获取 + Backtrader 回测 + 因子分析","u":"https://www.youtube.com/@QuantPy","lv":"mid","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"Two Sigma / Citadel — 量化金融公开讲座","d":"顶级量化基金的公开演讲，机器学习在金融中的应用，学术会议视频","u":"https://www.youtube.com/results?search_query=two+sigma+quantitative+finance+lecture","lv":"adv","s":"youtube.com"}]},{"id":"portfolio_mgmt","phase":"组合管理","title":"投资组合管理 · 仓位 · 风控 · 再平衡","color":"#0891b2","bg":"#ECFEFF","intro":"投资组合管理是「如何分配资金」和「如何管理风险」的系统性方法。单只股票的选择只占投资成功的一部分，仓位管理、止损规则、再平衡策略决定了长期下来你是否能活过熊市、在牛市里充分参与。","intro_lines":["▸ <strong>Core-Satellite 结构</strong> — 70% 核心稳健 + 30% 主题机会，两部分用完全不同的逻辑管理","▸ <strong>仓位管理</strong> — 凯利公式的直觉，单票集中度的上限，如何根据信心程度分配仓位","▸ <strong>止损与止盈</strong> — 系统性规则，在情绪平静时设定，不在焦虑时执行","▸ <strong>资产配置与再平衡</strong> — 相关性比收益率更重要，何时再平衡"],"notes":[{"h":"Core-Satellite：两种逻辑管理两类仓位","pts":["Core（核心仓位，70%）：用低成本宽基指数 ETF 构建，目标是「跟上市场，不跑输大盘」。具体选择：A 股用沪深 300 ETF 或中证 500 ETF；港股用恒生科技 ETF 或 MSCI 中国 ETF；全球配置用标普 500 ETF（通过 QDII 基金实现）。核心仓位的操作是：定期定投，每半年再平衡一次，不因短期市场波动做调整。这是「用最少时间获得市场平均收益」的策略。","Satellite（卫星仓位，30%）：用主动选股填充，这是你的专业知识和研究的战场。原则：只在你有真实信息优势的领域下注（你深度了解的行业/公司）；单只股票不超过总组合的 10%（防止单票黑天鹅影响整体）；最多持有 5-8 只个股（超过这个数量，研究深度不够，等于变相的指数）。卫星仓位的目标是：在有高确定性机会时获得超额收益，不是把所有仓位都放在主动选股里。","核心和卫星的再平衡原则：当卫星仓位的某只股票因为大涨导致占比超过 15% 时，应该部分兑现利润补充回核心仓位；当市场整体极度悲观（VIX 极高/市场连续大跌）时，可以把卫星仓位比例暂时提高到 40%（更多买入低估的个股）；正常市场时保持 70/30 的平衡。"],"img_key":"core_satellite","img_link":"Core-Satellite Strategy","img_title":"https://en.wikipedia.org/wiki/Core%E2%80%93satellite_investing"},{"h":"仓位管理：用数学而非感觉","pts":["凯利公式的直觉版本：最优仓位 = 优势/赔率。如果你认为某只股票有 60% 的概率上涨 50%、40% 的概率下跌 30%，凯利公式建议的最大仓位约为 20%（实际操作中通常用半凯利，即 10%）。凯利公式的重要启示：不要在「不确定性高但潜在收益也大」的情况下满仓——满仓下注几次后，一次判断错误就可能毁掉多次正确积累的收益。","分批建仓的实践：不要一次性把计划仓位全部建完。先用计划仓位的 1/3 建初始仓，如果股价进一步下跌验证了你的判断（基本面没有恶化，只是市场情绪导致的下跌），用第二个 1/3 在更低价格加仓；第三个 1/3 留作备用。这种方式降低了平均持仓成本，也给了你「再次确认判断」的机会，避免「越跌越加」变成「越加越亏」的陷阱。","止损规则的设计：在买入之前就确定「什么情况下我会承认判断错误并卖出」，而不是在亏损后再做决定。基于价格的止损（跌超 20% 就卖）简单但可能因为正常波动就触发；基于基本面的止损（业绩连续两季度低于预期/管理层大规模减持/行业逻辑发生根本变化）更合理，但要求你持续跟踪公司动态。两者可以结合：正常波动内等待基本面信号，但价格跌超 30% 时无论如何减仓一半（控制最大亏损）。"],"img_key":"position_sizing","img_link":"Position Sizing","img_title":"https://en.wikipedia.org/wiki/Position_sizing"},{"h":"资产配置：相关性比收益率更重要","pts":["资产配置的核心逻辑是「不要把鸡蛋放在同一个篮子里」——但「篮子不同」的意思不是行业不同，而是相关性低。A 股的科技股和消费股在市场大跌时往往同步下跌（相关性高），真正的分散化需要加入：债券（与股票负相关）、黄金（与美元和股票均有低相关性）、美股（与A股的相关性不高，提供汇率对冲）。","中国个人投资者的实用资产配置框架（仅供参考，不是投资建议）：A 股 ETF（30-40%）→ 覆盖国内经济增长；港股（10-15%）→ 覆盖国内资产的离岸估值洼地；美股 ETF（15-20%，通过QDII）→ 全球科技增长 + 美元对冲；债券/货币基金（15-20%）→ 流动性储备 + 下行保护；黄金 ETF（5-10%）→ 通胀对冲 + 地缘政治对冲。这个框架在任何单一市场极端下跌时都有缓冲，长期复合收益率接近「参与了全球增长」的水平。","再平衡的时机和方式：时间触发（每 6 个月检查一次，如果某类资产偏离目标权重超过 5%，则再平衡）比价格触发更简单；阈值触发（某类资产偏离目标超过 10%，立即再平衡）更及时但操作频率更高。税务考量：在中国 A 股，股票转让收益（个人）目前免征个人所得税，再平衡的税务成本主要是交易印花税（双边各 0.1%，卖出方收）和佣金。"],"img_key":"asset_alloc","img_link":"Asset Allocation","img_title":"https://en.wikipedia.org/wiki/Asset_allocation"}],"res":[{"tp":"书籍","tc":"b-book","t":"全球资产配置 — Meb Faber","d":"数据驱动的全球资产配置方法，免费 PDF 版本可下载","u":"https://mebfaber.com/2016/02/24/global-asset-allocation/","lv":"mid","s":"mebfaber.com"},{"tp":"工具","tc":"b-tool","t":"Portfolio Visualizer — 组合回测","d":"资产配置回测工具，输入权重看历史表现和相关性矩阵","u":"https://www.portfoliovisualizer.com/","lv":"mid","s":"portfoliovisualizer.com"},{"tp":"工具","tc":"b-tool","t":"CNN Fear & Greed Index","d":"美国市场情绪指标，极端恐惧时是加仓信号","u":"https://www.cnn.com/markets/fear-and-greed","lv":"entry","s":"cnn.com"},{"tp":"视频","tc":"b-video","t":"Ben Felix：资产配置与指数投资深度讲解","d":"为什么低成本指数基金优于主动基金，资产配置的学术证据，必看 20 分钟","u":"https://www.youtube.com/watch?v=seaXsBHcMNI","lv":"entry","s":"youtube.com"},{"tp":"视频","tc":"b-video","t":"Ray Dalio：经济机器如何运作（经典 30 分钟）","d":"桥水创始人用动画讲解经济周期和债务周期，迄今最好的宏观入门视频","u":"https://www.youtube.com/watch?v=PHe0bXAIuk0","lv":"entry","s":"youtube.com"}]},{"id":"strategy_tools","phase":"策略与工具","title":"投资策略框架 · 中长期主题 · 工具汇总","color":"#374151","bg":"#F9FAFB","intro":"最后一个版块把所有东西整合起来：中长期策略如何判断、短中期机会如何把握、2025-2026 年值得关注的投资主题，以及所有实用工具和数据源的完整汇总。","intro_lines":["▸ <strong>中长期策略</strong> — 宏观趋势判断框架，核心仓位的选择逻辑，定投和网格的使用","▸ <strong>短中期机会</strong> — 事件驱动，财报季，情绪周期，技术面和基本面如何结合","▸ <strong>2025-2026 关键投资主题</strong> — AI 产业链/新能源/消费/港股高股息，每个主题的逻辑和风险","▸ <strong>完整工具与数据源汇总</strong> — 按用途分类的全部实用工具"],"notes":[{"h":"中长期投资策略框架","pts":["中长期投资（1-3 年）的核心是「在正确的时间，以合理的价格，买入正确方向上的优质公司，然后持有」。「正确的时间」不是预测底部，而是在估值合理/低估时买入，不在泡沫时追高；「正确方向」是顺应产业趋势（政策支持 + 市场空间 + 技术驱动），而非逆势而为；「优质公司」是护城河宽、管理层诚信、财务健康的标的。三个条件同时满足的机会不多，但一旦出现，应该重仓持有。","定投策略是解决「择时难题」的最实用方法：每月固定日期买入固定金额的宽基 ETF，不管市场涨跌。核心逻辑是「价格下跌时买到更多份额，价格上涨时已持有的份额升值」，长期平均成本低于市场平均价格（数学上可证明）。网格策略是定投的进阶版：预先设定价格区间，每下跌一定幅度加仓，每上涨一定幅度减仓，系统性地「低买高卖」，适合波动较大但长期趋势向上的资产（如宽基 ETF 或大市值核心股）。","中国产业趋势的判断框架：分辨「政策驱动」（补贴推动的短期热点）和「产业驱动」（真实市场需求）的区别。政策驱动的行业在补贴退坡后往往面临收入下滑和产能过剩（如某些阶段的光伏组件）；产业驱动的行业即使没有政策支持也在持续增长（如智能手机渗透、电动车普及）。当两者同时发生时（政策支持 + 真实需求）是最强的顺风机会——2020-2023 年的新能源汽车就是典型。"]},{"h":"2025-2026 年关键投资主题","pts":["AI 产业链（当前最重要的中长期主题）：DeepSeek 证明了中国在 AI 模型能力上的突破，但 AI 投资的 Alpha 需要更细分——算力基础设施（服务器/交换机/光模块，供给相对确定）vs AI 应用（变现路径不确定但空间更大）vs AI 赋能的传统行业（最难量化但可能是最大的机会）。港股 AI 受益标的在 DeepSeek 发布后 5 周累积涨幅 45%（J.P. Morgan 数据），这个幅度的快速重估说明外资之前对中国 AI 能力的低估程度。","港股高股息策略（防御性中长期配置）：港股有一类特殊的机会——H 股估值比 A 股低 20-40%，但股息率高达 5-8%（国企能源/银行/电信）。在美联储降息周期里，这类高股息港股的吸引力上升（相对收益改善），同时南向资金的持续流入提供了价格支撑。这是「吃息 + 低估值修复」的双重回报逻辑，适合作为组合里的防御性配置。","短中期机会的把握框架：财报季（3月/4月/7月/8月/10月）是最集中的事件驱动机会——提前研究几家公司，对业绩有超预期或低于预期的判断，在财报发布后根据实际情况快速决策。情绪周期的应用：恐慌时（A 股连续 3-5 天大跌、悲观情绪主导媒体标题时）往往是短期反弹的起点；亢奋时（FOMO 情绪蔓延、「人人都在谈论」某只股票时）往往是短期顶部的信号。这不是精确预测，而是概率提升——在极度恐慌时买入，在极度亢奋时减仓，长期来看是胜率最高的短中期策略。"]},{"h":"完整工具与数据源汇总","pts":["A 股数据与分析：东方财富（行情/研报/资金流向，免费）/ 同花顺（技术分析/北向资金，免费）/ Wind（专业级，订阅制，机构标准）/ Tushare（Python 接口，学术和个人免费）/ AkShare（完全免费，覆盖最全）。A 股研报获取：东方财富研报中心（免费）/ 各大券商 App 的研究报告（需要开户）/ 雪球（讨论区有大量个人研究分享）。","港股与国际数据：富途牛牛 / 老虎证券（港美股交易 + 行情，大陆用户最方便）/ aastocks.com（港股技术分析和新闻，免费）/ Koyfin（类 Bloomberg，覆盖全球，免费版功能强）/ Yahoo Finance（美股基础数据，免费）/ Seeking Alpha（深度研究，部分收费）/ Bloomberg（机构标准，个人版价格很高，不推荐个人订阅）。","AI 辅助投资工具：Claude / ChatGPT（财报分析/研报摘要，最通用）/ Perplexity（实时信息检索）/ AInvest（AI 股票分析，免费可用）/ stockinsights.ai（财报深度分析）/ QuantConnect（量化回测）/ Portfolio Visualizer（资产配置回测）/ Backtrader / VectorBT（本地量化框架）。宏观数据：中国人民银行官网 / Wind 宏观数据库 / Macrotrends（美国宏观历史数据）/ Fred（美联储经济数据库，免费）/ 国家统计局官网（中国宏观数据一手来源）。"]}],"res":[{"tp":"工具","tc":"b-tool","t":"AkShare — A股/港股/期货完整数据","d":"Python 完全免费数据接口，最全的量化数据源","u":     }
    const a=document.createElement('a');a.className='nl';a.dataset.sec=s.id;a.onclick=()=>goto(s.id);
    a.innerHTML=`<span class="ndot" style="background:${s.color}"></span>${s.title.split('·')[0].trim()}<span class="nc">${s.res.length}</span>`;
    nav.appendChild(a);
    const div=document.createElement('div');div.className='sec';div.id=s.id;
    div.dataset.search=[s.title,s.intro,...s.notes.map(n=>n.h+' '+n.pts.join(' ')),...s.res.map(r=>r.t+' '+r.d)].join(' ').toLowerCase();
    const tid=`t-${s.id}`;
    let notesHTML=`<div class="notes-block">`;
    s.notes.forEach((n,ni)=>{
      const _diag=n.img_key?document.getElementById('diag_'+n.img_key):null;
      const _svg=_diag?_diag.innerHTML:'';
      const _link=n.img_key&&n.img_link?`<a class="diag-link" href="${n.img_link}" target="_blank" rel="noopener">↗ ${n.img_title||'参考资料'}</a>`:'';
      const _img=_svg?`<figure class="note-fig">${_svg}${_link}</figure>`:(_link?`<p>${_link}</p>`:'')
      
      const aid=`a-${s.id}-${ni}`;
      notesHTML+=`<div class="acc" id="nh-${s.id}-${ni}"><div class="acc-hdr" onclick="toggleAcc('${aid}',this)"><span class="acc-arrow">▶</span><span class="acc-htxt">${n.h}</span></div><div class="acc-body" id="${aid}">${_img}<div class="pts-wrap">${n.pts.map(p=>`<div class="pt">${p}</div>`).join('')}</div></div></div>`;
    });
    notesHTML+='</div>';
    let resHTML=`<div class="res-block"><div class="res-section-label">🔗 学习资源</div><div class="grid">`;
    s.res.forEach(r=>{
      resHTML+=`<div class="card"><div class="ctop"><span class="badge ${r.tc}">${r.tp}</span><div class="ctit"><a href="${r.u}" target="_blank" rel="noopener">${r.t}</a></div></div><div class="cdesc">${r.d}</div><div class="cmeta"><span class="csrc">${r.s}</span><span class="cdiff ${dc(r.lv)}">${dl(r.lv)}</span></div><a class="curl" href="${r.u}" target="_blank" rel="noopener">${r.u.replace(/https?:\/\//,'').split('/')[0]}</a></div>`;
    });
    resHTML+='</div></div></div>';
    div.innerHTML=`<div class="sch"><span class="sdot" style="background:${s.color}"></span><span class="stit">${s.title}</span></div><div class="intro-txt">${s.intro}${renderIntroLines(s.intro_lines)}</div>${notesHTML}${resHTML}`;
    cont.appendChild(div);
  });
  document.getElementById('stag').textContent=`${D.length} 个版块 · ${tot} 个资源`;
  const items=[['b-paper','论文'],['b-blog','博客/文章'],['b-video','视频'],['b-docs','文档'],['b-book','书籍'],['b-course','课程'],['b-github','GitHub'],['b-tool','工具'],['b-visual','可视化']];
  const lg=document.getElementById('leg');
  items.forEach(([cls,lbl])=>{const s=document.createElement('span');s.className=`badge ${cls}`;s.style.cssText='font-size:11px;padding:3px 7px;';s.textContent=lbl;lg.appendChild(s);});
}
function switchTab(tid,which,btn){
  document.querySelectorAll(`#${tid}-notes,#${tid}-res`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`${tid}-${which}`).classList.add('active');
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleAcc(id,hdr){
  const body=document.getElementById(id),isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);hdr.classList.toggle('open',!isOpen);
}
function goto(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'})}
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();let m=0;
  document.querySelectorAll('.sec').forEach(sec=>{
    if(!q){sec.classList.remove('hidden-sec');m++;return;}
    const hit=(sec.dataset.search||'').includes(q);sec.classList.toggle('hidden-sec',!hit);if(hit)m++;
  });
  document.getElementById('nr').style.display=m===0&&q?'block':'none';
  document.getElementById('stag').textContent=q?`找到 ${m} 个版块`:`${D.length} 个版块 · ${D.reduce((a,s)=>a+s.res.length,0)} 个资源`;
});
const obs={observe:()=>{}};
function detectSection(){
  const secs=[...document.querySelectorAll('.sec[id]')];
  if(!secs.length)return;
  const threshold=100;
  let current=secs[0];
  for(const s of secs){
    const top=s.getBoundingClientRect().top;
    if(top<=threshold)current=s;
    else break;
  }
  const id=current.id;
  document.querySelectorAll('.nl[data-sec]').forEach(l=>l.classList.toggle('active',l.dataset.sec===id));
  updateGuide(id);
}
window.addEventListener('scroll',detectSection,{passive:true});
window.addEventListener('scroll',()=>document.getElementById('btt').classList.toggle('show',scrollY>400));
render();
buildToc();setTimeout(detectSection,100);
function renderIntroLines(lines){if(!lines||!lines.length)return'';return'<div class="intro-lines">'+lines.map(function(l){return'<div class="intro-line">'+l+'</div>';}).join('')+'</div>';}
function buildToc(){
  const rail=document.getElementById('toc-rail');
  if(rail&&!document.getElementById('resize-handle')){
    rail.innerHTML='<div class="resize-handle" id="resize-handle"></div><div class="guide-content" id="guide-content"></div>';
    initResize();
  }
  updateGuide(D[0].id);
}
function updateGuide(id){
  const rail=document.getElementById('guide-content')||document.getElementById('toc-rail');
  if(!rail)return;
  const s=D.find(x=>x.id===id);
  if(!s)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const items=s.intro_lines&&s.intro_lines.length?s.intro_lines
    :s.notes?s.notes.map(n=>n.h):[];
  if(!items.length){rail.innerHTML='';return;}
  let h='<span class="guide-head">本节要点</span>';
  items.forEach((line,ni)=>{
    const key='kb_'+fk+'_'+id+'_'+ni;
    const done=localStorage.getItem(key)==='1';
    h+=`<div class="guide-item${done?' done':''}" id="gi-${id}-${ni}">`;
    h+=`<div class="guide-check" onclick="toggleDone('${fk}','${id}',${ni})">✓</div>`;
    h+=`<div class="guide-text" onclick="gotoEl('nh-${id}-${ni}')">${line}</div>`;
    h+='</div>';
  });
  rail.innerHTML=h;
}
function toggleDone(fk,sid,ni){
  const key='kb_'+fk+'_'+sid+'_'+ni;
  const done=localStorage.getItem(key)==='1';
  done?localStorage.removeItem(key):localStorage.setItem(key,'1');
  const el=document.getElementById('gi-'+sid+'-'+ni);
  if(el)el.classList.toggle('done',!done);
}
function gotoEl(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function initResize(){
  const handle=document.getElementById('resize-handle');
  if(!handle)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const stored=localStorage.getItem('toc-w-'+fk);
  if(stored)setTocWidth(parseInt(stored));
  let sx,sw;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    sx=e.clientX;
    sw=document.getElementById('toc-rail').getBoundingClientRect().width;
    document.addEventListener('mousemove',onDrag);
    document.addEventListener('mouseup',endDrag);
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    handle.classList.add('dragging');
  });
  function onDrag(e){
    setTocWidth(Math.max(160,Math.min(640,sw+(sx-e.clientX))));
  }
  function endDrag(){
    document.removeEventListener('mousemove',onDrag);
    document.removeEventListener('mouseup',endDrag);
    document.body.style.cursor='';
    document.body.style.userSelect='';
    handle.classList.remove('dragging');
    localStorage.setItem('toc-w-'+fk,
      Math.round(document.getElementById('toc-rail').getBoundingClientRect().width));
  }
}
function setTocWidth(w){
  const lay=document.querySelector('.lay');
  if(!lay)return;
  const cols=window.getComputedStyle(lay).gridTemplateColumns.split(' ');
  lay.style.setProperty('grid-template-columns',cols[0]+' 1fr '+w+'px','important');
}
