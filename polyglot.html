<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--s:#fff;--s2:#f1f5f9;--s3:#e8f0fe;--bd:#e2e8f0;--bd2:#cbd5e1;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--bl:#1d4ed8;--blbg:#eff6ff;--blbd:#bfdbfe;--sw:220px}
html{font-size:14px;line-height:1.6;color:var(--tx)}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
.hdr{position:sticky;top:0;z-index:100;background:var(--s);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;align-items:center;gap:12px}
.htit{font-size:13px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px}
.hsub{font-size:10px;color:var(--tx3);font-weight:400}
.srch{flex:1;max-width:380px;position:relative}
.srch input{width:100%;padding:5px 11px 5px 28px;border:1px solid var(--bd2);border-radius:7px;font-size:12px;background:var(--s2);color:var(--tx);outline:none}
.srch input:focus{border-color:#93c5fd;background:#fff}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--tx3)}
.stag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--blbg);color:var(--bl);border:1px solid var(--blbd);white-space:nowrap}
.lay{display:flex;min-height:calc(100vh - 41px)}
.sb{width:var(--sw);flex-shrink:0;position:sticky;top:41px;height:calc(100vh - 41px);overflow-y:auto;background:var(--s);border-right:1px solid var(--bd);padding:8px 0}
.sb::-webkit-scrollbar{width:3px}.sb::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.nlbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:7px 12px 2px;margin-top:4px}
.nl{display:flex;align-items:center;gap:6px;padding:4px 12px;font-size:11px;color:var(--tx2);cursor:pointer;transition:background .1s}
.nl:hover{background:var(--s2);color:var(--tx)}
.nl.active{background:var(--blbg);color:var(--bl)}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nc{margin-left:auto;font-size:9px;padding:1px 4px;background:var(--s2);border-radius:8px;color:var(--tx3)}
.main{flex:1;padding:16px 22px 60px;overflow-x:hidden}
.sec{margin-bottom:28px;scroll-margin-top:50px}
.sch{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:7px;border-bottom:2px solid var(--bd)}
.sdot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.stit{font-size:14px;font-weight:600}
.intro-txt{font-size:12px;color:var(--tx3);margin-bottom:10px;padding:8px 12px;border-radius:6px;border-left:3px solid #93c5fd;background:var(--blbg);line-height:1.6}
.tabs{display:flex;gap:3px;margin-bottom:10px}
.tab-btn{padding:5px 14px;font-size:12px;border:1px solid var(--bd);border-radius:6px;background:var(--s2);color:var(--tx2);cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--s);color:var(--tx);border-color:var(--bl);font-weight:500}
.tab-btn:hover:not(.active){background:var(--s)}
.tab-pane{display:none}
.tab-pane.active{display:block}
.acc{border:1px solid var(--bd);border-radius:9px;overflow:hidden;margin-bottom:8px;transition:box-shadow .15s}
.acc:hover{box-shadow:0 1px 6px rgba(0,0,0,.06)}
.acc-hdr{display:flex;align-items:center;gap:9px;padding:10px 14px;background:var(--s2);cursor:pointer;user-select:none;transition:background .15s}
.acc-hdr:hover{background:#e8edf2}
.acc-arrow{font-size:9px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.acc-hdr.open .acc-arrow{transform:rotate(90deg)}
.acc-htxt{font-size:12.5px;font-weight:500;color:var(--tx)}
.acc-body{display:none}
.acc-body.open{display:block}
.pts-wrap{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px}
.pt{font-size:12.5px;color:var(--tx2);line-height:1.75;padding:10px 14px;background:var(--s);border:1px solid var(--bd);border-left:3px solid #cbd5e1;border-radius:0 7px 7px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:8px}
.card{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:5px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--bd2);box-shadow:0 2px 6px rgba(0,0,0,.05)}
.card.hidden{display:none}
.ctop{display:flex;align-items:flex-start;gap:6px}
.badge{font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;flex-shrink:0;white-space:nowrap;margin-top:1px;border:1px solid transparent}
.ctit{font-size:12px;font-weight:500;color:var(--tx);line-height:1.4}
.ctit a{color:inherit;text-decoration:none}
.ctit a:hover{color:var(--bl);text-decoration:underline}
.cdesc{font-size:11px;color:var(--tx2);line-height:1.4}
.cmeta{display:flex;align-items:center;gap:6px;margin-top:1px}
.csrc{font-size:10px;color:var(--tx3)}
.cdiff{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
.de{background:#f0fdf4;color:#15803d}.dm{background:#fffbeb;color:#b45309}.da{background:#fef2f2;color:#b91c1c}
.curl{font-size:10px;color:#64748b;word-break:break-all;text-decoration:none}
.curl:hover{color:var(--bl)}
.b-paper{background:#f8fafc;color:#334155;border-color:#cbd5e1}
.b-blog{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.b-video{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}
.b-docs{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}
.b-github{background:#f0fdf4;color:#14532d;border-color:#bbf7d0}
.b-course{background:#ecfdf5;color:#065f46;border-color:#a7f3d0}
.b-book{background:#fef3c7;color:#92400e;border-color:#fde68a}
.b-tool{background:#fdf4ff;color:#7e22ce;border-color:#e9d5ff}
.b-visual{background:#fce7f3;color:#9d174d;border-color:#fbcfe8}
.sec.hidden-sec{display:none}
.nr{display:none;text-align:center;padding:40px;color:var(--tx3);font-size:13px}
.btt{position:fixed;bottom:20px;right:20px;width:32px;height:32px;background:var(--bl);color:#fff;border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:13px}
.btt.show{opacity:1}.btt:hover{background:#1e3a8a}
.leg{display:flex;flex-wrap:wrap;gap:4px;padding:14px 0 0;border-top:1px solid var(--bd);margin-top:4px}
.res-block{margin-top:14px}.res-section-label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-top:12px;border-top:1px solid var(--bd)}/* ── READABILITY OVERRIDES ── */
.acc-body{display:block!important}
.acc{border:none!important;border-radius:0!important;box-shadow:none!important;margin-bottom:0!important}
.acc+.acc{border-top:1px solid var(--bd)!important}
.acc:hover{box-shadow:none!important}
.acc-hdr{background:transparent!important;padding:16px 0 5px!important;cursor:default!important;gap:0!important}
.acc-hdr:hover,.acc-hdr.open{background:transparent!important}
.acc-arrow{display:none!important}
.acc-htxt{font-size:13.5px!important;font-weight:600!important;color:var(--tx)!important;letter-spacing:-.01em}
.pts-wrap{padding:4px 0 22px!important;gap:16px!important}
.pt{font-size:13.5px!important;line-height:1.85!important;color:var(--tx2)!important;padding:0!important;background:transparent!important;border:none!important;border-radius:0!important}
.pt:hover{border-left-color:transparent!important}
.intro-txt{font-size:13px!important;line-height:1.72!important}
.intro-txt{font-style:normal!important;color:var(--tx)!important;background:transparent!important;padding:2px 0 2px 14px!important;border-radius:0!important}.intro-lines{margin-top:11px;display:flex;flex-direction:column;gap:6px}.intro-line{font-size:13px;line-height:1.65;color:var(--tx2)}.intro-line strong{color:var(--tx);font-weight:600}
/* ── THREE-COLUMN LAYOUT ── */
.content-area{flex:1;display:flex;align-items:flex-start;min-width:0;gap:0}
.main{flex:1;max-width:720px;min-width:0}
.toc-rail{width:190px;flex-shrink:0;position:sticky;top:41px;height:calc(100vh - 41px);overflow-y:auto;padding:14px 0 20px 14px;border-left:1px solid var(--bd);background:var(--s)}
.toc-rail::-webkit-scrollbar{width:2px}.toc-rail::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.toc-head{display:block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd);padding-right:14px}
.toc-sec{display:block;font-size:11px;color:var(--tx3);text-decoration:none;padding:3px 0;line-height:1.4;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:14px;transition:color .12s}
.toc-sec:hover{color:var(--tx2)}
.toc-sec.active{color:var(--bl)!important;font-weight:600}
.toc-notes{flex-direction:column;display:none}
.toc-notes.open{display:flex}
.toc-note{display:block;font-size:10.5px;color:var(--tx3);text-decoration:none;padding:2px 14px 2px 10px;line-height:1.4;cursor:pointer;border-left:2px solid transparent;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .12s}
.toc-note:hover{color:var(--tx2)}
.toc-note.active{color:var(--bl);border-left-color:var(--bl)}
[id^="nh-"]{scroll-margin-top:60px}
@media(max-width:1200px){.toc-rail{display:none}}
/* ── GUIDE RAIL REDESIGN ── */
.content-area{gap:40px!important}
.toc-rail{background:transparent!important;border-left:none!important;padding:18px 0 20px 0!important}
.guide-head{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:14px}
.guide-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:none}
.guide-check{width:15px;height:15px;border:1.5px solid var(--bd2);border-radius:3px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s}
.guide-check:hover{border-color:var(--bl)}
.guide-item.done .guide-check{background:var(--bl);border-color:var(--bl);color:#fff}
.guide-text{font-size:11.5px;color:var(--tx3);line-height:1.6;cursor:pointer;flex:1;transition:color .12s}
.guide-text:hover{color:var(--tx2)}
.guide-text strong{color:var(--tx2);font-weight:600}
.guide-item.done .guide-text{opacity:.4;text-decoration:line-through;text-decoration-color:var(--bd2)}
.guide-item.done .guide-text strong{color:inherit}
/* ── RESPONSIVE 3-COLUMN GRID (overrides all previous layout rules) ── */
.lay{display:grid!important;align-items:start!important;gap:0!important;
     grid-template-columns:clamp(180px,16%,240px) 1fr clamp(220px,22%,320px)!important}
.content-area{display:contents!important;flex:unset!important;gap:unset!important}
.main{flex:unset!important;max-width:none!important;min-width:0!important;padding-right:36px!important}
.toc-rail{width:unset!important;min-width:unset!important;flex-shrink:unset!important;
          padding-left:22px!important;border-left:1px solid var(--bd)!important;
          background:transparent!important}
@media(max-width:1200px){
  .toc-rail{display:none!important}
  .lay{grid-template-columns:clamp(180px,16%,240px) 1fr!important}
}
/* ── RESIZE HANDLE ── */
.toc-rail{position:relative!important}
.resize-handle{position:absolute;left:-1px;top:0;bottom:0;width:8px;cursor:col-resize;
  z-index:20;background:transparent;border-left:2px solid transparent;transition:border-color .15s,background .15s}
.resize-handle:hover,.resize-handle.dragging{border-left-color:var(--bl);background:rgba(99,102,241,.07)}
.guide-content{width:100%}

/* === STICKY GUIDE FIX === */
.toc-rail{
  position:sticky!important;
  top:41px!important;
  height:calc(100vh - 41px)!important;
  overflow-y:auto!important;
  align-self:start!important;
}
.lay{align-items:start!important}

.note-fig{margin:12px 0 16px;border:1px solid var(--bd);border-radius:8px;padding:12px;overflow:hidden;background:var(--s)}
.note-fig svg{width:100%;height:auto;display:block;max-height:300px}
.diag-link{display:inline-block;margin-top:8px;font-size:11px;color:var(--accent,#2563eb);text-decoration:none;opacity:.8}
.diag-link:hover{opacity:1;text-decoration:underline}
</style>

<div id="diag_gmp" style="display:none"><svg viewBox="0 0 520 195" xmlns="http://www.w3.org/2000/svg">
<style>.t{font:600 11px sans-serif}.sm{font:10px sans-serif}</style>
<text class="t" x="260" y="14" text-anchor="middle" fill="#111">GMP 调度模型：Goroutine / Machine / Processor</text>
<rect x="10" y="24" width="490" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
<text class="t" x="260" y="40" text-anchor="middle" fill="#334155">Go Runtime 调度器</text>
<text class="sm" x="260" y="56" text-anchor="middle" fill="#64748b">全局 Goroutine 队列（GRQ）+ 每个 P 的本地队列（LRQ）</text>
<rect x="10" y="76" width="145" height="110" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text class="t" x="82" y="94" text-anchor="middle" fill="#1e40af">P (Processor)</text>
<text class="sm" x="82" y="110" text-anchor="middle" fill="#3b82f6">逻辑处理器，≈ CPU核数</text>
<text class="sm" x="82" y="124" text-anchor="middle" fill="#3b82f6">持有本地 G 队列</text>
<rect x="22" y="132" width="55" height="22" rx="3" fill="#93c5fd"/><text class="sm" x="49" y="147" text-anchor="middle" fill="#1e40af">G G G</text>
<rect x="188" y="76" width="145" height="110" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text class="t" x="260" y="94" text-anchor="middle" fill="#14532d">M (Machine)</text>
<text class="sm" x="260" y="110" text-anchor="middle" fill="#15803d">OS 线程，执行 G</text>
<text class="sm" x="260" y="124" text-anchor="middle" fill="#15803d">绑定一个 P 运行</text>
<text class="sm" x="260" y="148" text-anchor="middle" fill="#15803d">阻塞时解绑 P</text>
<rect x="366" y="76" width="145" height="110" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text class="t" x="438" y="94" text-anchor="middle" fill="#4c1d95">G (Goroutine)</text>
<text class="sm" x="438" y="110" text-anchor="middle" fill="#6d28d9">轻量协程，2KB 初始栈</text>
<text class="sm" x="438" y="124" text-anchor="middle" fill="#6d28d9">可动态扩缩栈</text>
<text class="sm" x="438" y="140" text-anchor="middle" fill="#6d28d9">百万级并发可行</text>
<text class="sm" x="438" y="156" text-anchor="middle" fill="#6d28d9">go func() 创建</text>
<text style="font:10px sans-serif;fill:#374151" x="260" y="185" text-anchor="middle">Work Stealing：P 本地队列空时，从其他 P 偷一半 G，保证 CPU 不空转 | M 阻塞于系统调用时新建 M 接管 P</text>
</svg></div>

<div id="diag_react_fiber" style="display:none"><svg viewBox="0 0 520 195" xmlns="http://www.w3.org/2000/svg">

<div id="diag_ts_types" style="display:none"><svg viewBox="0 0 520 175" xmlns="http://www.w3.org/2000/svg">
<style>.t{font:600 11px sans-serif}.sm{font:10px sans-serif}</style>
<text class="t" x="260" y="14" text-anchor="middle" fill="#111">TypeScript：结构类型 vs Java 名义类型</text>
<rect x="10" y="24" width="230" height="100" rx="7" fill="#dbeafe" stroke="#3b82f6"/>
<text class="t" x="125" y="42" text-anchor="middle" fill="#1e40af">TypeScript（结构类型）</text>
<text style="font:10px monospace;fill:#1e40af" x="20" y="60">interface Animal { name: string }</text>
<text style="font:10px monospace;fill:#1e40af" x="20" y="76">interface Dog    { name: string; bark() }</text>
<text style="font:10px monospace;fill:#16a34a" x="20" y="92">// Dog 满足 Animal 的结构 ✓</text>
<text style="font:10px monospace;fill:#16a34a" x="20" y="108">const a: Animal = dog  // 合法</text>
<rect x="280" y="24" width="230" height="100" rx="7" fill="#fce7f3" stroke="#db2777"/>
<text class="t" x="395" y="42" text-anchor="middle" fill="#831843">Java（名义类型）</text>
<text style="font:10px monospace;fill:#831843" x="290" y="60">class Dog { ... }</text>
<text style="font:10px monospace;fill:#831843" x="290" y="76">class Animal { ... }</text>
<text style="font:10px monospace;fill:#dc2626" x="290" y="92">// 必须 extends Animal</text>
<text style="font:10px monospace;fill:#dc2626" x="290" y="108">Animal a = dog  // 否则报错</text>
<rect x="80" y="138" width="360" height="28" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
<text class="t" x="260" y="152" text-anchor="middle" fill="#4c1d95">类型体操：Utility Types</text>
<text class="sm" x="260" y="167" text-anchor="middle" fill="#6d28d9">Partial&lt;T&gt; · Required&lt;T&gt; · Pick&lt;T,K&gt; · Omit&lt;T,K&gt; · Record&lt;K,V&gt; · ReturnType&lt;F&gt;</text>
</svg></div>
<div id="diag_python_gil" style="display:none"><svg viewBox="0 0 520 175" xmlns="http://www.w3.org/2000/svg">
<style>.t{font:600 11px sans-serif}.sm{font:10px sans-serif}</style>
<text class="t" x="260" y="14" text-anchor="middle" fill="#111">Python GIL：只影响 CPU 密集型，IO 密集型无感知</text>
<rect x="10" y="24" width="235" height="105" rx="7" fill="#fce7f3" stroke="#db2777"/>
<text class="t" x="122" y="42" text-anchor="middle" fill="#831843">CPU 密集型（受GIL限制）</text>
<text class="sm" x="122" y="58" text-anchor="middle" fill="#be185d">多线程 threading 无法并行</text>
<rect x="22" y="66" width="210" height="14" rx="3" fill="#fda4af"/>
<text class="sm" x="127" y="78" text-anchor="middle" fill="#831843">Thread 1: ████ GIL ████</text>
<rect x="22" y="84" width="210" height="14" rx="3" fill="#fecdd3"/>
<text class="sm" x="127" y="96" text-anchor="middle" fill="#9f1239">Thread 2: ░░░░ 等待 ░░░░</text>
<text class="sm" x="122" y="116" text-anchor="middle" fill="#be185d">解法：多进程 multiprocessing</text>
<text class="sm" x="122" y="128" text-anchor="middle" fill="#6b7280">或 C扩展释放GIL（NumPy即如此）</text>
<rect x="275" y="24" width="235" height="105" rx="7" fill="#dcfce7" stroke="#16a34a"/>
<text class="t" x="392" y="42" text-anchor="middle" fill="#14532d">IO 密集型（不受限）</text>
<text class="sm" x="392" y="58" text-anchor="middle" fill="#15803d">IO 等待时自动释放 GIL</text>
<rect x="287" y="66" width="95" height="14" rx="3" fill="#86efac"/>
<text class="sm" x="334" y="78" text-anchor="middle" fill="#14532d">Thread 1: 运行</text>
<rect x="391" y="66" width="107" height="14" rx="3" fill="#bbf7d0"/>
<text class="sm" x="444" y="78" text-anchor="middle" fill="#14532d">I/O 等待中</text>
<rect x="287" y="84" width="107" height="14" rx="3" fill="#bbf7d0"/>
<text class="sm" x="340" y="96" text-anchor="middle" fill="#14532d">Thread 2: I/O等待</text>
<rect x="403" y="84" width="95" height="14" rx="3" fill="#86efac"/>
<text class="sm" x="450" y="96" text-anchor="middle" fill="#14532d">运行</text>
<text class="sm" x="392" y="116" text-anchor="middle" fill="#15803d">asyncio 更高效：单线程</text>
<text class="sm" x="392" y="128" text-anchor="middle" fill="#6b7280">事件循环，避免线程切换开销</text>
<text style="font:10px sans-serif;fill:#374151" x="260" y="158" text-anchor="middle">Python 3.13 引入 GIL 可选禁用（--disable-gil），多线程 CPU 密集将成为可能</text>
</svg></div>

<defs><marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<div id="diag_rust_vs_go" style="display:none"><svg viewBox="0 0 520 170" xmlns="http://www.w3.org/2000/svg">

<text class="t" x="260" y="14" text-anchor="middle" fill="#111">Rust vs Go：选错会很痛苦</text>

<text class="t" x="122" y="42" text-anchor="middle" fill="#1e40af">选 Go 的场景</text>
<text class="sm" x="122" y="58" text-anchor="middle" fill="#3b82f6">✓ 网络服务 · API · 微服务</text>
<text class="sm" x="122" y="74" text-anchor="middle" fill="#3b82f6">✓ 云原生工具（K8s 生态）</text>
<text class="sm" x="122" y="90" text-anchor="middle" fill="#3b82f6">✓ 团队规模大，协作优先</text>
<text class="sm" x="122" y="106" text-anchor="middle" fill="#3b82f6">✓ 需要快速迭代</text>
<text class="sm" x="122" y="122" text-anchor="middle" fill="#3b82f6">✓ 学习曲线低，招聘容易</text>
<text class="sm" x="122" y="138" text-anchor="middle" fill="#6b7280">GC 停顿可接受</text>
<rect x="275" y="24" width="235" height="130" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text class="t" x="392" y="42" text-anchor="middle" fill="#4c1d95">选 Rust 的场景</text>
<text class="sm" x="392" y="58" text-anchor="middle" fill="#6d28d9">✓ 系统编程 · 嵌入式</text>
<text class="sm" x="392" y="74" text-anchor="middle" fill="#6d28d9">✓ 不能容忍 GC 停顿</text>
<text class="sm" x="392" y="90" text-anchor="middle" fill="#6d28d9">✓ WebAssembly 目标</text>
<text class="sm" x="392" y="106" text-anchor="middle" fill="#6d28d9">✓ 安全关键代码</text>
<text class="sm" x="392" y="122" text-anchor="middle" fill="#6d28d9">✓ 极限性能（HFT/游戏引擎）</text>
<text class="sm" x="392" y="138" text-anchor="middle" fill="#6b7280">团队愿意投入更高学习成本</text>
</svg></div>
<div id="diag_concurrency_real" style="display:none"><svg viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg">

<text class="t" x="260" y="14" text-anchor="middle" fill="#111">并发模型的工程影响：不只是性能，更是编程方式</text>

<text class="t" x="67" y="42" text-anchor="middle" fill="#1e40af">Go Channels</text>
<text class="sm" x="67" y="58" text-anchor="middle" fill="#3b82f6">通信解耦</text>
<text class="sm" x="67" y="72" text-anchor="middle" fill="#3b82f6">不共享内存</text>
<text class="sm" x="67" y="86" text-anchor="middle" fill="#3b82f6">select 多路</text>
<text class="sm" x="67" y="100" text-anchor="middle" fill="#6b7280">管道/扇出扇入</text>
<rect x="140" y="24" width="115" height="130" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
<text class="t" x="197" y="42" text-anchor="middle" fill="#78350f">Python async</text>
<text class="sm" x="197" y="58" text-anchor="middle" fill="#92400e">单线程协作</text>
<text class="sm" x="197" y="72" text-anchor="middle" fill="#92400e">明确 await 点</text>
<text class="sm" x="197" y="86" text-anchor="middle" fill="#92400e">asyncio.gather</text>
<text class="sm" x="197" y="100" text-anchor="middle" fill="#6b7280">IO密集最佳</text>
<rect x="270" y="24" width="115" height="130" rx="6" fill="#dcfce7" stroke="#16a34a"/>
<text class="t" x="327" y="42" text-anchor="middle" fill="#14532d">Java 虚拟线程</text>
<text class="sm" x="327" y="58" text-anchor="middle" fill="#15803d">同步代码风格</text>
<text class="sm" x="327" y="72" text-anchor="middle" fill="#15803d">无需 async/await</text>
<text class="sm" x="327" y="86" text-anchor="middle" fill="#15803d">兼容阻塞 API</text>
<text class="sm" x="327" y="100" text-anchor="middle" fill="#6b7280">迁移成本最低</text>
<rect x="400" y="24" width="115" height="130" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
<text class="t" x="457" y="42" text-anchor="middle" fill="#4c1d95">Rust Tokio</text>
<text class="sm" x="457" y="58" text-anchor="middle" fill="#6d28d9">零开销抽象</text>
<text class="sm" x="457" y="72" text-anchor="middle" fill="#6d28d9">Send/Sync编译</text>
<text class="sm" x="457" y="86" text-anchor="middle" fill="#6d28d9">无数据竞争</text>
<text class="sm" x="457" y="100" text-anchor="middle" fill="#6b7280">最难上手</text>
<text style="font:10px sans-serif;fill:#374151" x="260" y="172" text-anchor="middle">共享内存并发（mutex/lock）→ 锁竞争/死锁风险 | 消息传递（channel/actor）→ 更安全但有复制开销</text>

<div id="diag_api_paradigms" style="display:none"><svg viewBox="0 0 520 175" xmlns="http://www.w3.org/2000/svg">

<text class="t" x="260" y="14" text-anchor="middle" fill="#111">API 范式选型：REST vs gRPC vs GraphQL</text>
<rect x="10" y="24" width="155" height="120" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text class="t" x="87" y="42" text-anchor="middle" fill="#1e40af">REST</text>
<text class="sm" x="87" y="58" text-anchor="middle" fill="#3b82f6">HTTP · JSON · 无状态</text>
<text class="sm" x="87" y="74" text-anchor="middle" fill="#3b82f6">语义：名词 + 动词</text>
<rect x="22" y="82" width="131" height="14" rx="3" fill="#bbf7d0"/><text class="sm" x="87" y="93" text-anchor="middle" fill="#14532d">✓ 通用·缓存友好</text>
<rect x="22" y="100" width="131" height="14" rx="3" fill="#fda4af"/><text class="sm" x="87" y="111" text-anchor="middle" fill="#be185d">✗ 过多/不足数据</text>
<text class="sm" x="87" y="134" text-anchor="middle" fill="#6b7280">适合：公开API/前端</text>
<rect x="183" y="24" width="155" height="120" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text class="t" x="260" y="42" text-anchor="middle" fill="#14532d">gRPC</text>
<text class="sm" x="260" y="58" text-anchor="middle" fill="#15803d">HTTP/2 · Protobuf</text>
<text class="sm" x="260" y="74" text-anchor="middle" fill="#15803d">强类型 · 代码生成</text>
<rect x="195" y="82" width="131" height="14" rx="3" fill="#bbf7d0"/><text class="sm" x="260" y="93" text-anchor="middle" fill="#14532d">✓ 高性能·双向流</text>
<rect x="195" y="100" width="131" height="14" rx="3" fill="#fda4af"/><text class="sm" x="260" y="111" text-anchor="middle" fill="#be185d">✗ 浏览器直连受限</text>
<text class="sm" x="260" y="134" text-anchor="middle" fill="#6b7280">适合：内部微服务</text>
<rect x="356" y="24" width="155" height="120" rx="7" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
<text class="t" x="433" y="42" text-anchor="middle" fill="#78350f">GraphQL</text>
<text class="sm" x="433" y="58" text-anchor="middle" fill="#92400e">按需查询 · 单端点</text>
<text class="sm" x="433" y="74" text-anchor="middle" fill="#92400e">Schema 强类型</text>
<rect x="368" y="82" width="131" height="14" rx="3" fill="#bbf7d0"/><text class="sm" x="433" y="93" text-anchor="middle" fill="#14532d">✓ 客户端控制字段</text>
<rect x="368" y="100" width="131" height="14" rx="3" fill="#fda4af"/><text class="sm" x="433" y="111" text-anchor="middle" fill="#be185d">✗ 复杂查询风险</text>
<text class="sm" x="433" y="134" text-anchor="middle" fill="#6b7280">适合：复杂前端/BFF</text>
<text style="font:10px sans-serif;fill:#6b7280" x="260" y="165" text-anchor="middle">tRPC：TypeScript 全栈类型共享，无需 Schema 文件 | 内部服务首选 gRPC，公开 API 首选 REST</text>
</svg></div>

<script>
const D=[{"id":"matrix","phase":"横向对比","title":"语言横向对比矩阵","color":"#374151","bg":"#F9FAFB","intro":"六门语言解决的是不同的核心问题，没有「最好的语言」，只有「最合适这个场景的语言」。这个版块从六个维度系统性横向比较，帮助建立架构级别的选型判断力。","intro_lines":["▸ <strong>设计目标对比</strong> — 每门语言的核心价值主张，以及为实现这个目标放弃了什么","▸ <strong>性能特征</strong> — 内存占用/吞吐量/延迟/启动时间的量级差异，什么时候性能是决定性因素","▸ <strong>并发模型</strong> — 六种并发实现方式的本质差异，IO 密集 vs CPU 密集的选择影响","▸ <strong>类型系统</strong> — 名义/结构/所有权/动态，对大型代码库可维护性的实际影响","▸ <strong>生态与招聘</strong> — 各语言的生态成熟度、学习曲线、人才市场供给","▸ <strong>选型决策树</strong> — 给定约束条件的系统性判断路径"],"notes":[{"h":"六门语言的核心定位","pts":["Java：企业级工程的行业标准。核心优势是生态最成熟（Spring/Hibernate/Kafka 客户端），JVM 的 JIT 优化使得长时运行的服务性能很好，Java 21 虚拟线程解决了传统线程模型的并发瓶颈。代价是启动慢（冷启动 0.5-2s）、内存占用高（最小进程 50-200MB）、Boilerplate 多（但 Lombok/Record 大幅改善）。适合：大型企业后端、金融系统、有丰富 Java 生态需求的场景。","Go：云原生基础设施的首选。核心优势是编译为单一二进制（无依赖，容器镜像可以极小）、启动极快（< 10ms）、内存占用低（最小进程 ~5MB）、goroutine 天然支持高并发。代价是缺乏泛型长期影响了代码复用（Go 1.18 才加入）、错误处理重复、没有原生异常机制使得某些场景代码冗长。适合：微服务、CLI 工具、网关/代理、K8s Operator。","TypeScript/JavaScript：前端唯一主流选择，全栈开发的最短路径。TS 在 JS 之上提供了结构类型系统，大幅提升大型代码库的可维护性。Node.js 在 IO 密集型后端有竞争力（每秒处理数万请求），但不适合 CPU 密集型计算（单线程，Worker Threads 是补丁不是一等公民）。适合：前端（必选）、BFF 层、全栈（Next.js）、实时应用（WebSocket）。","Python：AI/ML 领域的事实标准，数据工程的主要语言。核心优势是 AI 生态无可替代（PyTorch/TF/NumPy/Pandas/LangChain），开发速度快，读写性接近伪代码。代价是运行慢（解释型语言，比 Go/Rust 慢 5-50x）、GIL 限制 CPU 并行、类型系统是可选的（不强制）。适合：AI/ML 服务、数据工程流水线、快速原型、科学计算。","Rust：系统编程和性能极限场景的选择。核心优势是无 GC 的内存安全（编译时验证）、性能接近 C/C++、零成本抽象。代价是学习曲线最陡峭（借用检查器）、编译时间长、生态不如 Go 成熟。适合：系统编程、高性能网络库、WebAssembly、替代 C++、安全关键软件。"],"img_key":"lang_positioning","img_link":"Programming Language Comparison","img_title":"https://en.wikipedia.org/wiki/Comparison_of_programming_languages"},{"h":"性能特征横向对比","pts":["启动时间（对 Serverless/容器快速扩容很重要）：Rust/Go < 10ms → Node.js ~50ms → Python ~100-300ms → Java（JVM）500-2000ms。GraalVM Native Image 可以让 Java 达到 Go 级别的启动时间，代价是编译时间增加和部分动态特性受限。","内存占用（最小 Hello World 服务）：Rust ~2MB → Go ~5MB → Node.js ~30MB → Python ~50MB → Java（JVM）~50-200MB。在容器化部署里，内存占用影响节点密度和成本。Go 和 Rust 在同样的节点上可以运行 10-40 倍于 Java 的实例数。","吞吐量（IO 密集型 HTTP 服务，TechEmpower 基准）：Rust（Actix） > Go（Gin） >> Java（Spring MVC） ≈ Node.js（Fastify） >> Python（FastAPI）。但在真实业务场景里，数据库查询通常是瓶颈，语言层面的性能差距被大幅缩小。不要为了性能提前过度优化语言选择。","GC 延迟（对实时系统很重要）：Rust 无 GC → Go GC 暂停通常 < 1ms → Node.js V8 GC 数 ms → Java G1GC 通常 < 10ms（ZGC 可达 < 1ms）→ Python GC 通常不是主要问题（因为比较慢的语言本身是瓶颈）。对于要求 P99 延迟 < 5ms 的实时系统，Rust 和 Go 是首选。"]},{"h":"并发模型横向对比","pts":["Java 虚拟线程（Java 21+）：M:N 调度，一个请求一个虚拟线程，阻塞时自动让出（无需 async/await），与原有阻塞 IO 代码完全兼容。代价是虚拟线程不适合 CPU 密集任务（仍然受限于 OS 线程数）。这是 Java 在 2023 年并发能力的重大追赶。","Go goroutine：M:N 调度，轻量（2KB 初始栈），通过 channel 通信。并发是 Go 的一等公民，整个标准库和生态从设计之初就 goroutine 友好。简单、直接、高效——这是 Go 在网络服务领域的核心竞争力。","Node.js 事件循环：单线程，非阻塞 IO，回调/Promise/async-await。对 IO 密集型任务极为高效（不需要线程切换开销），但 CPU 密集任务会阻塞整个事件循环（Worker Threads 是补丁）。适合实时推送、WebSocket、轻量 API 服务。","Python asyncio：单线程事件循环，协程（async/await）。和 Node.js 类似，但生态还在从同步迁移到异步的过渡期（大量库不支持 async）。GIL 使得多线程在 CPU 任务上无效，multiprocessing 是绕过 GIL 的主要方式。","Rust async/await：零成本协程，需要选择 runtime（Tokio 是事实标准）。Future 是懒惰的，不调度就不执行。性能最高，延迟最低，但心智模型复杂（lifetime 和 async 的交叉是 Rust 里最难的部分）。"],"img_key":"concurrency_compare","img_link":"Concurrency Models","img_title":"https://en.wikipedia.org/wiki/Concurrency_(computer_science)"},{"h":"类型系统与可维护性","pts":["名义类型（Java/Rust）：类型兼容性由名称和继承关系决定，重构安全性高，IDE 支持最好（可以精确找到所有使用点）。Java 的泛型是类型擦除的（运行时丢失类型信息），Rust 的泛型是单态化的（每个具体类型生成独立代码，无运行时开销）。","结构类型（Go/TypeScript）：类型兼容性由结构（shape）决定，更灵活，第三方库集成更容易。TypeScript 的类型系统图灵完备，可以表达复杂的类型关系，但类型体操复杂度需要克制。Go 的接口是隐式实现的，使得「让两个独立库的类型兼容」变得无需修改源码。","动态类型（Python）：无静态类型检查，开发速度快，但大型代码库的维护成本高。Type Hints + mypy/pyright 提供了可选的静态检查，是渐进式引入类型系统的实用方案。大型 Python 项目（Django/FastAPI 代码库）都全面使用 Type Hints。","所有权类型（Rust）：独特的类型系统，所有权/借用/生命周期在类型层面编码。编译器在编译时保证内存安全和数据竞争自由。学习曲线最陡但类型安全性最高——大量运行时错误变成了编译时错误。"]},{"h":"选型决策树","pts":["第一问：是否是前端或全栈 Web 项目？→ 是 → TypeScript/React（前端唯一主流选择）+ Next.js（全栈）。没有替代品，不需要考虑。","第二问：是否是 AI/ML 服务、数据工程、或需要 PyTorch/NumPy 生态？→ 是 → Python。生态壁垒无可替代，不要用其他语言重造轮子。","第三问：是否是系统编程、需要 < 1ms 延迟、或替代 C++？→ 是 → Rust。这是 Rust 设计的核心场景。","第四问：是否是云原生微服务、CLI 工具、或 K8s 生态工具？→ 是 → Go 是最自然的选择（Docker/K8s/Terraform 都是 Go 写的，生态一致）。","第五问：剩余场景（企业后端、金融系统、已有 Java 团队）→ Java（成熟生态、Spring/Hibernate）或 Go（高并发需求更强）。决策因素：团队已有技术栈、招聘市场、是否需要 Spring 生态的特定功能。"],"img_key":"lang_decision","img_link":"Technology Selection","img_title":"https://en.wikipedia.org/wiki/Programming_language"}],"res":[{"tp":"报告","tc":"b-blog","t":"TechEmpower Framework Benchmarks","d":"主流 Web 框架性能横向对比，含 Rust/Go/Java/Node/Python","u":"https://www.techempower.com/benchmarks/","lv":"entry","s":"techempower.com"},{"tp":"博客","tc":"b-blog","t":"The State of Developer Ecosystem — JetBrains","d":"年度开发者调查，各语言使用率/满意度/生态趋势","u":"https://www.jetbrains.com/lp/devecosystem-2023/","lv":"entry","s":"jetbrains.com"},{"tp":"博客","tc":"b-blog","t":"Stack Overflow Developer Survey","d":"最大规模的开发者调查，薪资/使用率/流行趋势","u":"https://survey.stackoverflow.co/2024/","lv":"entry","s":"stackoverflow.co"}]},{"id":"go_backend","phase":"Go 深度","title":"Go · 语言特征 · 并发模型 · 架构选型","color":"#00ACD7","bg":"#E8F8FD","intro":"Go 是系统工程师的「第二语言」首选——它在保持接近 C 性能的同时，提供了内存安全、垃圾回收和原生并发支持。云原生生态（Docker/K8s/Terraform）全部是 Go 写的，这本身就是它的最强背书。","intro_lines":["▸ <strong>语言画像</strong> — 设计目标、核心哲学、和 Java 的本质差异","▸ <strong>核心优势</strong> — 六个真实场景下 Go 优于其他语言的具体原因","▸ <strong>局限与代价</strong> — Go 在哪些场景不是好选择，常见的坑","▸ <strong>架构选型场景</strong> — 什么情况下应该选 Go，决策依据","▸ <strong>goroutine 与 GMP</strong> — 并发模型的工作原理","▸ <strong>channel 与 CSP</strong> — 设计哲学与常见陷阱","▸ <strong>生态选型</strong> — Web 框架/数据库/gRPC 的具体选择"],"notes":[{"h":"语言画像：Go 是什么，不是什么","pts":["Go 是「为大规模软件工程设计的语言」——这个定位解释了它的所有设计选择。目标用户不是学术研究者或系统底层工程师，而是在大型组织里维护大型代码库的工程师团队。简单性是第一设计原则：Go 的语言规范只有 70 页（Java 的规范超过 800 页），整个语言可以在几天内学完语法，几周内写出生产级代码。","Go 不是什么：不是面向对象语言（没有继承，没有类，只有组合）、不是函数式语言（没有 monad，map/filter 是标准库函数不是语言特性）、不是系统编程语言（有 GC，无法做精细内存控制）、不是脚本语言（编译型，不能直接执行 .go 文件）。它是一门「务实的工程语言」，不追求学术上的优雅，追求团队规模扩大时的工程效率。","和 Java 的本质差异：Go 没有类和继承，用 struct + interface 实现多态，interface 是隐式实现的（duck typing）；Go 没有异常，用多返回值（value, err）处理错误；Go 的并发是语言级别的原语（goroutine/channel），不是库；Go 编译为单一静态二进制，无需 JVM 运行时环境；Go 的依赖管理是内置的（go modules），不需要 Maven/Gradle。"]},{"h":"核心优势：Go 在哪些地方真正强","pts":["部署简单性（单一静态二进制）：Go 编译后是一个包含所有依赖的静态二进制文件，直接拷贝就能运行，不需要安装运行时、不需要处理依赖版本冲突。Docker 镜像可以从 scratch 基础镜像构建，最终镜像 5-20MB（Java 镜像通常 200-500MB）。这在微服务大规模部署、边缘计算、Serverless 场景里是显著的运维优势。","并发能力（goroutine 天然高并发）：一个 Go 进程可以维护数十万个 goroutine（Java 线程池通常 200-1000 个线程），每个 goroutine 初始栈只有 2KB（Java 线程默认 512KB-1MB）。对于需要维持大量并发长连接的场景（WebSocket 服务、实时推送、消息代理），Go 的内存效率远高于传统线程模型。","编译速度（开发循环快）：Go 的增量编译极快，10 万行代码的项目全量编译通常在 10 秒内，增量编译在 1-2 秒内。这使得「保存→编译→运行」的反馈循环非常短，开发体验接近动态语言，但保留了静态类型的安全性。","运行时性能（低延迟、低内存）：Go 的 GC 经过多年优化，P99 暂停通常 < 1ms。没有 JVM 的预热期，性能从启动第一秒就稳定。在网络 IO 密集型服务的吞吐量上接近 C++，但开发效率远高于 C++。","代码一致性（gofmt 强制统一）：gofmt 是官方代码格式化工具，输出是确定性的。整个 Go 生态里所有代码风格高度一致，code review 时不需要讨论缩进和括号位置。大型团队的代码库可读性远优于 Java（不同工程师风格差异大）。"]},{"h":"局限与代价：Go 的真实缺点","pts":["错误处理冗余：if err != nil 的重复出现在几乎每个函数调用后，一个 5 行的逻辑可能被 10 行错误处理包围。Go 2.0 曾提议改进错误处理语法，但至今未落地。这不是可以「习惯就好」的问题——在复杂业务逻辑里，错误处理的冗余使得代码可读性下降，核心逻辑被淹没。","缺乏表达力（泛型来得太晚）：Go 1.18（2022）才加入泛型，此前大量代码用 interface{} 绕过，类型断言频繁，运行时 panic 风险高。即使现在的泛型也有限制（不支持方法级别的类型参数），很多在 Java/TypeScript 里优雅的泛型抽象在 Go 里仍然需要妥协。","没有枚举和模式匹配：Go 没有代数数据类型（ADT）和模式匹配，处理「这个值可能是 A 或 B 或 C 类型」的场景需要用 interface 加类型断言，不如 Rust 的 enum + match 或 TypeScript 的 Discriminated Union 安全和简洁。","生态年轻（某些领域库不成熟）：Go 在企业后端的成熟度远不如 Java。没有类似 Spring 的全功能框架（Gin/Echo 只是 Web 层），ORM 的功能比 Hibernate 简陋很多，消息队列/缓存的客户端库质量参差不齐。如果业务场景需要大量「开箱即用」的企业级功能，Java+Spring 仍然是更省事的选择。","CGo 的跨语言代价：与 C 库交互需要通过 CGo，这会引入复杂性（禁用 goroutine 调度、内存边界管理、编译变慢）。Go 不适合需要深度集成 C/C++ 遗留库的场景，Rust 在这方面有更好的零成本 FFI 支持。"]},{"h":"架构选型场景：什么时候选 Go","pts":["强烈建议选 Go 的场景：①微服务后端（特别是网络/IO 密集型，如 API 网关、代理、消息路由）；②云原生工具和 K8s 生态（Operator/Controller/CLI 工具，与 K8s API 的 Go 客户端生态最成熟）；③需要编译为单一二进制分发的 CLI 工具（Helm/kubectl/Terraform 都是例子）；④对内存占用和启动时间敏感的服务（边缘计算、Serverless）。","可以考虑 Go 的场景：①团队有 Go 经验且业务逻辑不过于复杂；②新服务需要从零开始且不依赖 Java 生态的特定功能；③有明确的高并发需求（> 10万并发连接）且 Java 虚拟线程还不足以满足。","不建议选 Go 的场景：①业务逻辑复杂且需要大量企业级功能（选 Java+Spring）；②需要 AI/ML 能力（选 Python）；③需要精确内存控制或极限性能（选 Rust）；④团队只有 Java 背景且招聘 Go 人才困难；⑤现有 Java 系统功能良好，没有明确痛点（重写的成本 > 收益）。"]},{"h":"goroutine 与 GMP 调度模型","pts":["goroutine 是 Go 运行时管理的绿色线程，初始栈 2KB（可动态增长到 1GB），可在同一进程里运行数十万个。GMP 模型：G（Goroutine）、M（Machine，OS 线程）、P（Processor，逻辑处理器，数量等于 GOMAXPROCS，默认为 CPU 核数）。每个 P 维护一个本地 goroutine 队列，M 绑定 P 来执行 G，调度完全在用户态，切换开销约 200ns（OS 线程约 1-10μs）。","Work Stealing：当某个 P 的本地队列空了，它会从其他 P 的队列尾部偷取一半任务，或者从全局队列取任务，保证所有 CPU 核心尽量充分利用。goroutine 在发生系统调用（网络 IO/文件 IO）时，M 会解绑 P，让 P 可以继续调度其他 goroutine，避免 OS 线程阻塞导致 P 空转。","goroutine 泄漏是最常见的资源泄漏：goroutine 在 channel 上永久阻塞时，GC 无法回收它（goroutine 是活跃的 GC root）。常见场景：发送到无接收者的 channel、接收来自已关闭生产者的 channel 没有退出机制。使用 context.WithCancel/WithTimeout 配合 select 的 done channel 是标准的生命周期管理模式。"],"img_key":"gmp","img_link":"Go Goroutines & Scheduler","img_title":"https://go.dev/doc/faq#goroutines"},{"h":"channel 与 CSP 并发哲学","pts":["CSP 的核心是「通过通信共享内存，而不是通过共享内存通信」。无缓冲 channel 提供同步语义（发送方和接收方同时就绪才完成传输），有缓冲 channel 提供异步语义（发送方不需要等接收方，队列满才阻塞）。channel 的方向性（chan<- T 只发送，<-chan T 只接收）是 API 设计的良好实践，让调用者一眼看出数据流方向。","select 是 Go 并发的核心控制流：同时等待多个 channel 操作，哪个先就绪执行哪个 case。配合 context.Context 的 Done() channel 实现可取消操作：select { case result := <-ch: ...; case <-ctx.Done(): return ctx.Err() }。这是 Go 里处理超时和取消的标准模式，比 Java 的 Future.get(timeout) 更清晰可控。","什么时候用 channel vs mutex：channel 适合所有权转移（一个 goroutine 把数据所有权交给另一个）和事件通知；mutex 适合保护共享状态（多个 goroutine 需要读写同一个数据结构）。混淆两者是 Go 并发 bug 的常见来源。go run -race 是发现数据竞争的必备工具，CI 里应该常态化运行。"],"img_key":"csp_channel","img_link":"Communicating Sequential Processes","img_title":"https://en.wikipedia.org/wiki/Communicating_sequential_processes"},{"h":"Go 生态选型：框架与库的取舍","pts":["Web 框架：标准库 net/http 功能完整（路由/中间件/TLS/HTTP2），对于简单 API 服务无需框架。Gin 是最流行的选择，路由匹配快（httprouter）、中间件简洁、绑定校验方便。Echo 和 Fiber 类似，Fiber 基于 fasthttp（比 net/http 快但 API 不完全兼容）。新项目推荐：内部服务用标准库或 Gin；高性能要求考虑 Fiber。","数据库访问：GORM 是全功能 ORM，上手快，适合快速开发，缺点是复杂查询的 SQL 不透明，大型项目容易 N+1 问题；sqlx 是 database/sql 的增强封装，保留手写 SQL 的可控性，同时提供结构体扫描，是更受 Go 老手喜欢的选择；pgx 是 PostgreSQL 原生驱动，性能最高，支持 PostgreSQL 特有功能（JSON/Array/COPY），只用 PostgreSQL 时推荐。","依赖注入与配置：Go 社区对「大型 DI 框架」有明显的抵触（与 Java 的 Spring DI 文化相反），倾向于显式传递依赖而非魔法注入。Wire（Google 的编译时 DI）和 fx（Uber 的运行时 DI）是两种思路。大多数 Go 项目用 Viper 做配置管理（支持多种格式和环境变量覆盖），用 Zap 或 slog（Go 1.21 标准库）做结构化日志。"]}],"res":[{"tp":"视频","tc":"b-video","t":"Go Concurrency Patterns — Rob Pike","d":"Go 设计者讲 goroutine/channel 设计哲学，必看","u":"https://www.youtube.com/watch?v=f6kdp27TYZs","lv":"entry","s":"youtube.com"},{"tp":"文档","tc":"b-docs","t":"Effective Go — 官方","d":"Go 惯用法全集，理解 Go 风格的权威参考","u":"https://go.dev/doc/effective_go","lv":"entry","s":"go.dev"},{"tp":"书籍","tc":"b-book","t":"100 Go Mistakes and How to Avoid Them","d":"生产实践里最常见的 100 个错误，含并发/错误处理/性能","u":"https://100go.co/","lv":"mid","s":"100go.co"},{"tp":"博客","tc":"b-blog","t":"Go by Example","d":"通过代码示例学习 Go 核心特性，最快速的实践参考","u":"https://gobyexample.com/","lv":"entry","s":"gobyexample.com"},{"tp":"工具","tc":"b-tool","t":"golangci-lint","d":"Go 主流 linter 集合，goleak/staticcheck/errcheck 一站式","u":"https://golangci-lint.run/","lv":"mid","s":"golangci-lint.run"}]},{"id":"react_ts","phase":"React + TypeScript","title":"React · TypeScript · 前端架构选型","color":"#61DAFB","bg":"#E8F8FE","intro":"React 是前端的行业标准，TypeScript 是现代前端工程的语言基础。两者几乎不可分割地绑定在一起。这个版块先讲清楚 React 和 TypeScript 各自的核心机制，再讲两者结合的工程实践。","intro_lines":["▸ <strong>React 语言画像</strong> — 什么是 React，和 Vue/Angular 的本质差异","▸ <strong>React 核心优势与缺点</strong> — 生态/灵活性 vs 配置复杂度/过度优化陷阱","▸ <strong>Fiber 架构</strong> — 可中断渲染，React 18 并发特性的底层基础","▸ <strong>Hooks 心智模型</strong> — 闭包快照，Stale Closure，useEffect 正确用法","▸ <strong>TypeScript 类型系统</strong> — 结构类型 vs 名义类型，工具类型，工程配置","▸ <strong>状态管理选型</strong> — Server State vs Client State，TanStack Query/Zustand/Redux 的定位","▸ <strong>Next.js 与 SSR/RSC</strong> — 四种渲染模式，App Router 的设计意图","▸ <strong>架构选型</strong> — 什么时候选 React，什么场景考虑 Vue/Svelte"],"notes":[{"h":"React 语言画像：它解决了什么问题","pts":["React 的核心思想是「UI = f(state)」——给定相同的状态，永远渲染出相同的 UI。这个函数式视图模型使得 UI 的行为可预测，调试变得容易（只需要知道当前状态，不需要追踪 DOM 变化历史）。与直接操作 DOM（jQuery 时代）或双向绑定（Angular 1/Vue 2 Options API）相比，单向数据流（状态 → 渲染 → 事件 → 状态更新）使得数据流向清晰。","和 Vue 的本质差异：Vue 是渐进式框架，HTML 模板 + 双向绑定，更接近传统前端开发，学习曲线更平缓；React 是视图库（不是框架），用 JSX 把 HTML 写在 JavaScript 里，一切都是 JavaScript，更灵活但需要更多决策。Vue 3 的 Composition API 借鉴了 React Hooks 的设计，两者在写法上越来越接近，但底层响应式系统完全不同（Vue 用 Proxy 追踪依赖，React 用不可变状态触发重渲染）。","和 Angular 的本质差异：Angular 是全功能框架（路由/HTTP/表单/DI/模块系统全内置），有强烈的「Angular 方式」，团队规范性高；React 是视图层，需要自己选路由/状态管理/表单库，更灵活但「选择疲劳」是真实问题。Angular 在企业级大型应用（特别是 Google 内部系统）里有稳定用户群。"]},{"h":"React 核心优势与真实缺点","pts":["核心优势——生态无可匹敌：React 生态是前端最成熟、最广泛的。组件库（MUI/Ant Design/Radix）、状态管理（Zustand/Redux）、数据获取（TanStack Query）、动画（Framer Motion）、图表（Recharts/Victory）——几乎任何需求都有成熟的 React 库。这个生态优势在企业级开发里是真实的竞争力。","核心优势——React Native 跨端：同一套 React 思维可以用于 Web（React DOM）、iOS/Android（React Native）、桌面（Electron/Tauri），降低了跨端开发的学习成本。对于需要同时维护 Web 和移动端的团队，React 是唯一能实现「一套思维，多端开发」的主流选择。","真实缺点——初始配置复杂：React 本身只是视图层，一个完整的项目还需要：路由（React Router/TanStack Router）、状态管理（Zustand/Redux）、数据获取（TanStack Query）、构建工具（Vite/Webpack）、CSS 方案（Tailwind/CSS Modules/styled-components）……每个都需要决策。「JavaScript 疲劳」（JS Fatigue）这个词就是描述这个现象的。Next.js 解决了其中很多问题（内置路由/数据获取/构建）。","真实缺点——性能优化门槛：React 的默认行为是「状态更新触发组件及其所有子组件重渲染」，对于大型组件树，不加优化可能有性能问题。React.memo/useMemo/useCallback 的滥用（试图「提前优化」）反而引入了新的 bug（依赖数组写错）和更多复杂度。正确的做法是「先写，再用 React DevTools Profiler 定位真实的性能问题，再针对性优化」。"]},{"h":"Fiber 架构：可中断渲染的工作原理","pts":["React 16 之前的 Stack Reconciler 是同步不可中断的递归——一旦开始渲染，必须运行完毕，期间 JS 主线程被占用，用户输入可能无响应（掉帧）。Fiber 把渲染拆分成「工作单元」（每个 Fiber 节点处理一个组件），调度器可以在任意工作单元后暂停，先处理更高优先级的任务（如用户输入），之后再恢复。","Render Phase（可中断）vs Commit Phase（不可中断）：Render Phase 计算「需要做什么变更」，是纯计算过程（不改 DOM），可以被中断和重启。Commit Phase 把计算好的变更一次性应用到 DOM，必须同步完成（避免 UI 出现中间状态）。这就是为什么 React 严格要求 effect-free 的渲染函数——Render Phase 可能被执行多次。","React 18 的 useTransition：把某个状态更新标记为「低优先级转换」，允许 React 在渲染这个更新时被高优先级的更新（如用户输入）打断。实际用法：用 startTransition 包裹「不紧急但昂贵」的状态更新（如搜索结果更新、标签切换），让页面在这些更新渲染期间保持响应。"],"img_key":"react_fiber","img_link":"React Fiber Architecture","img_title":"https://github.com/acdlite/react-fiber-architecture"},{"h":"Hooks：快照模型与常见陷阱","pts":["核心心智模型：每次渲染是一个独立的快照。useState 返回的是「这次渲染时刻」的值，不是一个持续变化的引用。这意味着在一个 effect 或事件处理函数里，你捕获的是「创建这个函数时的那次渲染的状态值」——这就是 Stale Closure 的来源。","useEffect 依赖数组的正确理解：依赖数组不是「这个 effect 依赖了什么」（虽然通常一致），而是「什么时候需要重新运行这个 effect」。漏掉依赖会导致 effect 使用旧值（Stale Closure）；多余的依赖会导致 effect 过于频繁运行。useRef 是「逃生舱」——当你需要一个不触发重渲染、但始终是最新值的容器时使用。","useMemo/useCallback 不是免费的：它们增加了代码复杂度（需要正确维护依赖数组）和内存占用（缓存之前的值）。只在两种情况下使用：① 作为 React.memo 组件的 props（避免引用变化导致子组件重渲染）；② 昂贵的计算（真正测量了是性能瓶颈后才用）。不要为了「感觉应该优化」而到处加 useMemo。"],"img_key":"hooks_snapshot","img_link":"React Hooks","img_title":"https://react.dev/reference/react/hooks"},{"h":"TypeScript 类型系统：和 Java 的根本差异","pts":["结构类型（TypeScript）vs 名义类型（Java）：Java 里两个不同名的类即使有相同结构也不能互换；TypeScript 里只要 shape 匹配就认为类型兼容，不需要显式声明关系。实际意义：在 TypeScript 里整合两个不相关的库的类型时，不需要修改源码，只要 shape 符合就可以直接用。Discriminated Union（{ kind: 'circle', radius: number } | { kind: 'rect', w: number, h: number }）是 TypeScript 处理多态的惯用法，配合 switch 做类型收窄。","核心工具类型：Partial<T>（全部可选）、Required<T>（全部必填）、Pick<T, K>（提取属性）、Omit<T, K>（排除属性）、Record<K,V>（键值类型）、ReturnType<T>（提取函数返回值）、Parameters<T>（提取函数参数）。这些工具类型消除了大量重复的类型定义。","tsconfig 关键配置：strict:true（必开，启用 strictNullChecks/noImplicitAny 等）；moduleResolution:bundler（配合 Vite/Next.js）；paths（路径别名，@/ 指向 src/）。渐进式迁移策略：allowJs:true 允许 JS/TS 混用，逐步迁移；对无法立刻解决的类型问题用 as unknown as T 临时绕过，CI 里始终运行 tsc --noEmit 保证不引入新的类型错误。"],"img_key":"ts_types","img_link":"TypeScript Type System","img_title":"https://www.typescriptlang.org/docs/handbook/2/types-from-types.html"},{"h":"状态管理选型：2024 年的正确姿势","pts":["最重要的认知转变：把状态分为「服务端状态」（来自 API 的数据）和「客户端状态」（UI 状态如弹窗开关、表单中间值）。服务端状态需要缓存/失效/重新获取/乐观更新，用通用状态管理库（Redux/Zustand）处理是错误的。TanStack Query（React Query）专门解决服务端状态，引入后大幅减少样板代码，是目前最推荐的数据获取方案。","客户端状态选型：Zustand 是 2024 年新项目的默认推荐——极简 API（const useStore = create(set => ({ count: 0, inc: () => set(s => ({ count: s.count+1 })) }))），无 action/reducer/dispatch 仪式感，支持 immer，devtools 完善。Redux Toolkit（RTK）是大型已有 Redux 项目的改进路径，代码量比原始 Redux 少 70%。如果需要跨多层传递的状态不超过 3-4 个，Context + useReducer 就够了，不需要引入任何库。","表单状态是特殊的：表单值的更新频率极高（每次按键都触发），放在全局状态里会引起不必要的重渲染。React Hook Form 是当前最佳选择——非受控组件 + ref，性能极好，内置校验，与 Zod/Yup 集成做类型安全的 schema 校验。"]},{"h":"Next.js 渲染模式与架构选型","pts":["四种渲染模式：SSG（构建时生成，适合博客/文档/营销页面，CDN 分发性能极好）、ISR（定时重新生成，适合商品页面等有时效性的内容）、SSR（每次请求渲染，适合个性化内容如用户主页）、CSR（纯前端渲染，适合内部工具/管理后台，不需要 SEO）。","React Server Components（RSC，App Router）：在服务端运行的组件，直接访问数据库/文件系统，输出纯 HTML，不发送 JS 到浏览器。Server Component（默认）vs Client Component（use client）的区分是 App Router 最重要的心智模型。RSC 的价值：零客户端 JS 的数据展示组件，大幅减少 bundle 体积。","什么时候选 React（vs Vue）：团队有 React 经验，或需要 React Native 跨端，或需要最广泛的生态（组件库/工具链），选 React；团队以 Java 后端为主、有少量前端经验，需要快速上手做内部工具，Vue 的学习曲线更平缓；新团队且业务简单（单页面应用，不需要复杂状态管理），Svelte/SvelteKit 是性能更好、bundle 更小的现代选择。"]}],"res":[{"tp":"文档","tc":"b-docs","t":"React 官方文档","d":"全新文档，Hooks 优先，每个概念配交互式示例","u":"https://react.dev/","lv":"entry","s":"react.dev"},{"tp":"文档","tc":"b-docs","t":"TypeScript Handbook","d":"官方完整教程，类型系统/泛型/高级类型","u":"https://www.typescriptlang.org/docs/handbook/intro.html","lv":"entry","s":"typescriptlang.org"},{"tp":"文档","tc":"b-docs","t":"TanStack Query 文档","d":"服务端状态管理，缓存/失效/乐观更新完整方案","u":"https://tanstack.com/query/latest","lv":"mid","s":"tanstack.com"},{"tp":"文档","tc":"b-docs","t":"Next.js App Router 文档","d":"RSC/Streaming/Server Actions 完整指南","u":"https://nextjs.org/docs/app","lv":"mid","s":"nextjs.org"},{"tp":"博客","tc":"b-blog","t":"Total TypeScript — Matt Pocock","d":"TypeScript 工程实践，React+TS 集成，类型体操","u":"https://www.totaltypescript.com/","lv":"mid","s":"totaltypescript.com"},{"tp":"博客","tc":"b-blog","t":"Type Challenges（类型体操练习）","d":"从简单到困难的类型编程题","u":"https://github.com/type-challenges/type-challenges","lv":"adv","s":"github.com"}]},{"id":"python_ai","phase":"Python 深度","title":"Python · 语言特征 · GIL · AI 服务架构","color":"#3776AB","bg":"#EBF3FA","intro":"Python 是 AI/ML 的唯一主流语言，不是因为它快，而是因为 20 年积累的科学计算生态（NumPy/SciPy/PyTorch）无可替代。理解 Python 的真实性能边界和工程化方式，才能正确地在架构里定位它。","intro_lines":["▸ <strong>语言画像</strong> — Python 的设计哲学，为什么慢但仍然是 AI 首选","▸ <strong>核心优势与局限</strong> — 生态/开发速度 vs 运行性能/类型安全","▸ <strong>架构选型场景</strong> — 什么时候用 Python，什么时候用其他语言提供 AI 能力","▸ <strong>GIL 的真实影响</strong> — 什么被限制了，什么没有被限制，如何绕过","▸ <strong>asyncio 并发模型</strong> — 事件循环，协程，阻塞调用的正确处理","▸ <strong>FastAPI 与 AI 服务化</strong> — 模型推理服务的最佳实践","▸ <strong>工程化工具链</strong> — uv/Poetry，类型注解，测试，容器化"],"notes":[{"h":"语言画像：Python 是什么类型的语言","pts":["Python 是「以可读性为第一价值」的动态强类型解释型语言。「可读性」在 Python 社区是真正的核心价值——缩进强制代码层次、禁止使用 {} 花括号作为代码块、鼓励用英语单词命名，使得 Python 代码接近伪代码，降低了领域专家（数学家/科学家/研究员）参与编程的门槛。这正是 Python 在科学计算和 AI 领域获得主导地位的历史原因。","动态类型 vs 强类型：Python 是动态类型（变量类型在运行时确定，x = 1; x = 'hello' 合法）但强类型（不会自动做隐式类型转换，1 + '1' 会抛 TypeError 而不是返回 '11'）。和 JavaScript（动态弱类型）的区别是 Python 不允许隐式强制转换。Type Hints 是可选的静态类型注解，不影响运行时行为，但配合 mypy/pyright 提供静态检查。","为什么慢但仍是 AI 首选：Python 的「慢」是指 Python 字节码的解释执行速度（比 Go 慢 5-50 倍）。但 AI/ML 的真正计算发生在 C/CUDA 层（PyTorch 的张量运算是 C++/CUDA 实现的），Python 只是「调度者」——发出 GPU 计算指令，等待结果。这时候 Python 的速度完全不是瓶颈，GPU 利用率才是。Python 的价值在于生态（2 行代码加载 GPT-2，1 行代码推理），不在于运行速度。"]},{"h":"核心优势与真实局限","pts":["核心优势——AI/ML 生态壁垒：PyTorch（Facebook）、TensorFlow（Google）、NumPy、Pandas、SciKit-Learn、LangChain、HuggingFace Transformers——这些工具不是 Python 库，而是整个 AI 工程生态的标准接口。没有其他语言有类似深度的 AI 工具链。如果你在做任何 AI 相关工作，不用 Python 的机会成本极高。","核心优势——开发速度极快：REPL（交互式解释器）+ Jupyter Notebook 使得探索性编程体验无可比拟——想法到可运行代码的时间极短。这对数据分析、原型验证、研究实验至关重要。一个 Python 数据分析脚本能在 10 分钟内完成，用 Java 可能需要 2 小时（项目初始化、依赖配置、编译……）。","真实局限——运行性能：纯 Python 代码（不调用 C 扩展的部分）的性能比 Go/Java 慢 5-50 倍，比 Rust/C++ 慢 100-500 倍。对于 CPU 密集型计算（图像处理、数值模拟），这是真实的限制。解决方案：用 NumPy/PyTorch 向量化替代 Python 循环（可快 10-100 倍）；用 Numba JIT 编译热路径；用 multiprocessing 在多进程并行。","真实局限——类型安全可选：大型 Python 代码库在没有类型注解时，重构风险极高（改一个函数的参数名，调用者不报错直到运行时）。团队规模增大后，缺少类型约束的 Python 代码库维护成本会快速上升。现代 Python 工程的解决方案：全面使用 Type Hints + mypy/pyright strict 模式，配合 pydantic 做运行时数据校验。"]},{"h":"架构选型：Python 在系统里的正确位置","pts":["应该用 Python 的场景：① AI/ML 模型训练、推理、微调——没有替代；② 数据工程（ETL/数据清洗/特征工程）——Pandas/PySpark 生态成熟；③ AI 应用服务化（FastAPI + 模型推理）——最短的从模型到 API 的路径；④ 数据分析和可视化（Jupyter/Matplotlib/Plotly）；⑤ 快速原型和概念验证——开发速度最快。","不应该用 Python 的场景：① CPU 密集型业务逻辑（选 Go/Java/Rust）；② 需要精确内存控制（选 Rust）；③ 低延迟实时系统（选 Go/Rust）；④ 前端（选 TypeScript）；⑤ 大型企业业务后端（如果不涉及 AI，选 Java+Spring 生态更成熟）。","Python 在多语言架构里的定位：通常作为「AI 服务层」存在——Java/Go 负责业务逻辑和 API 网关，Python 负责 AI 推理（FastAPI 提供 gRPC/REST 接口）。这种分工使得每门语言在自己最擅长的领域发挥价值，避免用 Python 写所有业务逻辑（会引入性能问题和类型安全问题）。"]},{"h":"GIL：理解边界，不要夸大","pts":["GIL（Global Interpreter Lock）保证同一时刻只有一个线程执行 Python 字节码。这意味着多线程对 CPU 密集型任务（纯 Python 循环）没有加速效果，甚至因为线程切换开销而变慢。但 GIL 在线程做 IO 等待时会被释放，因此多线程对 IO 密集型任务（网络请求/文件读写）仍然有效——这是最常被误解的一点。","绕过 GIL 的三种方式：① multiprocessing（多进程，每个进程有独立 GIL 和 Python 解释器，真正 CPU 并行，但进程间通信有序列化成本）；② C 扩展/NumPy/PyTorch（在 C/CUDA 层执行时主动释放 GIL，向量化计算可真正并行）；③ asyncio（单线程事件循环，解决 IO 并发不解决 CPU 并行）。Python 3.13 引入 no-GIL 模式（PEP 703），是移除 GIL 的长期路线，生产就绪还需时间。","AI 场景里 GIL 的实际影响：PyTorch 的 GPU 计算、NumPy 的向量运算都在 C/CUDA 层执行，不受 GIL 限制。真正被 GIL 限制的是「Python 层面的数据预处理代码」（for 循环处理数据）。解决方案：用 DataLoader 的 num_workers 参数开启多进程数据预处理（每个 worker 是独立进程，不受 GIL 限制）。"],"img_key":"python_gil","img_link":"Python GIL","img_title":"https://wiki.python.org/moin/GlobalInterpreterLock"},{"h":"asyncio 并发模型与 FastAPI 实践","pts":["asyncio 是单线程事件循环：所有协程在同一个 OS 线程里交错执行，await 是切换点（协程在等待 IO 时挂起，事件循环切换到其他协程）。和 Go goroutine 的本质差异：goroutine 是 M:N 调度，真正可以并行运行在多个 CPU 核上；asyncio 是单线程，只是并发（交错）而非并行。在 IO 密集型场景下两者都高效，CPU 密集型场景下 Go 有优势。","asyncio 里的致命错误——在 async 函数里调用同步阻塞代码（如 requests.get/time.sleep/CPU 密集循环）：这会阻塞整个事件循环，让所有其他协程都等待。正确做法：用 httpx（异步 HTTP 客户端）替代 requests；用 asyncio.sleep 替代 time.sleep；用 asyncio.to_thread（Python 3.9+）或 loop.run_in_executor 把阻塞调用放进线程池。","FastAPI 的 AI 推理服务最佳实践：应用启动时加载模型（@app.lifespan context manager，替代废弃的 on_event）；用 asyncio.Semaphore 限制并发推理数量防止 OOM；CPU 密集的预处理用 BackgroundTasks 或 ProcessPoolExecutor；流式响应用 StreamingResponse（适合 LLM 逐 token 输出）；Pydantic v2 做请求/响应的类型校验（基于 Rust，比 v1 快 5-10 倍）。"],"img_key":"asyncio","img_link":"Python asyncio","img_title":"https://docs.python.org/3/library/asyncio.html"},{"h":"现代 Python 工程化","pts":["包管理演进：pip（标准，无锁文件）→ Poetry（pyproject.toml + 锁文件，大幅改善可复现构建）→ uv（Rust 实现，2024 年，pip+virtualenv+poetry 的全功能替代，速度快 10-100 倍，正在快速成为新项目标准）。新项目推荐直接用 uv：uv init 初始化项目，uv add 添加依赖，uv run 运行脚本。","代码质量工具链：ruff（Rust 实现的 Python linter + formatter，替代 flake8/black/isort，速度快 10-100 倍）；mypy/pyright 做静态类型检查；pytest 是测试的事实标准（fixtures/parametrize/mock 一套完整）。这套工具链（uv + ruff + pyright + pytest）是 2024 年 Python 项目的现代标准配置。","容器化 Python 服务的最佳实践：使用 python:3.12-slim 而非 full 镜像（镜像大小从 1GB 减到 150MB）；在 Docker 里安装依赖时利用层缓存（先 COPY requirements.txt，再 RUN pip install，再 COPY 源码）；多阶段构建（builder 阶段安装构建依赖，runtime 阶段只复制必要文件）；生产环境用 gunicorn + uvicorn workers 而非直接运行 uvicorn（gunicorn 负责进程管理，uvicorn 处理 async）。"]}],"res":[{"tp":"文档","tc":"b-docs","t":"FastAPI 官方文档","d":"异步 Web 框架，AI 服务化首选，Pydantic/依赖注入/OpenAPI","u":"https://fastapi.tiangolo.com/","lv":"entry","s":"fastapi.tiangolo.com"},{"tp":"工具","tc":"b-tool","t":"uv — Python 包管理器","d":"Rust 实现，pip+virtualenv+poetry 全功能替代","u":"https://github.com/astral-sh/uv","lv":"entry","s":"github.com"},{"tp":"工具","tc":"b-tool","t":"ruff — Python linter & formatter","d":"Rust 实现，替代 flake8/black/isort，速度快 10-100 倍","u":"https://docs.astral.sh/ruff/","lv":"entry","s":"astral.sh"},{"tp":"博客","tc":"b-blog","t":"Python asyncio 完整教程 — Real Python","d":"事件循环/协程/Task，常见陷阱与正确模式","u":"https://realpython.com/async-io-python/","lv":"mid","s":"realpython.com"},{"tp":"书籍","tc":"b-book","t":"Architecture Patterns with Python — Harry Percival","d":"Python 大型项目的架构模式：DDD/CQRS/Event Sourcing","u":"https://www.oreilly.com/library/view/architecture-patterns-with/9781492052197/","lv":"mid","s":"oreilly.com"}]},{"id":"rust_intro","phase":"Rust 深度","title":"Rust · 所有权 · 适用场景 · 和 Go 的分界线","color":"#CE422B","bg":"#FBF0EE","intro":"Rust 是工具箱里最锋利的刀——解决了 C/C++ 几十年都没解决的内存安全问题，性能接近汇编，但学习曲线是所有主流语言里最陡的。理解它的适用边界，比会写 Rust 更重要。","intro_lines":["▸ <strong>语言画像</strong> — Rust 解决了什么问题，为什么是系统编程的新标准","▸ <strong>核心优势与代价</strong> — 内存安全/零成本抽象 vs 学习曲线/编译时间","▸ <strong>所有权模型</strong> — 三条规则如何保证内存安全，Move vs Copy vs Clone","▸ <strong>架构选型：Rust vs Go 的分界线</strong> — 什么场景 Rust 是正确选择","▸ <strong>Tokio 与异步生态</strong> — 懒惰 Future，async/await 与 Go goroutine 的对比"],"notes":[{"h":"语言画像：Rust 解决了什么问题","pts":["Rust 的核心使命是「让系统编程安全」。在 Rust 之前，系统级编程（OS/驱动/嵌入式/高性能网络库）的选择是 C/C++：性能极好，但内存管理由程序员手动负责，导致大量安全漏洞（缓冲区溢出/use-after-free/空指针解引用）。微软安全响应中心估计 70% 的安全漏洞源于内存不安全。Rust 的所有权系统在编译时静态验证内存安全，彻底消除这类错误，同时不引入运行时 GC 开销。","Rust 被三个指标衡量：① 内存安全（无 GC 的内存管理，借用检查器保证安全）；② 并发安全（数据竞争是编译错误，不是运行时崩溃）；③ 零成本抽象（高级语言特性在编译后无运行时开销）。在这三个维度同时达到的语言里，Rust 是唯一的主流选择。","工业界的采用信号：Linux 内核 6.1 开始包含 Rust 代码（内核驱动）；Android 新代码 50%+ 用 Rust；Microsoft 开始用 Rust 重写 Windows 核心组件；AWS Lambda 运行时、Cloudflare Workers 运行时、Firefox 浏览器引擎（Servo）、WebAssembly 工具链都是 Rust 实现。这不是学术实验，而是真实的工业替代。"]},{"h":"核心优势与真实代价","pts":["核心优势——可预测的极限性能：Rust 没有 GC，不存在 GC 暂停，延迟完全可预测。在需要 P99 延迟 < 1ms 的场景（高频交易/实时音视频/游戏网络同步），Rust 是最可靠的选择。基准测试里 Rust 通常和 C++ 性能相当（有时更快，因为更严格的别名规则允许更激进的优化），比 Go 快 10-30%，比 Java 快 30-100%（视 GC 压力而定）。","核心优势——并发安全是编译时保证：Rust 的类型系统区分可变引用（&mut T，独占访问）和共享引用（&T，只读），编译器拒绝同时存在多个可变引用——这在类型层面彻底防止了数据竞争。在 Java/Go 里，数据竞争是运行时崩溃；在 Rust 里，数据竞争是编译错误。「如果它能编译通过，它就是并发安全的」是真实的承诺。","真实代价——学习曲线：借用检查器是 Rust 独有的心智挑战。新 Rustacean（Rust 程序员）会花大量时间「与借用检查器搏斗」——尤其是在试图用 Go/Java 的思维方式写 Rust 时（传递引用给多个地方、全局可变状态）。通常需要 3-6 个月才能做到「与借用检查器协作而非对抗」。","真实代价——编译时间：Rust 的编译速度是主流系统语言里最慢的（单态化泛型、LLVM 后端优化）。中大型 Rust 项目的全量编译可能需要几分钟，增量编译通常 10-30 秒。对比 Go（秒级全量编译）和 C++（也很慢），Rust 的编译时间是真实的开发效率影响，尤其在 CI 环境里。sccache 和 cargo-nextest 可以改善，但无法根本解决。"]},{"h":"所有权系统：三条规则如何保证内存安全","pts":["所有权三条规则：① 每个值有且仅有一个所有者；② 所有者离开作用域时值自动释放（drop）；③ 值可以被借用（Borrow），规则是：要么多个不可变借用（&T），要么一个可变借用（&mut T），两者不能同时存在。这三条规则由借用检查器在编译时静态验证，运行时无开销。","Move vs Copy vs Clone：Move 是 Rust 的默认语义——let b = a 将所有权从 a 转移给 b，a 之后不能使用。实现了 Copy trait 的类型（整数/布尔/不可变引用）在赋值时复制值而非转移所有权。Clone 是显式的深拷贝（let b = a.clone()），开销明确可见。这和 Java/Go 的引用语义完全不同——Java 里 b = a 让两个变量指向同一个对象；Rust 里赋值后 a 失效（除非 Copy）。","智能指针处理共享所有权：当需要多个地方共享同一个值时（不能 Move），使用 Rc<T>（引用计数，单线程共享）或 Arc<T>（原子引用计数，多线程共享）。可变共享状态用 RefCell<T>（单线程，运行时借用检查）或 Mutex<T>/RwLock<T>（多线程）。这些是「受控地打破所有权规则」的工具，使用时需要明确了解代价。"],"img_key":"rust_ownership","img_link":"Rust Ownership","img_title":"https://doc.rust-lang.org/book/ch04-00-understanding-ownership.html"},{"h":"Rust vs Go 的架构选型分界线","pts":["选 Rust 的场景：① 系统编程（OS 组件/内核驱动/嵌入式/固件）——Rust 是 C++ 的现代替代；② 需要精确控制内存布局和分配（FFI 接口/内存映射/高性能数据结构）；③ 目标是 WebAssembly——Rust 有最好的 WASM 工具链（wasm-bindgen/wasm-pack），WASM 代码大小也更小；④ 高性能网络库/数据库引擎（需要极低延迟且无 GC 暂停）；⑤ 安全关键软件（航空/医疗/金融核心引擎）。","选 Go 而非 Rust 的场景：① 网络服务和微服务（Go 的开发效率远高于 Rust，性能差距在 IO 密集场景里不显著）；② 团队没有 Rust 经验且项目时间紧（Rust 的学习曲线会显著影响初期开发速度）；③ 需要快速迭代（Rust 的编译时间和借用检查器会拖慢迭代节奏）；④ CLI 工具（Go 和 Rust 都适合，Go 更快开发）。核心判断：是否真的需要「无 GC 的可预测延迟」或「精确内存控制」？需要就选 Rust，不需要就选 Go。","Rust 和 C++ 的关系：Rust 不是 C++ 的改进版，而是从头设计的系统语言，解决了 C++ 的内存安全问题。现有 C++ 代码库不会消失（重写成本太高），但新的系统级项目越来越多选择 Rust。C++ 和 Rust 之间的 FFI（extern C）是平滑的，允许逐步引入 Rust 而不是全量重写。"],"img_key":"rust_vs_go","img_link":"Rust vs Go","img_title":"https://en.wikipedia.org/wiki/Rust_(programming_language)"},{"h":"Tokio 与 Rust 异步编程","pts":["Rust 的 async/await 是零成本的——编译器把 async fn 转换成一个实现了 Future trait 的状态机，不需要堆分配（除非用 Box<dyn Future>）。和 Go goroutine 的关键差异：Rust 的 Future 是懒惰的（Lazy）——创建后不会自动执行，必须被 .await 或 spawn 到 runtime 上才开始运行。Go 的 goroutine 是急切的（Eager）——go func() 立即把任务提交给调度器。","Tokio 是 Rust 异步编程的事实标准 runtime：多线程工作队列（默认线程数 = CPU 核数）、异步 IO（基于 epoll/kqueue/IOCP）、定时器、多种通道类型（mpsc/oneshot/broadcast/watch）。tokio::spawn 相当于 Go 的 go func()。Axum 是 Tokio 团队维护的 Web 框架，类型安全的提取器（Extractor）是其特色，性能接近 Hyper（底层 HTTP 库）。","选择 Tokio 生态的 Web 服务 vs Go 服务的实际考量：Tokio + Axum 的原始吞吐量比 Go + Gin 高 20-40%，延迟更稳定（无 GC）。但 Rust 的开发效率大约是 Go 的 1/3 到 1/2（更多的类型注解、借用相关的 workaround、更长的编译时间）。除非吞吐量和延迟是决定性的竞争优势，否则这个性能差距通常不值得付出 Rust 的开发效率代价。"]}],"res":[{"tp":"书籍","tc":"b-book","t":"The Rust Programming Language（官方，免费）","d":"所有权/借用/生命周期权威教程，入门必读","u":"https://doc.rust-lang.org/book/","lv":"mid","s":"doc.rust-lang.org"},{"tp":"课程","tc":"b-course","t":"Rustlings（官方练习）","d":"小练习驱动，逐步理解 Rust 核心概念","u":"https://github.com/rust-lang/rustlings","lv":"entry","s":"github.com"},{"tp":"文档","tc":"b-docs","t":"Tokio 官方教程","d":"异步 runtime，网络服务，通道，计时器","u":"https://tokio.rs/tokio/tutorial","lv":"mid","s":"tokio.rs"},{"tp":"博客","tc":"b-blog","t":"Are we web yet? Rust Web 框架生态","d":"Axum/Actix/Warp 对比，Rust Web 开发现状","u":"https://www.arewewebyet.org/","lv":"entry","s":"arewewebyet.org"},{"tp":"博客","tc":"b-blog","t":"Rust vs Go: Which to Choose? — Logrocket","d":"两种语言适用场景的深度对比，有大量具体示例","u":"https://blog.logrocket.com/rust-vs-go/","lv":"mid","s":"logrocket.com"}]},{"id":"arch_compare","phase":"架构决策","title":"多语言架构设计 · 引入策略 · 团队建设","color":"#7c3aed","bg":"#F5F3FF","intro":"语言选型是架构决策，不是技术偏好。在 Java 为主的系统里引入 Go/Python/TS 时，最大的风险不是技术风险，而是运维复杂度、知识传递、和招聘市场的现实约束。","intro_lines":["▸ <strong>多语言架构模式</strong> — 什么是安全的「在服务边界引入」，什么是危险的「在服务内部混用」","▸ <strong>API 范式选型</strong> — REST/gRPC/GraphQL/tRPC 的技术权衡和生态定位","▸ <strong>并发模型全景</strong> — Java 虚拟线程/Go goroutine/Node.js/Python asyncio/Rust async 的实际对比","▸ <strong>引入新语言的成本</strong> — 招聘/培训/工具链/故障排查的真实代价"],"notes":[{"h":"多语言架构：安全引入 vs 危险混用","pts":["最常见的成功模式是「在服务边界引入新语言」：新建微服务用 Go（高并发网关）或 Python（AI 推理服务），通过 gRPC/REST 与 Java 服务通信。每个服务是独立部署的单元，语言选择只影响那个服务的团队，不影响整个系统。这是 Netflix/Uber/字节跳动等公司使用多语言的标准方式。","危险的混用模式——在服务内部混用多语言：Java 主进程通过 Runtime.exec 调用 Python 脚本、Go 代码编译为 C 库被 Java 调用、JNI 调用 Rust 代码……这些模式引入了：进程间序列化成本、跨语言调试噩梦（Java 堆栈和 Python traceback 不能合并显示）、两套部署流水线（JVM + CPython 同时在一个容器里）。除非有极强的理由（如无法拆分的性能关键路径），避免这种模式。","渐进式迁移而非一次性重写：大规模语言迁移的失败案例比成功案例多得多（「Netscape 重写」是经典的失败案例）。正确的路径是：新功能用新语言写，旧功能在有业务需求时随着改动逐步迁移，两套语言长期共存直到旧服务自然退役。设定一个「新服务默认用 Go/Python」的规则比「我们要迁移所有 Java 服务」更可行。"]},{"h":"API 范式选型：技术权衡与生态定位","pts":["REST（HTTP + JSON）：最普遍，浏览器原生支持，生态最广。弱点：无强类型契约（OpenAPI 是文档，不是 source of truth），序列化效率低于 Protobuf，HTTP/1.1 每个请求需要新连接（HTTP/2 缓解）。适合：对外公共 API（合作伙伴/第三方集成/开放平台）、浏览器直接调用、需要最广泛兼容性的场景。新的内部微服务用 REST 是次优选择，但工程惯性强大。","gRPC（HTTP/2 + Protobuf）：内部微服务通信的工业标准（特别是 Go 生态）。.proto 文件是强类型契约，protoc 生成各语言客户端（Java/Go/Python/TypeScript 全有），序列化效率比 JSON 高 3-10 倍，HTTP/2 支持多路复用和双向流。弱点：浏览器不能直接调用（需要 grpc-web 代理层），调试比 curl 困难（需要专门工具如 grpcurl）。适合：高性能内部服务调用、需要流式传输（实时数据推送）的场景。","GraphQL：解决多端 API 的 over/under-fetching 问题。适合 BFF（Backend for Frontend）层——一个 GraphQL 服务聚合多个后端，前端精确声明需要的字段。代价：服务端实现复杂（N+1 查询需要 DataLoader，复杂查询需要深度/复杂度限制），缓存比 REST 难（查询是 POST）。不适合服务间内部通信（gRPC 更合适）。tRPC 是 TypeScript 全栈的新选择——无 schema 文件，type-safe 端到端，适合 Next.js 全栈项目。"],"img_key":"api_paradigms","img_link":"API Design","img_title":"https://en.wikipedia.org/wiki/API"},{"h":"并发模型对比：实际工程影响","pts":["Java 虚拟线程（Java 21+）：M:N 调度的绿色线程，和原有阻塞 IO 代码完全兼容（无需改写），Spring Boot 3.2+ 默认支持。一个 Tomcat 服务器可以维持数十万个虚拟线程（传统线程池上限约 200-1000）。不适合 CPU 密集任务（仍然受 OS 线程数限制）。意义：Java 服务的并发能力在 Java 21 之后和 Go 基本相当，减少了「因为并发需求而必须迁移到 Go」的场景。","Go goroutine：真正的 M:N 调度，Go 标准库和生态从设计之初就是 goroutine-first 的。简单的心智模型（启动 goroutine 是 go func()，通信是 channel），整个语言围绕并发设计。在网络 IO 密集型场景里，Go 的并发能力和代码简洁性是真实的竞争优势。","Node.js/Python asyncio（单线程事件循环）：对 IO 密集任务高效，CPU 密集任务会阻塞整个循环。Node.js 的 Worker Threads 和 Python 的 multiprocessing 是补丁，不是一等公民。在选型时需要诚实评估工作负载：如果有任何 CPU 密集计算（图像处理/加密/AI 推理），单线程事件循环不是合适的选择（AI 推理在 GPU 上执行，不占用 CPU 线程，是例外）。"],"img_key":"concurrency_real","img_link":"Concurrency Patterns","img_title":"https://en.wikipedia.org/wiki/Concurrency_pattern"},{"h":"引入新语言的真实成本","pts":["招聘成本：Java 工程师市场供给最大（特别是中国市场），Go 工程师供给约为 Java 的 1/5 到 1/3，Python（后端方向）约为 Java 的 1/4，Rust 工程师极为稀缺。引入新语言意味着：招聘池缩小、薪资预期上升（稀缺溢价）、简历筛选标准需要重新设计。在决策前需要评估所在城市的人才市场。","知识传递和轮岗限制：单一语言团队里每个人都可以 review 任何代码，on-call 轮值时任何人都能处理生产问题。引入第二语言后：只有熟悉那门语言的工程师才能有效处理问题，生产事故处理时的可用人员集合缩小，新人入职需要学习多套工具链。这些隐性成本在团队规模较小时（< 30 人）尤其显著。","工具链和基础设施成本：每增加一门语言意味着：新的 CI/CD 配置、新的代码质量工具（linter/formatter/测试框架）、新的容器基础镜像、新的监控和日志格式适配。中台团队（DevOps/Platform Engineering）的维护负担线性增长。做决策前需要和平台团队讨论是否有能力支持新语言的完整 SDLC。"]}],"res":[{"tp":"报告","tc":"b-blog","t":"TechEmpower Framework Benchmarks","d":"主流 Web 框架性能横向对比，Rust/Go/Java/Node 真实数据","u":"https://www.techempower.com/benchmarks/","lv":"entry","s":"techempower.com"},{"tp":"博客","tc":"b-blog","t":"Java Virtual Threads Guide（Oracle）","d":"Project Loom 虚拟线程完整指南，与 goroutine 的对比","u":"https://docs.oracle.com/en/java/javase/21/core/virtual-threads.html","lv":"mid","s":"oracle.com"},{"tp":"博客","tc":"b-blog","t":"gRPC vs REST vs GraphQL 深度对比","d":"各 API 范式的性能/适用场景/生态成熟度","u":"https://kreya.app/blog/grpc-vs-rest/","lv":"entry","s":"kreya.app"},{"tp":"博客","tc":"b-blog","t":"Stack Overflow Developer Survey 2024","d":"各语言使用率/喜爱度/薪资，招聘决策的数据参考","u":"https://survey.stackoverflow.co/2024/","lv":"entry","s":"stackoverflow.co"}]}];

function render(){
  const cont=document.getElementById('cont'),nav=document.getElementById('nav');
  let tot=0,curP='';
  D.forEach(s=>{
    tot+=s.res.length;
    if(s.phase!==curP){
      curP=s.phase;
      const lbl=document.createElement('div');lbl.className='nlbl';lbl.textContent=s.phase;nav.appendChild(lbl);
    }
    const a=document.createElement('a');a.className='nl';a.dataset.sec=s.id;a.onclick=()=>goto(s.id);
    a.innerHTML=`<span class="ndot" style="background:${s.color}"></span>${s.title.split('·')[0].trim()}<span class="nc">${s.res.length}</span>`;
    nav.appendChild(a);
    const div=document.createElement('div');div.className='sec';div.id=s.id;
    div.dataset.search=[s.title,s.intro,...s.notes.map(n=>n.h+' '+n.pts.join(' ')),...s.res.map(r=>r.t+' '+r.d)].join(' ').toLowerCase();
    const tid=`t-${s.id}`;
    let notesHTML=`<div class="notes-block">`;
    s.notes.forEach((n,ni)=>{
      const _diag=n.img_key?document.getElementById('diag_'+n.img_key):null;
      const _svg=_diag?_diag.innerHTML:'';
      const _link=n.img_key&&n.img_link?`<a class="diag-link" href="${n.img_link}" target="_blank" rel="noopener">↗ ${n.img_title||'参考资料'}</a>`:'';
      const _img=_svg?`<figure class="note-fig">${_svg}${_link}</figure>`:(_link?`<p>${_link}</p>`:'')
      
      const aid=`a-${s.id}-${ni}`;
      notesHTML+=`<div class="acc" id="nh-${s.id}-${ni}"><div class="acc-hdr" onclick="toggleAcc('${aid}',this)"><span class="acc-arrow">▶</span><span class="acc-htxt">${n.h}</span></div><div class="acc-body" id="${aid}">${_img}<div class="pts-wrap">${n.pts.map(p=>`<div class="pt">${p}</div>`).join('')}</div></div></div>`;
    });
    notesHTML+='</div>';
    let resHTML=`<div class="res-block"><div class="res-section-label">🔗 学习资源</div><div class="grid">`;
    s.res.forEach(r=>{
      resHTML+=`<div class="card"><div class="ctop"><span class="badge ${r.tc}">${r.tp}</span><div class="ctit"><a href="${r.u}" target="_blank" rel="noopener">${r.t}</a></div></div><div class="cdesc">${r.d}</div><div class="cmeta"><span class="csrc">${r.s}</span><span class="cdiff ${dc(r.lv)}">${dl(r.lv)}</span></div><a class="curl" href="${r.u}" target="_blank" rel="noopener">${r.u.replace(/https?:\/\//,'').split('/')[0]}</a></div>`;
    });
    resHTML+='</div></div></div>';
    div.innerHTML=`<div class="sch"><span class="sdot" style="background:${s.color}"></span><span class="stit">${s.title}</span></div><div class="intro-txt">${s.intro}${renderIntroLines(s.intro_lines)}</div>${notesHTML}${resHTML}`;
    cont.appendChild(div);
  });
  document.getElementById('stag').textContent=`${D.length} 个版块 · ${tot} 个资源`;
  const items=[['b-paper','论文'],['b-blog','博客/文章'],['b-video','视频'],['b-docs','文档'],['b-book','书籍'],['b-course','课程'],['b-github','GitHub'],['b-tool','工具'],['b-visual','可视化']];
  const lg=document.getElementById('leg');
  items.forEach(([cls,lbl])=>{const s=document.createElement('span');s.className=`badge ${cls}`;s.style.cssText='font-size:11px;padding:3px 7px;';s.textContent=lbl;lg.appendChild(s);});
}
function switchTab(tid,which,btn){
  document.querySelectorAll(`#${tid}-notes,#${tid}-res`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`${tid}-${which}`).classList.add('active');
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleAcc(id,hdr){
  const body=document.getElementById(id),isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);hdr.classList.toggle('open',!isOpen);
}
function goto(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'})}
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();let m=0;
  document.querySelectorAll('.sec').forEach(sec=>{
    if(!q){sec.classList.remove('hidden-sec');m++;return;}
    const hit=(sec.dataset.search||'').includes(q);sec.classList.toggle('hidden-sec',!hit);if(hit)m++;
  });
  document.getElementById('nr').style.display=m===0&&q?'block':'none';
  document.getElementById('stag').textContent=q?`找到 ${m} 个版块`:`${D.length} 个版块 · ${D.reduce((a,s)=>a+s.res.length,0)} 个资源`;
});
const obs={observe:()=>{}};
function detectSection(){
  const secs=[...document.querySelectorAll('.sec[id]')];
  if(!secs.length)return;
  const threshold=100;
  let current=secs[0];
  for(const s of secs){
    const top=s.getBoundingClientRect().top;
    if(top<=threshold)current=s;
    else break;
  }
  const id=current.id;
  document.querySelectorAll('.nl[data-sec]').forEach(l=>l.classList.toggle('active',l.dataset.sec===id));
  updateGuide(id);
}
window.addEventListener('scroll',detectSection,{passive:true});
window.addEventListener('scroll',()=>document.getElementById('btt').classList.toggle('show',scrollY>400));
render();
buildToc();setTimeout(detectSection,100);
function renderIntroLines(lines){if(!lines||!lines.length)return'';return'<div class="intro-lines">'+lines.map(function(l){return'<div class="intro-line">'+l+'</div>';}).join('')+'</div>';}
function buildToc(){
  const rail=document.getElementById('toc-rail');
  if(rail&&!document.getElementById('resize-handle')){
    rail.innerHTML='<div class="resize-handle" id="resize-handle"></div><div class="guide-content" id="guide-content"></div>';
    initResize();
  }
  updateGuide(D[0].id);
}
function updateGuide(id){
  const rail=document.getElementById('guide-content')||document.getElementById('toc-rail');
  if(!rail)return;
  const s=D.find(x=>x.id===id);
  if(!s)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const items=s.intro_lines&&s.intro_lines.length?s.intro_lines
    :s.notes?s.notes.map(n=>n.h):[];
  if(!items.length){rail.innerHTML='';return;}
  let h='<span class="guide-head">本节要点</span>';
  items.forEach((line,ni)=>{
    const key='kb_'+fk+'_'+id+'_'+ni;
    const done=localStorage.getItem(key)==='1';
    h+=`<div class="guide-item${done?' done':''}" id="gi-${id}-${ni}">`;
    h+=`<div class="guide-check" onclick="toggleDone('${fk}','${id}',${ni})">✓</div>`;
    h+=`<div class="guide-text" onclick="gotoEl('nh-${id}-${ni}')">${line}</div>`;
    h+='</div>';
  });
  rail.innerHTML=h;
}
function toggleDone(fk,sid,ni){
  const key='kb_'+fk+'_'+sid+'_'+ni;
  const done=localStorage.getItem(key)==='1';
  done?localStorage.removeItem(key):localStorage.setItem(key,'1');
  const el=document.getElementById('gi-'+sid+'-'+ni);
  if(el)el.classList.toggle('done',!done);
}
function gotoEl(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function initResize(){
  const handle=document.getElementById('resize-handle');
  if(!handle)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const stored=localStorage.getItem('toc-w-'+fk);
  if(stored)setTocWidth(parseInt(stored));
  let sx,sw;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    sx=e.clientX;
    sw=document.getElementById('toc-rail').getBoundingClientRect().width;
    document.addEventListener('mousemove',onDrag);
    document.addEventListener('mouseup',endDrag);
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    handle.classList.add('dragging');
  });
  function onDrag(e){
    setTocWidth(Math.max(160,Math.min(640,sw+(sx-e.clientX))));
  }
  function endDrag(){
    document.removeEventListener('mousemove',onDrag);
    document.removeEventListener('mouseup',endDrag);
    document.body.style.cursor='';
    document.body.style.userSelect='';
    handle.classList.remove('dragging');
    localStorage.setItem('toc-w-'+fk,
      Math.round(document.getElementById('toc-rail').getBoundingClientRect().width));
  }
}
function setTocWidth(w){
  const lay=document.querySelector('.lay');
  if(!lay)return;
  const cols=window.getComputedStyle(lay).gridTemplateColumns.split(' ');
  lay.style.setProperty('grid-template-columns',cols[0]+' 1fr '+w+'px','important');
}
</script>
