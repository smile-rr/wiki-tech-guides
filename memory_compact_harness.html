<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>记忆 · 压缩 · Harness · wiki · tech</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary)}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);font-size:12px;cursor:pointer;color:var(--color-text-secondary);background:transparent}
.tab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.panel{display:none}.panel.active{display:block}
.cw{font-family:var(--font-mono);font-size:11.5px;line-height:1.9;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 16px;overflow-x:auto;white-space:pre;margin-bottom:8px}
.k{color:#185FA5}.s{color:#3B6D11}.n{color:#854F0B}.b{color:#A32D2D}
.cm{color:var(--color-text-tertiary);font-style:italic;font-size:10.5px;font-family:var(--font-sans)}
.note{border-left:3px solid var(--color-border-secondary);background:var(--color-background-secondary);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:9px 13px;margin:10px 0;font-size:12px;line-height:1.7;color:var(--color-text-secondary)}
.note b{color:var(--color-text-primary)}
.note.ok{border-left-color:var(--color-border-success);background:var(--color-background-success)}
.note.warn{border-left-color:var(--color-border-warning);background:var(--color-background-warning)}
.note.info{border-left-color:var(--color-border-info);background:var(--color-background-info)}
hr{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:14px 0}
.sec{font-size:13px;font-weight:500;margin:14px 0 7px}

.tl{position:relative;padding-left:22px;margin:6px 0}
.tl::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:1px;background:var(--color-border-secondary)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-18px;top:3px;width:10px;height:10px;border-radius:50%;border:2px solid var(--color-border-secondary);background:var(--color-background-primary)}
.tl-dot.blue{background:var(--color-background-info);border-color:var(--color-text-info)}
.tl-dot.green{background:var(--color-background-success);border-color:var(--color-text-success)}
.tl-dot.amber{background:var(--color-background-warning);border-color:var(--color-text-warning)}
.tl-dot.purple{background:#EEEDFE;border-color:#534AB7}
.tl-title{font-size:12px;font-weight:500;margin-bottom:3px}
.tl-body{font-size:12px;color:var(--color-text-secondary);line-height:1.6}

.badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px;vertical-align:middle}
.b-bl{background:#E6F1FB;color:#185FA5}
.b-te{background:#E1F5EE;color:#0F6E56}
.b-am{background:#FAEEDA;color:#854F0B}
.b-pu{background:#EEEDFE;color:#534AB7}
.b-rd{background:var(--color-background-danger);color:var(--color-text-danger)}
.b-gy{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.card-hd{padding:7px 12px;font-size:12px;font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.card-body{padding:10px 12px;font-size:12px;color:var(--color-text-secondary);line-height:1.7}

.era{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:10px}
.era-hd{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--color-border-tertiary)}
.era-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.era-title{font-size:13px;font-weight:500}
.era-sub{font-size:11px;color:var(--color-text-tertiary);margin-left:auto}
.era-body{padding:10px 14px}
.era-row{display:flex;gap:8px;margin-bottom:7px;font-size:12px;align-items:flex-start}
.era-label{min-width:80px;font-weight:500;flex-shrink:0;font-size:11px;padding-top:1px}
.era-val{color:var(--color-text-secondary);line-height:1.6}
.era-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}

.flow-h{display:flex;align-items:stretch;gap:6px;margin:10px 0;flex-wrap:wrap}
.fh-box{flex:1;min-width:80px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;text-align:center;font-size:11px}
.fh-box .fhb-t{font-weight:500;margin-bottom:2px}
.fh-box .fhb-s{color:var(--color-text-tertiary);font-size:10px;line-height:1.4}
.fh-arr{display:flex;align-items:center;color:var(--color-text-tertiary);font-size:13px;flex-shrink:0}
.fh-blue{background:var(--color-background-info);border-color:var(--color-border-info)}.fh-blue .fhb-t{color:var(--color-text-info)}
.fh-green{background:var(--color-background-success);border-color:var(--color-border-success)}.fh-green .fhb-t{color:var(--color-text-success)}
.fh-amber{background:var(--color-background-warning);border-color:var(--color-border-warning)}.fh-amber .fhb-t{color:var(--color-text-warning)}
.fh-pu{background:#EEEDFE;border-color:#AFA9EC}.fh-pu .fhb-t{color:#534AB7}
.fh-gray{background:var(--color-background-secondary)}.fh-gray .fhb-t{color:var(--color-text-secondary)}
.home-btn{position:fixed;bottom:22px;left:22px;padding:6px 14px;background:var(--tx);color:#fff;border-radius:7px;font-size:12px;text-decoration:none;opacity:.8;transition:all .15s;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.18)}.home-btn:hover{opacity:1;transform:translateY(-1px)}
</style>
</head>
<body>
<a class="home-btn" href="index.html">← 主页</a>
</body>
</html>
