部署仍然非常有限。"]},{"h":"World Model：物理世界的内部模型","pts":["World Model 是指 AI 系统对物理世界的内部表征——能预测「如果我做了这个动作，世界会怎么变」。这对机器人来说是关键能力：可以在头脑里先「想象」动作的结果，选择最优序列，而不是盲目试错。Yann LeCun 长期主张 World Model 是通向 AGI 的关键缺失组件。","Sora（OpenAI 2024）被解读为「视频生成模型即 World Model」：能够生成物理上合理的、时间连贯的视频，意味着模型理解了物体运动、光影变化、物理交互等规律。但 Sora 不是真正意义上的 World Model——它不能被用于规划或控制，只是生成逼真的视频。真正的 World Model 需要能够支持决策和动作规划。","目前没有公认的完整 World Model 实现。最接近的工作是在游戏领域（DREAMER 系列：在视频游戏里学习 World Model 用于规划），以及 GAIA-1（Wayve，自动驾驶领域的 World Model）。把这些能力迁移到真实物理世界仍然是开放问题，是整个具身智能领域的「Holy Grail」。"]},{"h":"Sim-to-Real：从仿真到真实世界的迁移","pts":["在仿真环境（如 Isaac Sim、MuJoCo）中训练机器人有明显优势：可以并行运行数千个环境、可以重置失败状态、数据收集速度快几个数量级、不会损坏真实机器人。但「Sim-to-Real Gap」是一个顽固的挑战：真实世界的物理特性（摩擦、弹性、光照变化、传感器噪声）和仿真的差异，使得在仿真里训练好的策略在真实机器人上往往失败。","Domain Randomization（域随机化）是缓解 Sim-to-Real Gap 的主要方法：在仿真训练时随机化各种物理参数（摩擦系数、物体质量、外观颜色、光照）和传感器参数（相机角度、噪声），使模型学会在各种条件下都能完成任务，从而对真实世界的「另一种随机化」有鲁棒性。OpenAI 用这个方法在 2019 年实现了机器人手玩魔方，是早期最有影响力的 Sim-to-Real 成果。","这个领域 2025 年的核心趋势是：物理仿真引擎本身的 AI 化（Nvidia Isaac Lab 等）使仿真更逼真；VLA 模型把 Sim-to-Real 问题部分转化为「真实数据效率」问题（不需要完全依赖仿真）；Foundation Model 的迁移学习能力降低了对大规模特定任务数据的需求。"]}],"res":[{"tp":"论文","tc":"b-paper","t":"RT-2: Vision-Language-Action Models (Google 2023)","d":"VLM 直接生成机器人动作的奠基实验，语言能力迁移到控制","u":"https://arxiv.org/abs/2307.15818","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"π₀: A Vision-Language-Action Flow Model (Physical Intelligence)","d":"最全面的 VLA 系统，7种机器人形态，Flow Matching 动作生成","u":"https://www.physicalintelligence.company/blog/pi0","lv":"mid"},{"tp":"视频","tc":"b-video","t":"Yann LeCun: A Path Towards Autonomous Machine Intelligence","d":"World Model 理论框架，为什么 LLM 路线不够，需要什么","u":"https://openreview.net/forum?id=BZ5a1r-kVsf","lv":"adv"},{"tp":"论文","tc":"b-paper","t":"DreamerV3: Mastering Diverse Domains through World Models","d":"游戏领域 World Model 的成熟实现，规划和决策的基础","u":"https://arxiv.org/abs/2301.04104","lv":"adv"}],"intro_lines":["▸ <strong>VLA</strong> — RT-2/π₀ 架构设计，Vision-Language-Action 的数据收集代价，Foundation Model 思路的迁移边界","▸ <strong>World Model</strong> — 「视频生成 = 物理世界理解」的假设，Sora 是否是 World Model 的争议","▸ <strong>Sim-to-Real</strong> — Domain Randomization 的原理，从仿真到真实的迁移挑战，2025 年的主要进展"]},{"id":"science_ai","phase":"前沿方向","title":"科学 AI · AlphaFold · 分子设计","color":"#0891b2","bg":"#ECFEFF","intro":"AI for Science 代表了一类特殊的应用：用 AI 解决人类单靠实验无法解决的问题，而非只是提高效率。AlphaFold 是这个方向最重要的里程碑。","notes":[{"h":"AlphaFold：AI 解决 50 年科学难题","pts":["蛋白质折叠问题（Protein Folding Problem）是：给定氨基酸序列，预测蛋白质的三维空间结构。蛋白质的功能由其三维结构决定，但从序列推断结构在传统方法下需要数年实验室工作。AlphaFold 2（DeepMind 2021）在 CASP14 竞赛中以惊人优势超越所有传统方法，预测精度接近实验级别（中位 GDT 分数 92.4 vs 传统最好方法约 75），被认为是 AI 在科学领域最重要的突破之一。","AlphaFold 2 的核心创新是 Evoformer 模块：同时处理多序列比对（MSA，从进化信息中推断哪些位置的变化是协同的）和成对残基关系，交替更新两种表示，让模型在预测结构时考虑了蛋白质的进化历史。这不只是一个「更大的神经网络」，而是把领域知识（进化约束）深度融入了架构设计。","AlphaFold 3（2024）把能力扩展到蛋白质之外：DNA、RNA、小分子配体、共价修饰的相互作用都能预测。这直接影响了药物研发流程——以前需要数年的「靶点结构→虚拟筛选→湿实验验证」循环，现在初步筛选可以在计算机上完成，大幅压缩时间和成本。AlphaFold 数据库已经公开了约 2 亿个蛋白质结构预测，覆盖了几乎所有已知生命体的蛋白质组。"]},{"h":"生成式分子设计","pts":["生成式 AI 在药物分子设计上的应用逻辑是：如果 AlphaFold 能预测「给定序列，结构是什么」，那么生成模型可以反过来「给定目标结构/功能，设计满足要求的分子」。RFDiffusion（David Baker 团队）把扩散模型应用到蛋白质设计：从噪声出发逐步去噪生成满足约束条件的蛋白质结构，成功设计出了自然界从未存在过的蛋白质，且在实验室验证中有效。","小分子药物设计是另一个方向：用图神经网络（分子天然是图结构——原子是节点，化学键是边）预测分子属性（毒性/溶解性/结合亲和力），或者用 VAE/扩散模型生成具有特定属性的新分子。Schrödinger、Insilico Medicine、Exscientia 等公司已经用 AI 设计的药物分子进入了临床试验，是 AI 医疗领域最接近真实落地的方向。","材料科学 AI 同样在快速发展：GNoME（Google DeepMind 2023）用 GNN 预测新材料的稳定性，在一次计算实验中发现了约 220 万种稳定的新材料（此前人类总共发现约 4.8 万种稳定无机晶体），为电池材料、超导体、催化剂等领域提供了海量候选材料库。"]},{"h":"气候与物理 AI","pts":["GraphCast（DeepMind 2023）是天气预测领域的 AlphaFold 时刻：用图神经网络在 1 分钟内完成全球 10 天天气预报，准确率在 90% 以上的指标上超过了欧洲中期天气预报中心（ECMWF）的传统数值模型。传统数值天气预报需要数百台超级计算机运行数小时，GraphCast 让高质量天气预报的边际成本接近零。","FourCastNet（NVIDIA）和 Pangu-Weather（华为）是类似方向的竞争者，都展示了 AI 在气候科学里的实用价值。更重要的是，这些模型为「气候变化模拟」提供了更高效的工具——传统气候模型运行一次需要数周计算时间，AI 代理模型（Surrogate Model）可以在几秒内给出近似结果，使得大规模气候情景模拟成为可能。","AI 在物理科学的更广应用：粒子物理（CERN 用 ML 从 LHC 海量数据中筛选信号）、天文学（用 CNN 自动分类星系形态、发现引力透镜）、核聚变控制（DeepMind 用 RL 控制 tokamak 等离子体形态）。这些不是 AI「替代科学家」，而是让科学家能处理人力无法处理的数据规模和复杂度。"]}],"res":[{"tp":"论文","tc":"b-paper","t":"Highly accurate protein structure prediction with AlphaFold","d":"AlphaFold 2 原论文，Evoformer 架构，50 年蛋白质折叠问题的解答","u":"https://www.nature.com/articles/s41586-021-03819-2","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"Accurate structure prediction of biomolecular interactions with AlphaFold 3","d":"扩展到 DNA/RNA/小分子，直接影响药物研发","u":"https://www.nature.com/articles/s41586-024-07487-w","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"GraphCast: Learning skillful medium-range weather forecasting","d":"GNN 天气预报，超越传统数值模型，DeepMind 2023","u":"https://www.science.org/doi/10.1126/science.adi2336","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"AlphaFold Database","d":"2 亿个蛋白质结构预测，覆盖几乎所有已知生命体，免费开放","u":"https://alphafold.ebi.ac.uk/","lv":"entry"}],"intro_lines":["▸ <strong>AlphaFold</strong> — Evoformer 的设计逻辑，从序列预测结构的 50 年难题，AlphaFold 3 扩展到 DNA/RNA/小分子","▸ <strong>生成式分子设计</strong> — RFDiffusion 蛋白质设计，AI 设计药物分子已进入临床试验","▸ <strong>气候与物理 AI</strong> — GraphCast 超越传统数值天气预报，AI 代理模型加速大规模气候模拟"]},{"id":"gnn","phase":"前沿方向","title":"图神经网络 · GNN · 知识图谱","color":"#7c3aed","bg":"#F5F3FF","intro":"图神经网络把深度学习扩展到图结构数据。社交网络、分子、知识图谱本质上都是图，强行转换为序列或向量会丢失关键结构信息。","notes":[{"h":"为什么需要图神经网络","pts":["传统神经网络（CNN/RNN/MLP）处理的数据有固定的结构：CNN 处理网格（图像=像素网格），RNN 处理序列（文本=token 序列），MLP 处理向量（表格=特征向量）。但很多真实世界的问题本质上是图结构的：社交网络（用户=节点，关注关系=边）、分子（原子=节点，化学键=边）、知识图谱（实体=节点，关系=边）、交通网络（路口=节点，道路=边）。强行把图数据转换成序列或向量会丢失结构信息。","图神经网络的核心操作是「消息传递」（Message Passing）：每个节点聚合其邻居节点的特征，更新自己的表示，重复 K 次后每个节点的表示包含了 K 跳邻域内的结构信息。这个过程类比于 Transformer 的 Attention（每个 token 聚合其他 token 的信息），但在任意图结构上泛化，而不只是全连接的序列。","GNN 的三大应用范式：节点分类（预测每个节点的类别，如用户欺诈检测）、链接预测（预测节点间是否应该有边，如推荐系统的「可能认识的人」）、图分类（预测整个图的属性，如分子毒性预测）。这三种任务覆盖了大多数真实图数据的问题形式。"]},{"h":"主要 GNN 架构","pts":["GCN（Graph Convolutional Network，Kipf 2017）是 GNN 的奠基工作：在频域定义图卷积，通过拉普拉斯矩阵的特征分解实现节点特征的平滑聚合。局限是需要在训练时看到完整图（直推式，Transductive），无法泛化到训练时未见过的节点或图。","GraphSAGE（Hamilton 2017）解决了归纳式学习（Inductive Learning）的问题：不需要在训练时固定图结构，通过采样固定数量的邻居节点并聚合其特征来更新节点表示。这使得 GNN 可以在大图上进行小批量训练，也可以泛化到新节点。Pinterest 用 GraphSAGE 在数十亿节点的 Pin-Board 图上做推荐，是最早的 GNN 大规模工业应用之一。","GAT（Graph Attention Network，Veličković 2018）引入了注意力机制：不是平均聚合邻居，而是学习每个邻居的重要性权重。这让模型能够区分「这个邻居对我很重要」和「这个邻居对我不重要」，在需要区分邻居重要性的任务上（如知识图谱推理）表现更好。"]},{"h":"GNN 的工业应用","pts":["推荐系统是 GNN 最成熟的工业应用：用户-物品交互天然是二部图（Bipartite Graph），用 GNN 在这个图上学习用户和物品的 embedding，比传统矩阵分解能捕捉高阶关联（朋友的朋友喜欢的东西）。Pinterest PinSage、Uber Eats GraphSAGE、阿里巴巴 GRAPH4REC 是三个影响力最大的工业实现。","欺诈检测是金融科技领域 GNN 的核心应用（和你的风险系统背景直接相关）：欺诈行为往往在交易图上有可识别的结构模式（环形转账、团伙欺诈、洗钱链条），这些模式用传统特征工程很难捕捉，但 GNN 可以天然地在图结构上识别异常子图。PayPal、蚂蚁金服、Stripe 都在生产环境用 GNN 做反欺诈。","知识图谱补全（Knowledge Graph Completion）是 GNN 的另一个重要应用：已有的知识图谱（Freebase/Wikidata）不完整，需要预测哪些「三元组」（实体A，关系，实体B）可能成立。TransE/RotatE 等图 embedding 方法和 GNN 的结合，是 RAG 系统里知识图谱检索的技术基础。"]}],"res":[{"tp":"论文","tc":"b-paper","t":"Semi-Supervised Classification with GCN (Kipf 2017)","d":"GCN 奠基论文，图卷积网络的标准形式","u":"https://arxiv.org/abs/1609.02907","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"Inductive Representation Learning on Large Graphs (GraphSAGE)","d":"归纳式 GNN，Pinterest 推荐系统的技术基础","u":"https://arxiv.org/abs/1706.02216","lv":"mid"},{"tp":"课程","tc":"b-course","t":"Stanford CS224W: Machine Learning with Graphs","d":"图机器学习最权威课程，GNN 全系列，免费视频","u":"https://web.stanford.edu/class/cs224w/","lv":"mid"},{"tp":"工具","tc":"b-tool","t":"PyTorch Geometric (PyG)","d":"GNN 主流框架，支持 GCN/GAT/GraphSAGE 等","u":"https://pytorch-geometric.readthedocs.io/","lv":"mid"}],"intro_lines":["▸ <strong>为什么需要 GNN</strong> — 消息传递机制，与 Transformer Self-Attention 的类比，两者的本质差异","▸ <strong>主要架构</strong> — GCN（谱域/直推式）→ GraphSAGE（空域/归纳式）→ GAT（注意力权重），每步解决什么","▸ <strong>工业应用</strong> — Pinterest/Uber Eats 推荐系统，金融欺诈检测图谱，知识图谱补全"]},{"id":"audio_deep","phase":"前沿方向","title":"语音深度 · 声学特征 · 音乐生成","color":"#059669","bg":"#ECFDF5","intro":"语音 AI 的技术栈比「调用 Whisper API」深得多。理解声学特征为什么这样设计，以及 TTS 如何从拼接演进到神经合成，是系统性理解语音方向的基础。","notes":[{"h":"声学特征：为什么不直接用波形","pts":["原始音频是一个一维时间序列（波形，Waveform），采样率 16kHz 时每秒有 16000 个数据点。直接用原始波形做深度学习在早期效果不好，因为连续的波形对于「感知上相似但波形差异大」的声音没有好的表示。人耳感知声音的方式是频率和能量的组合，而非时间轴上的振幅。","Mel Spectrogram 是语音 AI 最常用的输入特征：用短时傅里叶变换（STFT）把波形切成短时帧，计算每帧的频谱，再用 Mel 滤波器组按人耳感知的非线性频率尺度（Mel Scale）压缩，最终得到「时间-频率-能量」的二维图像。这个二维图像可以直接用 CNN 处理。Whisper 的输入就是 80 维 Mel Spectrogram。","MFCC（Mel Frequency Cepstral Coefficients）是传统 ASR 的标准特征：在 Mel Spectrogram 基础上再做离散余弦变换（DCT），压缩到约 13 维特征。MFCC 在神经网络 ASR 之前主导了 20 年，现在在端侧轻量级 ASR 里仍然使用。理解 MFCC 不只是为了历史，它展示了「如何把领域先验知识（人耳的感知模型）编码进特征工程」的思路。"]},{"h":"TTS 演进：从拼接到神经网络","pts":["语音合成的技术演进清晰地反映了深度学习对传统 NLP 的替代过程：拼接合成（Concatenative TTS，用预录的语音片段拼接，音质好但不自然）→ 统计参数合成（Statistical Parametric TTS，HMM + vocoder，可塑性好但声音机械）→ 神经 TTS（端到端学习，Tacotron/FastSpeech）→ 扩散 TTS（VITS/NaturalSpeech，接近人声质量）。","Tacotron 2（Google 2018）是神经 TTS 的里程碑：seq2seq + Attention 把文本直接映射到 Mel Spectrogram，WaveNet vocoder 把 Mel Spectrogram 转为波形。但 WaveNet 的自回归生成很慢（每秒音频需要生成 24000 个采样点）。FastSpeech/FastSpeech 2 通过并行化生成解决了速度问题，成为工业部署的主流选择。","VITS（Variational Inference with adversarial learning for end-to-end TTS）是当前质量最高的开源 TTS：用 VAE + GAN + Flow 的组合，端到端从文本生成波形，绕过了 Mel Spectrogram 中间表示。ElevenLabs 和 Cartesia 的商业 TTS 在此基础上进一步优化了语音克隆（Voice Cloning）能力——只需几秒参考音频就能克隆说话人音色。"]},{"h":"音乐生成与通用音频理解","pts":["音乐生成是当前最有创造力的 AI 应用之一，代表了不同的技术路线：MusicGen（Meta 2023）用 Transformer + EnCodec（神经网络音频编解码器）把音频压缩成离散 token，再用语言模型生成 token 序列，最后解码成音频——把「音乐生成」转化为「语言建模」问题；Suno 和 Udio 用类似扩散模型的方法直接在频谱空间生成，质量更高但可控性较差。","AudioLM（Google 2022）是通用音频语言模型的早期探索：不只是音乐或语音，而是在统一框架下处理任意音频。用 SoundStream 编码器把音频转为离散 token，用 Transformer 建模 token 序列，实现了语音延续（给一段语音，续写后续内容）、音乐延续、甚至跨模态生成。这展示了「把任意模态转为 token → 语言模型处理」的统一框架的威力。","说话人识别（Speaker Verification/Identification）和情感识别在实际应用中有大量部署：银行客服的声纹认证、电话录音的情绪分析、会议转录的说话人分离（Speaker Diarization）。这些任务通常用对比学习训练的说话人 embedding（x-vector/d-vector），加上分类器或相似度计算实现，是语音 AI 里最成熟的工业落地方向。"]}],"res":[{"tp":"论文","tc":"b-paper","t":"Natural TTS Synthesis by Conditioning WaveNet on Mel Spectrograms (Tacotron 2)","d":"神经 TTS 里程碑，seq2seq 文本到 Mel Spectrogram","u":"https://arxiv.org/abs/1712.05884","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"MusicGen: Simple and Controllable Music Generation","d":"Meta 的音乐生成，Transformer + EnCodec，可控文本引导","u":"https://arxiv.org/abs/2306.05284","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"AudioLM: a Language Modeling Approach to Audio Generation","d":"统一音频语言模型，语音/音乐延续","u":"https://arxiv.org/abs/2209.03143","lv":"adv"},{"tp":"工具","tc":"b-tool","t":"librosa — Python 音频分析库","d":"MFCC/Mel Spectrogram 提取，音频可视化，入门实践首选","u":"https://librosa.org/doc/latest/index.html","lv":"entry"}],"intro_lines":["▸ <strong>声学特征</strong> — 原始波形的局限，Mel Spectrogram 的设计逻辑（人耳感知模型），MFCC 的历史地位","▸ <strong>TTS 演进</strong> — 拼接→统计参数→Tacotron→FastSpeech→VITS，每步解决了前一步什么具体问题","▸ <strong>音乐生成与通用音频</strong> — MusicGen/Suno 的技术路线对比，AudioLM 统一音频语言模型框架"]},{"id":"vision_deep","phase":"前沿方向","title":"计算机视觉深度 · CNN 演进 · 3D 视觉","color":"#d97706","bg":"#FEF3C7","intro":"CNN 的演进是深度学习发展史的缩影，每一步架构变化都对应一个具体的训练失败问题的解决。3D 视觉（NeRF/3DGS）代表场景表示的范式转变。","notes":[{"h":"CNN 架构演进：每一步解决了什么","pts":["AlexNet（2012）是深度学习在视觉领域的 Big Bang：用 5 层卷积网络在 ImageNet 上比传统方法（手工特征+SVM）低 10 个百分点的错误率，震惊整个计算机视觉领域。关键创新是：GPU 训练（让深层网络训练可行）、ReLU 激活（解决梯度消失）、Dropout（防过拟合）。这三个创新不是理论推导出来的，而是工程实验的产物。","ResNet（He et al. 2015）解决了深层网络的训练难题：超过 20 层的网络反而比浅层网络性能差（不是过拟合，而是优化困难）。残差连接（Shortcut Connection）的洞察极其简单：与其让每层直接学习目标映射 H(x)，不如让它学习残差 F(x)=H(x)-x，恒等映射（identity mapping）成为最简单的选择，优化器更容易收敛。ResNet 使得训练 100-1000 层的网络成为可能，残差连接也成为 Transformer 等后续架构的标配。","EfficientNet（Google 2019）用神经架构搜索（NAS）系统性地平衡网络的宽度/深度/分辨率，在给定计算预算下达到最优精度。它揭示了一个重要洞察：同时按比例扩展这三个维度（Compound Scaling）比单独扩展任一维度效果更好。Vision Transformer（ViT，Google 2020）则完全抛弃了卷积，把图像切成 16×16 的 patch，直接用 Transformer 处理，大规模预训练后在几乎所有视觉任务上超越了最好的 CNN。"]},{"h":"目标检测与分割的技术线","pts":["目标检测的演进是从「先提候选区域再分类」（Two-Stage：RCNN/Faster RCNN）到「端到端一次过」（One-Stage：YOLO/SSD/RetinaNet）再到「无锚框」（Anchor-Free：CenterNet/FCOS）。YOLO（You Only Look Once）系列因为极快的推理速度在工业部署中最普遍：YOLOv8 在单张 GPU 上可以达到约 160 FPS，支持实时视频流处理。DETR（Facebook 2020）把 Transformer 引入目标检测，消除了手工设计 anchor 的需要，代价是训练收敛慢。","语义分割（每个像素分类）和实例分割（区分同类的不同实例）在医疗影像、自动驾驶、工业检测里是核心能力。U-Net（2015）是医疗分割的事实标准：编码器-解码器结构加跳跃连接，即使在小数据集上也能有效训练。SAM（Segment Anything Model，Meta 2023）是分割领域的 Foundation Model：任意提示（点/框/文字）分割任意物体，零样本泛化，是计算机视觉里继 CLIP 之后最重要的基础模型。","SAM 2（Meta 2024）把分割扩展到视频：通过 Memory Attention 机制在视频帧间传播分割结果，支持实时视频物体追踪和分割。这是视频理解的重要基础能力，在视频编辑（自动抠像）、AR（实时物体增强）、机器人感知（追踪操作目标）里有直接应用。"]},{"h":"3D 视觉：NeRF 与 3D Gaussian Splatting","pts":["NeRF（Neural Radiance Field，2020）是 3D 视觉的范式转变：不再用传统几何方法（点云/网格/体素）重建三维场景，而是用神经网络隐式地表示场景——给定任意视角的相机位置和方向，网络直接预测该方向上的颜色和密度。通过体积渲染（Volume Rendering）合成该视角的图像，用多张照片的重建误差训练。NeRF 能生成极其逼真的新视角，但训练和渲染都很慢（单个场景训练需要数小时，渲染单帧需要秒级）。","3D Gaussian Splatting（3DGS，2023）是 NeRF 的速度革命：用数百万个 3D Gaussian 椭球体显式表示场景（而非神经网络隐式表示），每个 Gaussian 有位置/旋转/缩放/不透明度/颜色等属性。渲染时把所有 Gaussian 投影到 2D 并「泼溅」（Splatting），用 GPU 并行处理。训练速度比 NeRF 快 10-100 倍，实时渲染（100+ FPS）成为可能，是元宇宙/AR/3D 内容创作的关键技术。","3D 视觉的应用前景：自动驾驶（高精度地图重建、障碍物 3D 检测）、机器人操作（3D 场景理解是抓取规划的前提）、数字孪生（工厂/建筑的精确 3D 模型）、电影/游戏（NeRF/3DGS 生成高质量虚拟场景）。Apple Vision Pro 的空间计算把 3D 视觉推向了消费端，预示着 3D 感知将成为下一代计算平台的基础能力。"]}],"res":[{"tp":"论文","tc":"b-paper","t":"Deep Residual Learning for Image Recognition (ResNet)","d":"残差连接奠基论文，解决深层网络训练困难","u":"https://arxiv.org/abs/1512.03385","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"NeRF: Representing Scenes as Neural Radiance Fields","d":"神经辐射场奠基论文，3D 视觉的范式转变","u":"https://arxiv.org/abs/2003.08934","lv":"mid"},{"tp":"论文","tc":"b-paper","t":"3D Gaussian Splatting for Real-Time Novel View Synthesis","d":"3DGS 原论文，比 NeRF 快 100 倍的实时 3D 渲染","u":"https://arxiv.org/abs/2308.04079","lv":"mid"},{"tp":"可视化","tc":"b-visual","t":"CNN Explainer — 交互式 CNN 可视化","d":"卷积/池化/激活函数动态可视化，CNN 直觉理解","u":"https://poloclub.github.io/cnn-explainer/","lv":"entry"}],"intro_lines":["▸ <strong>CNN 演进</strong> — AlexNet 三个关键创新，ResNet 残差连接解决了什么优化问题，ViT 为何能用 Transformer 处理图像","▸ <strong>目标检测与分割</strong> — Two-Stage vs One-Stage，YOLO 的工业普及，SAM 作为视觉 Foundation Model","▸ <strong>3D 视觉</strong> — NeRF 的隐式场表示，3DGS 比 NeRF 快 100 倍的原理，空间计算的应用前景"]},{"id":"learn","phase":"学习路径","title":"学习路径 · 权威博客 · 核心课程","color":"#64748b","bg":"#F8FAFC","intro":"这个版块给出具体的学习路径建议——不是资源列表，而是推荐的顺序和每个阶段的目标，从零基础到能跟上前沿论文的完整路径。","notes":[{"h":"推荐的学习顺序","pts":["第一阶段（理解基础）：先看 Andrej Karpathy 的「Let's Build GPT from Scratch」（3小时，从零实现 Transformer）建立直觉，再看他的「Intro to Large Language Models」（1小时，LLM 工作原理概览）。这两个视频看完，对 LLM 是什么、怎么工作有了真实的感知，而不只是抽象概念。","第二阶段（系统知识）：读 Lilian Weng 的博客文章（Transformer Family / Agent / Diffusion / RLHF 系列），每篇都是 20-50 页的深度综述，理论扎实且有代码。配合 Chip Huyen 的 AI Engineering 内容，补充工程实践视角。这个阶段建议花 2-4 周。","第三阶段（动手实践）：Hugging Face 的 NLP Course 和 Fast.ai 的课程，都有配套代码和 Notebook，在 Colab 上边读边跑。LLaMA-Factory 或 trl 库实际跑一次 LoRA 微调，vLLM 部署一个模型提供 API——动手做过一遍，理解深度完全不同。","第四阶段（跟进前沿）：arxiv 的 cs.LG/cs.CL 方向，每周关注 Hugging Face Papers（papers.huggingface.co，按热度排序）、Lilian Weng 的新文章、Twitter/X 上 AI 研究者的讨论。重要论文（DeepSeek/LLaMA/Flash Attention 系列）出来后精读，其余用 Claude/ChatGPT 辅助理解。"]}],"res":[{"tp":"视频","tc":"b-video","t":"Intro to Large Language Models — Andrej Karpathy","d":"LLM 工作原理最好的入门视频，1小时，无需数学基础","s":"YouTube — Andrej Karpathy","u":"https://www.youtube.com/watch?v=zjkBMFhNj_g","lv":"entry"},{"tp":"视频","tc":"b-video","t":"Let's Build GPT from Scratch — Andrej Karpathy","d":"3小时从零实现 Transformer，看完真正理解 LLM","s":"YouTube — Andrej Karpathy","u":"https://www.youtube.com/watch?v=kCc8FmEb1nY","lv":"entry"},{"tp":"博客","tc":"b-blog","t":"Lilian Weng's Blog（OpenAI 研究员权威综述）","d":"Agent/Diffusion/RLHF/RAG/CoT 每篇都是 20-50 页深度综述","s":"lilianweng.github.io","u":"https://lilianweng.github.io/","lv":"mid"},{"tp":"博客","tc":"b-blog","t":"Chip Huyen's Blog（ML Engineering）","d":"LLM 应用工程、Streaming、Evals，AI Engineering 书籍作者","s":"huyenchip.com","u":"https://huyenchip.com/blog","lv":"mid"},{"tp":"课程","tc":"b-course","t":"Hugging Face NLP Course（免费，含代码）","d":"Transformer/Fine-tuning/Tokenizer/Datasets，HF 全家桶最好入门","s":"huggingface.co/learn","u":"https://huggingface.co/learn","lv":"entry"},{"tp":"GitHub","tc":"b-github","t":"LLM Course（Maxime Labonne）","d":"从 Transformer 到 RAG 到 Agent 完整学习路径，Colab notebook","s":"mlabonne/llm-course","u":"https://github.com/mlabonne/llm-course","lv":"entry"}],"intro_lines":["▸ <strong>第一阶段（直觉）</strong> — Karpathy 的两个视频建立 LLM 工作原理的真实感知（3h + 1h）","▸ <strong>第二阶段（系统）</strong> — Lilian Weng 深度综述 + Chip Huyen 工程视角，建议 2–4 周","▸ <strong>第三阶段（实践）</strong> — 实际跑一次 LoRA 微调，用 vLLM 部署一个模型提供 API","▸ <strong>第四阶段（前沿）</strong> — HF Papers 按热度跟踪，arxiv cs.LG/cs.CL，重要论文精读"]}];

function render(){
  const cont=document.getElementById('cont'),nav=document.getElementById('nav');
  let tot=0,curP='';
  D.forEach(s=>{
    tot+=s.res.length;
    if(s.phase!==curP){
      curP=s.phase;
      const lbl=document.createElement('div');lbl.className='nlbl';lbl.textContent=s.phase;nav.appendChild(lbl);
    }
    const a=document.createElement('a');a.className='nl';a.dataset.sec=s.id;a.onclick=()=>goto(s.id);
    a.innerHTML=`<span class="ndot" style="background:${s.color}"></span>${s.title.split('·')[0].trim()}<span class="nc">${s.res.length}</span>`;
    nav.appendChild(a);
    const div=document.createElement('div');div.className='sec';div.id=s.id;
    div.dataset.search=[s.title,s.intro,...s.notes.map(n=>n.h+' '+n.pts.join(' ')),...s.res.map(r=>r.t+' '+r.d)].join(' ').toLowerCase();
    const tid=`t-${s.id}`;
    let notesHTML=`<div class="notes-block">`;
    s.notes.forEach((n,ni)=>{
      const _diag=n.img_key?document.getElementById('diag_'+n.img_key):null;
      const _svg=_diag?_diag.innerHTML:'';
      const _link=n.img_key&&n.img_link?`<a class="diag-link" href="${n.img_link}" target="_blank" rel="noopener">↗ ${n.img_title||'参考资料'}</a>`:'';
      const _img=_svg?`<figure class="note-fig">${_svg}${_link}</figure>`:(_link?`<p>${_link}</p>`:'')
      
      const aid=`a-${s.id}-${ni}`;
      notesHTML+=`<div class="acc" id="nh-${s.id}-${ni}"><div class="acc-hdr" onclick="toggleAcc('${aid}',this)"><span class="acc-arrow">▶</span><span class="acc-htxt">${n.h}</span></div><div class="acc-body" id="${aid}">${_img}<div class="pts-wrap">${n.pts.map(p=>`<div class="pt">${p}</div>`).join('')}</div></div></div>`;
    });
    notesHTML+='</div>';
    let resHTML=`<div class="res-block"><div class="res-section-label">🔗 学习资源</div><div class="grid">`;
    s.res.forEach(r=>{
      resHTML+=`<div class="card"><div class="ctop"><span class="badge ${r.tc}">${r.tp}</span><div class="ctit"><a href="${r.u}" target="_blank" rel="noopener">${r.t}</a></div></div><div class="cdesc">${r.d}</div><div class="cmeta"><span class="csrc">${r.s}</span><span class="cdiff ${dc(r.lv)}">${dl(r.lv)}</span></div><a class="curl" href="${r.u}" target="_blank" rel="noopener">${r.u.replace(/https?:\/\//,'').split('/')[0]}</a></div>`;
    });
    resHTML+='</div></div></div>';
    div.innerHTML=`<div class="sch"><span class="sdot" style="background:${s.color}"></span><span class="stit">${s.title}</span></div><div class="intro-txt">${s.intro}${renderIntroLines(s.intro_lines)}</div>${notesHTML}${resHTML}`;
    cont.appendChild(div);
  });
  document.getElementById('stag').textContent=`${D.length} 个版块 · ${tot} 个资源`;
  const items=[['b-paper','论文'],['b-blog','博客/文章'],['b-video','视频'],['b-docs','文档'],['b-book','书籍'],['b-course','课程'],['b-github','GitHub'],['b-tool','工具'],['b-visual','可视化']];
  const lg=document.getElementById('leg');
  items.forEach(([cls,lbl])=>{const s=document.createElement('span');s.className=`badge ${cls}`;s.style.cssText='font-size:11px;padding:3px 7px;';s.textContent=lbl;lg.appendChild(s);});
}
function switchTab(tid,which,btn){
  document.querySelectorAll(`#${tid}-notes,#${tid}-res`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`${tid}-${which}`).classList.add('active');
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();let m=0;
  document.querySelectorAll('.sec').forEach(sec=>{
    if(!q){sec.classList.remove('hidden-sec');m++;return;}
    const hit=(sec.dataset.search||'').includes(q);sec.classList.toggle('hidden-sec',!hit);if(hit)m++;
  });
  document.getElementById('nr').style.display=m===0&&q?'block':'none';
  document.getElementById('stag').textContent=q?`找到 ${m} 个版块`:`${D.length} 个版块 · ${D.reduce((a,s)=>a+s.res.length,0)} 个资源`;
});

function detectSection(){
  const secs=[...document.querySelectorAll('.sec[id]')];
  if(!secs.length)return;
  const threshold=100;
  let current=secs[0];
  for(const s of secs){
    const top=s.getBoundingClientRect().top;
    if(top<=threshold)current=s;
    else break;
  }
  const id=current.id;
  document.querySelectorAll('.nl[data-sec]').forEach(l=>l.classList.toggle('active',l.dataset.sec===id));
  updateGuide(id);
}
window.addEventListener('scroll',detectSection,{passive:true});

function buildToc(){

function updateGuide(id){
  const rail=document.getElementById('guide-content')||document.getElementById('toc-rail');
  if(!rail)return;
  const s=D.find(x=>x.id===id);
  if(!s)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const items=s.intro_lines&&s.intro_lines.length?s.intro_lines
    :s.notes?s.notes.map(n=>n.h):[];
  if(!items.length){rail.innerHTML='';return;}
  let h='<span class="guide-head">本节要点</span>';
  items.forEach((line,ni)=>{
    const key='kb_'+fk+'_'+id+'_'+ni;
    const done=localStorage.getItem(key)==='1';
    h+=`<div class="guide-item${done?' done':''}" id="gi-${id}-${ni}">`;
    h+=`<div class="guide-check" onclick="toggleDone('${fk}','${id}',${ni})">✓</div>`;
    h+=`<div class="guide-text" onclick="gotoEl('nh-${id}-${ni}')">${line}</div>`;
    h+='</div>';
  });
  rail.innerHTML=h;
}
function toggleDone(fk,sid,ni){
  const key='kb_'+fk+'_'+sid+'_'+ni;
  const done=localStorage.getItem(key)==='1';
  done?localStorage.removeItem(key):localStorage.setItem(key,'1');
  const el=document.getElementById('gi-'+sid+'-'+ni);
  if(el)el.classList.toggle('done',!done);
}
function gotoEl(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function initResize(){
  const handle=document.getElementById('resize-handle');
  if(!handle)return;
  const fk=location.pathname.split('/').pop().replace('.html','');
  const stored=localStorage.getItem('toc-w-'+fk);
  if(stored)setTocWidth(parseInt(stored));
  let sx,sw;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    sx=e.clientX;
    sw=document.getElementById('toc-rail').getBoundingClientRect().width;
    document.addEventListener('mousemove',onDrag);
    document.addEventListener('mouseup',endDrag);
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    handle.classList.add('dragging');
  });
  function onDrag(e){
    setTocWidth(Math.max(160,Math.min(640,sw+(sx-e.clientX))));
  }
  function endDrag(){
    document.removeEventListener('mousemove',onDrag);
    document.removeEventListener('mouseup',endDrag);
    document.body.style.cursor='';
    document.body.style.userSelect='';
    handle.classList.remove('dragging');
    localStorage.setItem('toc-w-'+fk,
      Math.round(document.getElementById('toc-rail').getBoundingClientRect().width));
  }
}
function setTocWidth(w){
  const lay=document.querySelector('.lay');
  if(!lay)return;
  const cols=window.getComputedStyle(lay).gridTemplateColumns.split(' ');
  lay.style.setProperty('grid-template-columns',cols[0]+' 1fr '+w+'px','important');
}
</script>
